<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التسعير الذكي - Warchat Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg-dark: #0d1117; 
            --glass: rgba(255,255,255,0.05); 
            --neon-blue: #58a6ff; 
            --neon-green: #3fb950;
            --neon-red: #ff7b72;
            --text-gray: #c9d1d9;
        }
        
        body { background: var(--bg-dark); font-family: 'Cairo', sans-serif; color: var(--text-gray); padding-bottom: 120px; }
        
        .header { background: rgba(13, 17, 23, 0.8); padding: 20px; display: flex; align-items: center; justify-content: space-between; backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .glass-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-top: 15px; backdrop-filter: blur(10px); }
        .section-title { font-size: 0.85rem; font-weight: 700; color: var(--neon-blue); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }

        .type-selector { display: flex; gap: 12px; margin-top: 10px; }
        .type-btn { flex: 1; padding: 14px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: var(--text-gray); font-weight: bold; transition: 0.3s; cursor: pointer; }
        .type-btn.active-up { background: rgba(63, 185, 80, 0.15); color: var(--neon-green); border-color: var(--neon-green); box-shadow: 0 0 15px rgba(63, 185, 80, 0.1); }
        .type-btn.active-down { background: rgba(255, 123, 114, 0.15); color: var(--neon-red); border-color: var(--neon-red); box-shadow: 0 0 15px rgba(255, 123, 114, 0.1); }

        .form-check { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; display: flex; justify-content: space-between; align-items: center; flex-direction: row-reverse; }
        .form-check label { cursor: pointer; width: 100%; text-align: right; }
        .form-check-input:checked { background-color: var(--neon-blue); border-color: var(--neon-blue); }

        .mode-selector { background: rgba(0,0,0,0.3); border-radius: 12px; display: flex; padding: 5px; border: 1px solid rgba(255,255,255,0.05); }
        .mode-btn { flex: 1; padding: 10px; border-radius: 8px; border: none; background: transparent; color: var(--text-gray); transition: 0.3s; font-size: 0.85rem; cursor: pointer; }
        .mode-btn.active { background: var(--neon-blue); color: white; box-shadow: 0 0 10px rgba(88, 166, 255, 0.3); }

        .form-select { background: rgba(0,0,0,0.3) !important; color: white !important; border: 1px solid rgba(255,255,255,0.1) !important; border-radius: 12px; }
        .value-box { background: rgba(0,0,0,0.4); border-radius: 20px; padding: 25px; text-align: center; border: 1px solid rgba(88, 166, 255, 0.1); }
        #changeValue { border: none; background: transparent; font-size: 3.5rem; font-weight: bold; width: 160px; text-align: center; outline: none; color: white; }

        .apply-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 25px; background: rgba(13, 17, 23, 0.9); backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.1); z-index: 100; }
        .btn-apply { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.1); width: 100%; padding: 16px; border-radius: 18px; font-weight: bold; font-size: 1.1rem; transition: 0.4s; }
        .btn-apply.ready { background: linear-gradient(45deg, #58a6ff, #bc8cff); color: white; border: none; box-shadow: 0 4px 15px rgba(88, 166, 255, 0.3); cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <i class="fas fa-arrow-right" onclick="history.back()"></i>
    <h5 class="m-0 fw-bold text-white">التسعير الذكي للمخزون</h5>
    <div style="width:20px"></div>
</div>

<div class="container">
    <div class="type-selector">
        <button class="type-btn active-up" id="btnUp" onclick="setType('up')">
            <i class="fas fa-trending-up me-2"></i>بالزيادة (رفع)
        </button>
        <button class="type-btn" id="btnDown" onclick="setType('down')">
            <i class="fas fa-trending-down me-2"></i>بالنقصان (خصم)
        </button>
    </div>

    <div class="glass-card">
        <div class="section-title">السعر المستهدف للتعديل</div>
        <div class="form-check">
            <input class="form-check-input" type="radio" name="targetPrice" id="p1" value="sellPrice" checked>
            <label class="form-check-label text-white" for="p1">سعر البيع 1 (قطاعي)</label>
        </div>
        <div class="form-check">
            <input class="form-check-input" type="radio" name="targetPrice" id="p2" value="sellPrice2">
            <label class="form-check-label" for="p2">سعر البيع 2 (جملة)</label>
        </div>
        <div class="form-check">
            <input class="form-check-input" type="radio" name="targetPrice" id="p3" value="sellPrice3">
            <label class="form-check-label" for="p3">سعر البيع 3 (خاص)</label>
        </div>
        <div class="form-check border-0">
            <input class="form-check-input" type="radio" name="targetPrice" id="pCost" value="buyPrice">
            <label class="form-check-label" for="pCost">سعر الشراء (التكلفة)</label>
        </div>
    </div>

    <div class="glass-card">
        <div class="section-title">نطاق التعديل</div>
        <div class="mb-4">
            <label class="small opacity-50 mb-2 d-block">التصنيف المشمول بالتغيير</label>
            <select id="categoryFilter" class="form-select shadow-none">
                <option value="all">كافة التصنيفات</option>
            </select>
        </div>

        <div class="mode-selector">
            <button class="mode-btn active" id="modePct" onclick="setMode('pct')">بنسبة مئوية (%)</button>
            <button class="mode-btn" id="modeFixed" onclick="setMode('fixed')">بمبلغ ثابت (EGP)</button>
        </div>
    </div>

    <div class="glass-card mb-5">
        <div class="section-title text-center">القيمة المضافة / المخصومة</div>
        <div class="value-box">
            <div class="d-flex align-items-center justify-content-center">
                <span id="symbolAfter" style="font-size: 2rem; color: var(--neon-blue);">%</span>
                <input type="number" id="changeValue" value="0" oninput="validateBtn()" placeholder="0">
                <span id="symbolBefore" style="display:none; font-size: 1.2rem; color: var(--neon-blue); margin-left: 10px;">EGP</span>
            </div>
        </div>
    </div>
</div>

<div class="apply-bar">
    <button class="btn-apply" id="applyBtn" onclick="applySmartPricing()">
        <i class="fas fa-magic me-2"></i> تطبيق التعديلات الآن
    </button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, writeBatch, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
        authDomain: "elzyady-da509.firebaseapp.com",
        projectId: "elzyady-da509",
        storageBucket: "elzyady-da509.firebasestorage.app",
        messagingSenderId: "242117738897",
        appId: "1:242117738897:web:d658d6ca335b316f7f9a30"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentType = 'up';
    let currentMode = 'pct';

    window.setType = (t) => {
        currentType = t;
        document.getElementById('btnUp').className = t === 'up' ? 'type-btn active-up' : 'type-btn';
        document.getElementById('btnDown').className = t === 'down' ? 'type-btn active-down' : 'type-btn';
    }

    window.setMode = (m) => {
        currentMode = m;
        document.getElementById('modePct').classList.toggle('active', m === 'pct');
        document.getElementById('modeFixed').classList.toggle('active', m === 'fixed');
        document.getElementById('symbolAfter').style.display = m === 'pct' ? 'inline' : 'none';
        document.getElementById('symbolBefore').style.display = m === 'fixed' ? 'inline' : 'none';
    }

    window.validateBtn = () => {
        const val = parseFloat(document.getElementById('changeValue').value);
        document.getElementById('applyBtn').className = val > 0 ? 'btn-apply ready' : 'btn-apply';
    }

    async function loadCategories() {
        try {
            const snap = await getDocs(collection(db, "inventory"));
            const cats = new Set();
            snap.forEach(doc => {
                const c = doc.data().category;
                if(c) cats.add(c);
            });
            const select = document.getElementById('categoryFilter');
            cats.forEach(c => select.innerHTML += `<option value="${c}">${c}</option>`);
        } catch (e) { console.error("Error loading categories:", e); }
    }

    window.applySmartPricing = async function() {
        const val = parseFloat(document.getElementById('changeValue').value);
        if(!val || val <= 0) return;

        const targetField = document.querySelector('input[name="targetPrice"]:checked').value;
        const targetCat = document.getElementById('categoryFilter').value;

        const confirmMsg = `أنت على وشك ${currentType === 'up' ? 'زيادة' : 'خصم'} الأسعار بمقدار ${val}${currentMode === 'pct' ? '%' : ' ج.م'}. هل تريد الاستمرار؟`;
        if(!confirm(confirmMsg)) return;

        const btn = document.getElementById('applyBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> جاري المعالجة...';

        try {
            const snap = await getDocs(collection(db, "inventory"));
            let batch = writeBatch(db);
            let count = 0;
            let totalProcessed = 0;

            for (const itemDoc of snap.docs) {
                const data = itemDoc.data();
                if(targetCat === 'all' || data.category === targetCat) {
                    let currentPrice = parseFloat(data[targetField]) || 0;
                    let changeAmount = currentMode === 'pct' ? (currentPrice * (val/100)) : val;
                    let newPrice = currentType === 'up' ? currentPrice + changeAmount : currentPrice - changeAmount;

                    // تقريب السعر لأقرب رقمين عشريين (محاسبياً)
                    newPrice = Math.round(Math.max(0, newPrice) * 100) / 100;

                    batch.update(doc(db, "inventory", itemDoc.id), {
                        [targetField]: newPrice,
                        lastPriceUpdate: serverTimestamp()
                    });

                    count++;
                    totalProcessed++;

                    // Firebase Batch Limit is 500
                    if (count === 450) {
                        await batch.commit();
                        batch = writeBatch(db);
                        count = 0;
                    }
                }
            }

            if (count > 0) await batch.commit();
            
            alert(`تم تحديث ${totalProcessed} صنف بنجاح.`);
            location.reload();

        } catch (error) {
            console.error("Update Error:", error);
            alert("حدث خطأ أثناء التحديث. يرجى مراجعة الاتصال.");
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-magic me-2"></i> تطبيق التعديلات الآن';
        }
    }

    loadCategories();
</script>
</body>
</html>
