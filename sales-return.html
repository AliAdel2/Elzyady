<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرتجع مبيعات - Masar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { 
            --bg: #0d1117; 
            --glass: rgba(255,255,255,0.05); 
            --neon-red: #f85149; 
            --neon-blue: #58a6ff;
        }

        body { background: var(--bg); font-family: 'Cairo', sans-serif; color: #c9d1d9; padding-bottom: 50px; }

        .header-section { 
            padding: 20px 15px; background: rgba(20, 25, 35, 0.8); border-bottom: 1px solid rgba(255,255,255,0.1); 
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center;
        }

        .input-group-custom {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; padding: 15px; margin-bottom: 20px;
        }

        label { font-size: 0.85rem; color: var(--neon-blue); margin-bottom: 8px; display: block; font-weight: 600; }

        .form-control, .form-select {
            background: rgba(0,0,0,0.2) !important; border: 1px solid rgba(255,255,255,0.1) !important;
            color: #fff !important; border-radius: 10px; padding: 10px;
        }

        .return-item-card {
            background: rgba(248, 81, 73, 0.05); border: 1px dashed var(--neon-red);
            border-radius: 15px; padding: 15px; margin-bottom: 15px;
        }

        .btn-return {
            background: var(--neon-red); color: white; border: none; border-radius: 12px;
            padding: 12px; width: 100%; font-weight: 700; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(248, 81, 73, 0.3);
        }
        .btn-return:active { transform: scale(0.95); }

        .back-btn { width: 40px; height: 40px; border-radius: 10px; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: #fff; display: flex; align-items: center; justify-content: center; text-decoration: none; }
    </style>
</head>
<body>

<div class="header-section">
    <a href="sales-history.html" class="back-btn"><i class="fas fa-arrow-right"></i></a>
    <h6 class="m-0 fw-bold">عملية مرتجع مبيعات</h6>
    <div style="width: 40px;"></div>
</div>

<div class="container mt-4">
    <div class="input-group-custom">
        <label>العميل</label>
        <select id="customerSelect" class="form-select mb-3" onchange="loadCustomerInvoices()">
            <option value="">اختر العميل...</option>
        </select>

        <label>اختر الفاتورة الأصلية</label>
        <select id="invoiceSelect" class="form-select" onchange="loadInvoiceItems()">
            <option value="">اختر الفاتورة للارتجاع منها...</option>
        </select>
    </div>

    <div id="returnItemsContainer">
        <div class="text-center opacity-50 p-4">حدد العميل ثم الفاتورة لبدء الارتجاع</div>
    </div>

    <div class="input-group-custom mt-4">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <span>إجمالي قيمة المرتجع:</span>
            <h5 class="m-0 text-white" id="returnTotalDisplay">0.00 ج.م</h5>
        </div>
        <button class="btn-return mt-3" id="saveBtn" onclick="saveReturn()">تأكيد حفظ المرتجع <i class="fas fa-undo-alt ms-2"></i></button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where, addDoc, updateDoc, doc, getDoc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
        authDomain: "elzyady-da509.firebaseapp.com",
        projectId: "elzyady-da509",
        storageBucket: "elzyady-da509.firebasestorage.app",
        messagingSenderId: "242117738897",
        appId: "1:242117738897:web:d658d6ca335b316f7f9a30"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentInvoices = [];

    async function loadCustomers() {
        const snap = await getDocs(collection(db, "customers"));
        const select = document.getElementById('customerSelect');
        snap.forEach(d => {
            select.innerHTML += `<option value="${d.id}">${d.data().name}</option>`;
        });
    }

    window.loadCustomerInvoices = async () => {
        const custId = document.getElementById('customerSelect').value;
        const invSelect = document.getElementById('invoiceSelect');
        const container = document.getElementById('returnItemsContainer');
        
        invSelect.innerHTML = '<option value="">جاري التحميل...</option>';
        container.innerHTML = '<div class="text-center opacity-50 p-4">حدد الفاتورة لبدء الارتجاع</div>';
        
        const q = query(collection(db, "invoices"), where("customerId", "==", custId));
        const snap = await getDocs(q);
        
        invSelect.innerHTML = '<option value="">اختر الفاتورة للارتجاع منها...</option>';
        currentInvoices = [];
        snap.forEach(d => {
            currentInvoices.push({id: d.id, ...d.data()});
            invSelect.innerHTML += `<option value="${d.id}">فاتورة بتاريخ ${d.data().time} - بقيمة ${d.data().total}</option>`;
        });
    };

    window.loadInvoiceItems = () => {
        const invId = document.getElementById('invoiceSelect').value;
        const container = document.getElementById('returnItemsContainer');
        const invoice = currentInvoices.find(i => i.id === invId);

        if(!invoice) return;

        let html = "";
        Object.keys(invoice).forEach(key => {
            if (!isNaN(key)) {
                const item = invoice[key];
                html += `
                    <div class="return-item-card">
                        <div class="d-flex justify-content-between mb-2">
                            <h6 class="m-0 text-white item-name-text">${item.name}</h6>
                            <small class="text-info">الوحدة: ${item.unit === 'box' ? 'كرتونة' : 'قطعة'}</small>
                        </div>
                        <div class="row g-2">
                            <div class="col-6">
                                <label>الكمية المرتجعة</label>
                                <input type="number" class="form-control qty-input" 
                                       data-stock-id="${item.stockId}" 
                                       data-price="${item.price}" 
                                       data-unit="${item.unit}"
                                       value="0" min="0" max="${item.qty}"
                                       oninput="calculateTotal()">
                            </div>
                            <div class="col-6">
                                <label>الكمية المباعة</label>
                                <input type="text" class="form-control opacity-50" value="${item.qty}" disabled>
                            </div>
                        </div>
                    </div>`;
            }
        });
        container.innerHTML = html || '<div class="text-center opacity-50 p-4">لا توجد أصناف في هذه الفاتورة</div>';
    };

    window.calculateTotal = () => {
        let total = 0;
        document.querySelectorAll('.qty-input').forEach(input => {
            const qty = Number(input.value);
            const max = Number(input.getAttribute('max'));
            if(qty > max) input.value = max;
            total += (Number(input.value) * Number(input.getAttribute('data-price')));
        });
        document.getElementById('returnTotalDisplay').innerText = total.toFixed(2) + " ج.م";
    };

    window.saveReturn = async () => {
        const custSelect = document.getElementById('customerSelect');
        const custId = custSelect.value;
        const custName = custSelect.options[custSelect.selectedIndex].text;
        const totalAmountText = document.getElementById('returnTotalDisplay').innerText;
        const totalAmount = parseFloat(totalAmountText.replace(" ج.م", ""));

        if(!custId || totalAmount <= 0) return alert("برجاء اختيار عميل وتحديد كميات المرتجع");

        const saveBtn = document.getElementById('saveBtn');
        saveBtn.disabled = true;
        saveBtn.innerText = "جاري تحديث المخزن...";

        try {
            const returnedItems = [];
            const inputs = document.querySelectorAll('.qty-input');
            
            for(let input of inputs) {
                const q = Number(input.value);
                if (q > 0) {
                    const stockId = input.getAttribute('data-stock-id');
                    const unitType = input.getAttribute('data-unit');
                    const card = input.closest('.return-item-card');
                    const name = card.querySelector('.item-name-text').innerText;

                    // جلب بيانات الصنف من المخزن لمعرفة المعامل (factor)
                    const stockDoc = await getDoc(doc(db, "inventory", stockId));
                    if (stockDoc.exists()) {
                        const product = stockDoc.data();
                        const factor = product.unitFactor || 1;
                        
                        // حساب الكمية الراجعة بالقطع
                        const qtyInPieces = (unitType === 'box') ? (q * factor) : q;

                        // تحديث المخزن (زيادة totalPcs) وحساب الـ qty الجديد بالكراتين
                        const newTotalPcs = (product.totalPcs || 0) + qtyInPieces;
                        const newQtyInCrates = newTotalPcs / factor;

                        await updateDoc(doc(db, "inventory", stockId), {
                            totalPcs: increment(qtyInPieces),
                            qty: newQtyInCrates // تحديث الكراتين أيضاً للعرض
                        });

                        returnedItems.push({ 
                            name, 
                            qty: q, 
                            unit: unitType,
                            price: Number(input.getAttribute('data-price')) 
                        });
                    }
                }
            }

            // تسجيل حركة المرتجع
            await addDoc(collection(db, "returns"), {
                customerId: custId,
                customerName: custName,
                invoiceId: document.getElementById('invoiceSelect').value,
                totalAmount: totalAmount,
                items: returnedItems,
                time: new Date().toLocaleString('ar-EG'),
                timestamp: serverTimestamp()
            });

            // خصم من مديونية العميل (لو العميل عليه فلوس)
            await updateDoc(doc(db, "customers", custId), {
                currentBalance: increment(-totalAmount)
            });

            alert("تم إرجاع البضاعة للمخزن وتحديث حساب العميل ✅");
            location.reload();
        } catch (e) {
            console.error(e);
            alert("حدث خطأ أثناء الحفظ: " + e.message);
            saveBtn.disabled = false;
        }
    };

    loadCustomers();
</script>

</body>
</html>
