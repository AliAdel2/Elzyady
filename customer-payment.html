<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سند قبض وصرف عملاء - Masar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0d1117; --glass: rgba(255,255,255,0.05); --neon-blue: #58a6ff; --neon-green: #3fb950; }
        body { background: var(--bg); font-family: 'Cairo', sans-serif; color: #c9d1d9; padding-bottom: 30px; }
        
        .header-section { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); background: var(--glass); }
        
        .glass-card { 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 25px; padding: 25px; margin-top: 20px; backdrop-filter: blur(15px); 
        }

        /* أزرار قبض/صرف */
        .transaction-toggle { 
            display: flex; background: rgba(0,0,0,0.3); border-radius: 15px; 
            padding: 5px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.05);
        }
        .t-btn { 
            flex: 1; border: none; background: transparent; color: #8b949e; 
            padding: 12px; border-radius: 12px; font-weight: 700; transition: 0.3s;
        }
        .t-btn.active { background: var(--neon-blue); color: #000; }

        .form-label { font-size: 0.85rem; margin-bottom: 8px; opacity: 0.7; padding-right: 5px; }
        .form-control, .form-select { 
            background: rgba(0,0,0,0.2) !important; border: 1px solid rgba(255,255,255,0.1) !important; 
            color: #fff !important; border-radius: 12px; padding: 12px; margin-bottom: 20px;
        }
        .form-control:focus { border-color: var(--neon-blue) !important; box-shadow: 0 0 15px rgba(88, 166, 255, 0.1); }

        .btn-confirm { 
            background: var(--neon-blue); border: none; color: #000; font-weight: 800; 
            width: 100%; padding: 15px; border-radius: 15px; margin-top: 10px;
            box-shadow: 0 4px 15px rgba(88, 166, 255, 0.3); transition: 0.3s;
        }
        .btn-confirm:active { transform: scale(0.98); }

        .info-tag { background: rgba(88, 166, 255, 0.1); color: var(--neon-blue); padding: 5px 12px; border-radius: 8px; font-size: 0.8rem; margin-bottom: 15px; display: inline-block; }
    </style>
</head>
<body>

<div class="header-section d-flex justify-content-between align-items-center">
    <a href="customer-list.html" class="text-white"><i class="fas fa-chevron-right"></i></a>
    <h5 class="m-0 fw-bold">سند مالي (عملاء)</h5>
    <div style="width: 20px;"></div>
</div>

<div class="container">
    <div class="glass-card">
        <div class="info-tag"><i class="fas fa-user-tag me-1"></i> قسم حسابات العملاء</div>

        <div class="transaction-toggle">
            <button class="t-btn active" id="btnIncome" onclick="setMode('قبض')">سند قبض</button>
            <button class="t-btn" id="btnExpense" onclick="setMode('صرف')">سند صرف</button>
        </div>

        <label class="form-label">اسم العميل</label>
        <select id="partyName" class="form-select">
            <option value="">اختر العميل...</option>
        </select>

        <label class="form-label">التاريخ</label>
        <input type="date" id="docDate" class="form-control">

        <label class="form-label">القيمة (ج.م)</label>
        <input type="number" id="amount" class="form-control" placeholder="0.00">

        <label class="form-label">البيان / ملاحظات</label>
        <textarea id="notes" class="form-control" rows="3" placeholder="مثلاً: دفعة من الحساب / سداد فاتورة رقم..."></textarea>

        <button class="btn-confirm" onclick="confirmTransaction()">تأكيد وتسجيل السند</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, addDoc, serverTimestamp, increment, orderBy, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
        authDomain: "elzyady-da509.firebaseapp.com",
        projectId: "elzyady-da509",
        storageBucket: "elzyady-da509.firebasestorage.app",
        messagingSenderId: "242117738897",
        appId: "1:242117738897:web:d658d6ca335b316f7f9a30"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentMode = 'قبض'; // الافتراضي للعملاء هو القبض
    const urlParams = new URLSearchParams(window.location.search);
    const targetId = urlParams.get('id');

    document.getElementById('docDate').valueAsDate = new Date();

    window.setMode = (mode) => {
        currentMode = mode;
        document.getElementById('btnIncome').classList.toggle('active', mode === 'قبض');
        document.getElementById('btnExpense').classList.toggle('active', mode === 'صرف');
    };

    // تحميل قائمة العملاء فقط
    async function loadCustomers() {
        const select = document.getElementById('partyName');
        const q = query(collection(db, "customers"), orderBy("name"));
        const snap = await getDocs(q);
        
        snap.forEach(doc => {
            const option = document.createElement('option');
            option.value = doc.id;
            option.text = doc.data().name;
            if (doc.id === targetId) option.selected = true;
            select.appendChild(option);
        });
    }

    window.confirmTransaction = async () => {
        const id = document.getElementById('partyName').value;
        const amt = parseFloat(document.getElementById('amount').value);
        const date = document.getElementById('docDate').value;
        const notes = document.getElementById('notes').value;

        if(!id || !amt) return alert("يرجى اختيار العميل وتحديد المبلغ");

        try {
            // 1. تسجيل السند في كولكشن Transactions العام (أو كولكشن مخصص للعملاء حسب رغبتك)
            await addDoc(collection(db, "transactions"), {
                partyId: id,
                partyType: 'customer',
                type: currentMode,
                amount: amt,
                date: date,
                notes: notes,
                createdAt: serverTimestamp()
            });

            // 2. تحديث رصيد العميل
            // لو قبض: العميل دفع فلوس يعني مديونيته تقل (-amt)
            // لو صرف: العميل خد فلوس يعني مديونيته تزيد (+amt)
            const adjustment = currentMode === 'قبض' ? -amt : amt;
            const customerRef = doc(db, "customers", id);
            
            await updateDoc(customerRef, {
                currentBalance: increment(adjustment),
                lastPaymentDate: serverTimestamp() // لتحديث تاريخ آخر سداد
            });

            alert("تم تسجيل السند وتحديث حساب العميل");
            window.location.href = "customer-list.html";
        } catch (e) {
            console.error(e);
            alert("فشل تسجيل العملية");
        }
    };

    loadCustomers();
</script>
</body>
</html>
