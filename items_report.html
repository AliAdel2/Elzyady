<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مراجعة التوريدات - الزيادى</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0d1117; --glass: rgba(255,255,255,0.05); --neon: #58a6ff; --success: #3fb950; --gold: #f1c40f; }
        body { background: var(--bg-dark); font-family: 'Cairo', sans-serif; color: #c9d1d9; padding: 1px; }
        .glass-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .form-control { background: rgba(0,0,0,0.2) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: #fff !important; }
        
        .buy-banner { background: rgba(63, 185, 80, 0.05); border: 1px dashed var(--success); border-radius: 12px; padding: 15px; text-align: center; }
        .total-val { font-size: 2.2rem; font-weight: 700; color: var(--success); }
        
        .sub-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; text-align: center; }
        .val-sub { font-size: 1.3rem; font-weight: 700; display: block; }

        /* البحث */
        .search-box { position: relative; margin-bottom: 15px; }
        .search-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--neon); }
        .search-box .form-control { padding-left: 40px !important; border-radius: 10px; border: 1px solid var(--neon) !important; }

        /* تنسيق الجدول والخطوط */
        .table { color: #c9d1d9; border-collapse: collapse !important; font-size: 0.9rem; }
        .table thead th { background: rgba(255,255,255,0.1) !important; border-bottom: 2px solid var(--neon) !important; color: #fff; padding: 15px 5px !important; }
        .table tbody tr { border-bottom: 1px solid rgba(000, 000, 000, 0.5) !important; transition: 0.2s; }
        .table tbody tr:nth-child(odd) { background: rgba(255,255,255,0.02); }
        .table tbody tr:hover { background: rgba(88, 166, 255, 0.08); }
        
        th, td { vertical-align:middle; white-space:nowrap; padding: 12px 8px !important; border:none !important; }
        .qty-badge { background: var(--neon); color: #fff; padding: 2px 8px; border-radius: 5px; font-weight: bold; }
        .id-col { width: 40px; color: var(--neon); font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container py-3">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold m-0"><i class="fas fa-list-ol text-info me-2"></i> سجل مدخلات المخزن</h4>
        <a href="inventory.html" class="btn btn-outline-light btn-sm">رجوع للمخزن</a>
    </div>

    <div class="glass-card">
        <div class="row g-3 align-items-end">
            <div class="col-md-5 col-6">
                <label class="small opacity-50 mb-1">من تاريخ</label>
                <input type="date" id="dateFrom" class="form-control shadow-none">
            </div>
            <div class="col-md-5 col-6">
                <label class="small opacity-50 mb-1">إلى تاريخ</label>
                <input type="date" id="dateTo" class="form-control shadow-none">
            </div>
            <div class="col-md-2 col-12">
                <button class="btn btn-info w-100 fw-bold" onclick="fetchPurchaseReport()">
                    <i class="fas fa-sync-alt"></i> تحديث
                </button>
            </div>
        </div>
    </div>

    <div id="statsContainer">
        <div class="buy-banner mb-2 shadow-sm">
            <small class="opacity-50">إجمالي تكلفة المشتريات (شراء × كمية)</small>
            <div class="total-val"><span id="grandTotal">0</span> <small style="font-size: 1rem;">EGP</small></div>
            <div id="itemsCount" class="small text-success mt-1">0 صنف مسجل</div>
        </div>

        <div class="row g-2 mb-4">
            <div class="col-6">
                <div class="sub-card" style="border-color: var(--neon);">
                    <small class="opacity-50" style="font-size: 0.7rem;">القيمة البيعية الكلية</small>
                    <span id="totalSellValue" class="val-sub text-info">0</span>
                </div>
            </div>
            <div class="col-6">
                <div class="sub-card" style="border-color: var(--gold);">
                    <small class="opacity-50" style="font-size: 0.7rem;">صافي الربح المتوقع</small>
                    <span id="totalProfitValue" class="val-sub" style="color: var(--gold);">0</span>
                </div>
            </div>
        </div>
    </div>

    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" class="form-control shadow-none" placeholder="ابحث باسم الصنف..." onkeyup="filterTable()">
    </div>

    <div class="glass-card p-0 overflow-hidden">
        <div class="table-responsive">
            <table class="table mb-0" id="mainTable">
                <thead class="text-center">
                    <tr>
                        <th class="id-col">م</th>
                        <th>الوقت</th>
                        <th class="text-start">اسم الصنف</th>
                        <th>الكمية</th>
                        <th>شراء</th>
                        <th>بيع</th>
                        <th>إجمالي التكلفة</th>
                    </tr>
                </thead>
                <tbody id="purchaseTableBody" class="text-center">
                    <tr><td colspan="7" class="py-5 opacity-20">اختر التاريخ لعرض البيانات</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
  authDomain: "elzyady-da509.firebaseapp.com",
  projectId: "elzyady-da509",
  storageBucket: "elzyady-da509.firebasestorage.app",
  messagingSenderId: "242117738897",
  appId: "1:242117738897:web:d658d6ca335b316f7f9a30",
  measurementId: "G-JPRK3BT495"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const today = new Date().toISOString().split('T')[0];
    document.getElementById('dateFrom').value = today;
    document.getElementById('dateTo').value = today;

    let allData = []; // لتخزين البيانات وعمل فلترة سريعة

    window.fetchPurchaseReport = async function() {
        const fromDateStr = document.getElementById('dateFrom').value;
        const toDateStr = document.getElementById('dateTo').value;
        const start = new Date(fromDateStr); start.setHours(0, 0, 0, 0);
        const end = new Date(toDateStr); end.setHours(23, 59, 59, 999);

        const tbody = document.getElementById('purchaseTableBody');
        tbody.innerHTML = '<tr><td colspan="7" class="py-5"><div class="spinner-border text-info"></div></td></tr>';

        try {
            const snap = await getDocs(query(collection(db, "inventory"), orderBy("lastUpdate", "desc")));
            allData = [];

            snap.forEach(doc => {
                const data = doc.data();
                const updateDate = data.lastUpdate?.toDate() || data.timestamp?.toDate();

                if (updateDate && updateDate >= start && updateDate <= end) {
                    allData.push({
                        time: updateDate.toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'}),
                        name: data.name || data.pName || "صنف غير مسمى",
                        qty: parseInt(data.qty || data.pQty || 0),
                        buy: parseFloat(data.buy || data.pBuy || 0),
                        sell: parseFloat(data.sell || data.pSell || 0),
                        rawDate: updateDate
                    });
                }
            });

            renderTable(allData);

        } catch (e) { console.error(e); }
    }

    function renderTable(data) {
        const tbody = document.getElementById('purchaseTableBody');
        let rows = '';
        let tBuy = 0; let tSell = 0;

        data.forEach((item, index) => {
            const subBuy = item.buy * item.qty;
            const subSell = item.sell * item.qty;
            tBuy += subBuy;
            tSell += subSell;

            rows += `
                <tr>
                    <td class="id-col">${index + 1}</td>
                    <td class="small opacity-100">${item.time}</td>
                    <td class="fw-bold text-start ">${item.name}</td>
                    <td><span class="qty-badge">${item.qty}</span></td>
                    <td>${item.buy.toLocaleString()}</td>
                    <td class="text-info">${item.sell.toLocaleString()}</td>
                    <td class="text-success fw-bold">${subBuy.toLocaleString()}</td>
                </tr>
            `;
        });

        tbody.innerHTML = rows || '<tr><td colspan="7" class="py-5 text-secondary">لا توجد نتائج</td></tr>';
        
        // تحديث الكروت
        document.getElementById('grandTotal').innerText = tBuy.toLocaleString();
        document.getElementById('totalSellValue').innerText = tSell.toLocaleString();
        document.getElementById('totalProfitValue').innerText = (tSell - tBuy).toLocaleString();
        document.getElementById('itemsCount').innerText = `${data.length} صنف ظاهر`;
    }

    window.filterTable = function() {
        const val = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allData.filter(item => item.name.toLowerCase().includes(val));
        renderTable(filtered);
    }

    fetchPurchaseReport();
</script>
</body>
</html>
