<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المخزن - Warchat Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0d1117; --glass: rgba(255,255,255,0.05); --neon: #58a6ff; }
        body { background: var(--bg-dark); font-family: 'Cairo', sans-serif; color: #c9d1d9; padding: 2px; }
        .glass-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .form-control, .form-select { background: rgba(0,0,0,0.2) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: #fff !important; }
        .low-stock { border-left: 5px solid #f85149 !important; background: rgba(248, 81, 73, 0.05); }
        .badge-low { background: #f85149; color: white; font-size: 0.7rem; }
        .table { color: #c9d1d9; border-color: rgba(255,255,255,0.05); }
        th, td { vertical-align:middle; white-space:nowrap; padding: 12px 8px !important; }
        tr:hover { background: rgba(255,255,255,0.02); }
        .btn-update { background: #ff9800 !important; color: white !important; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold m-0"><i class="fas fa-boxes text-info me-2"></i> مستودع القطع</h4>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-warning btn-sm" onclick="resetForm()" id="cancelEdit" style="display:none;">إلغاء التعديل</button>
            <a href="index1.html" class="btn btn-outline-light btn-sm">الرئيسية</a>
        </div>
    </div>

    <div class="glass-card">
        <h6 class="text-info mb-3" id="formTitle"><i class="fas fa-plus-circle me-1"></i> إضافة صنف جديد</h6>
        <input type="hidden" id="editId"> <div class="row g-3">
            <div class="col-md-4">
                <label class="small opacity-50">اسم الصنف</label>
                <input type="text" id="pName" class="form-control" placeholder="مثلاً: زيت توتال 5W30">
            </div>
            <div class="col-md-3">
                <label class="small opacity-50">الفئة</label>
                <div class="input-group">
                    <select id="pCategoryList" class="form-select" onchange="document.getElementById('pCategoryNew').value = this.value">
                        <option value="">-- فئة جديدة --</option>
                    </select>
                    <input type="text" id="pCategoryNew" class="form-control w-25" placeholder="اسم الفئة">
                </div>
            </div>
            <div class="col-md-2">
                <label class="small opacity-50">الكمية الحالية</label>
                <input type="number" id="pQty" class="form-control" value="0">
            </div>
            <div class="col-md-3">
                <label class="small opacity-50">الحد الأدنى (تنبيه)</label>
                <input type="number" id="pMin" class="form-control" value="3">
            </div>
            <div class="col-md-3">
                <label class="small opacity-50">سعر الشراء</label>
                <input type="number" id="pBuy" class="form-control" placeholder="0.00">
            </div>
            <div class="col-md-3">
                <label class="small opacity-50">سعر البيع</label>
                <input type="number" id="pSell" class="form-control" placeholder="0.00">
            </div>
            <div class="col-md-6 d-flex align-items-end">
                <button class="btn btn-info w-100 fw-bold" id="saveBtn" onclick="saveToInventory()">
                    <i class="fas fa-save me-2"></i> حفظ في المخزن
                </button>
            </div>
        </div>
    </div>

    <div class="glass-card p-0 overflow-hidden">
        <div class="p-3 border-bottom border-secondary border-opacity-25 d-flex justify-content-between align-items-center">
            <h6 class="m-0">قائمة الجرد المتاحة</h6>
            <input type="text" id="searchStock" class="form-control form-control-sm w-25" placeholder="بحث سريع..." oninput="renderStock()">
        </div>
        <div class="table-responsive">
            <table class="table mb-0 align-middle">
                <thead class="bg-white bg-opacity-5">
                    <tr>
                        <th>الصنف</th>
                        <th>الفئة</th>
                        <th>الكمية</th>
                        <th>سعر البيع</th>
                        <th>الحالة</th>
                        <th class="text-center">إجراء</th>
                    </tr>
                </thead>
                <tbody id="stockTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, updateDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
  apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
  authDomain: "elzyady-da509.firebaseapp.com",
  projectId: "elzyady-da509",
  storageBucket: "elzyady-da509.firebasestorage.app",
  messagingSenderId: "242117738897",
  appId: "1:242117738897:web:d658d6ca335b316f7f9a30",
  measurementId: "G-JPRK3BT495"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let inventoryData = [];

    async function loadInventory() {
        const snap = await getDocs(collection(db, "inventory"));
        inventoryData = [];
        const categories = new Set();
        
        snap.forEach(doc => {
            const data = doc.data();
            inventoryData.push({ id: doc.id, ...data });
            if(data.category) categories.add(data.category);
        });

        const catSelect = document.getElementById('pCategoryList');
        catSelect.innerHTML = '<option value="">-- فئة جديدة --</option>';
        categories.forEach(cat => {
            catSelect.innerHTML += `<option value="${cat}">${cat}</option>`;
        });

        renderStock();
    }

    window.saveToInventory = async function() {
        const id = document.getElementById('editId').value;
        const name = document.getElementById('pName').value;
        const cat = document.getElementById('pCategoryNew').value;
        const qty = parseInt(document.getElementById('pQty').value) || 0;
        const min = parseInt(document.getElementById('pMin').value) || 0;
        const buy = parseFloat(document.getElementById('pBuy').value) || 0;
        const sell = parseFloat(document.getElementById('pSell').value) || 0;

        if(!name || !cat) { alert("برجاء إدخال الاسم والفئة"); return; }

        try {
            const itemData = { name, category: cat, qty, min, buy, sell, lastUpdate: serverTimestamp() };
            
            if(id) {
                // تعديل صنف موجود
                await updateDoc(doc(db, "inventory", id), itemData);
                alert("تم تحديث الصنف بنجاح");
            } else {
                // إضافة صنف جديد
                await addDoc(collection(db, "inventory"), { ...itemData, timestamp: serverTimestamp() });
                alert("تمت الإضافة بنجاح");
            }
            location.reload();
        } catch(e) { console.error(e); }
    }

    window.renderStock = function() {
        const searchTerm = document.getElementById('searchStock').value.toLowerCase();
        const table = document.getElementById('stockTable');
        table.innerHTML = '';

        inventoryData.filter(item => item.name.toLowerCase().includes(searchTerm)).forEach(item => {
            const isLow = item.qty <= item.min;
            table.innerHTML += `
                <tr class="${isLow ? 'low-stock' : ''}">
                    <td><span class="fw-bold">${item.name}</span></td>
                    <td><span class="badge bg-secondary opacity-75">${item.category}</span></td>
                    <td>${item.qty}</td>
                    <td class="text-info fw-bold">${item.sell} EGP</td>
                    <td>${isLow ? '<span class="badge badge-low">نقص مخزون</span>' : '<span class="text-success small">متوفر</span>'}</td>
                    <td class="text-center">
                        <button class="btn btn-sm text-warning me-2" onclick="editItem('${item.id}')"><i class="fas fa-edit"></i></button>
                        <button class="btn btn-sm text-danger" onclick="deleteItem('${item.id}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `;
        });
    }

    // دالة التعديل: تحميل البيانات للفورم
    window.editItem = function(id) {
        const item = inventoryData.find(i => i.id === id);
        if(!item) return;

        document.getElementById('editId').value = item.id;
        document.getElementById('pName').value = item.name;
        document.getElementById('pCategoryNew').value = item.category;
        document.getElementById('pCategoryList').value = item.category;
        document.getElementById('pQty').value = item.qty;
        document.getElementById('pMin').value = item.min;
        document.getElementById('pBuy').value = item.buy;
        document.getElementById('pSell').value = item.sell;

        // تغيير شكل الزرار والعنوان
        document.getElementById('formTitle').innerHTML = `<i class="fas fa-edit me-1"></i> تعديل الصنف: ${item.name}`;
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.innerHTML = `<i class="fas fa-sync-alt me-2"></i> تحديث البيانات`;
        saveBtn.classList.add('btn-update');
        document.getElementById('cancelEdit').style.display = 'block';
        
        // الصعود لأعلى الصفحة
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    window.resetForm = function() {
        location.reload(); // أسهل طريقة لتصفير كل شيء
    }

    window.deleteItem = async function(id) {
        if(confirm("هل تريد حذف هذا الصنف نهائياً؟")) {
            await deleteDoc(doc(db, "inventory", id));
            location.reload();
        }
    }

    loadInventory();
</script>
</body>
</html>
