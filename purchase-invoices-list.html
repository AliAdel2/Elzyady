<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل المشتريات - شركة الزيادى</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg: #0d1117; 
            --card-bg: #161b22;
            --glass: rgba(255,255,255,0.03); 
            --neon-blue: #58a6ff; 
            --neon-green: #3fb950; 
            --neon-yellow: #d29922; 
            --neon-red: #f85149; 
        }

        body { background: var(--bg); font-family: 'Cairo', sans-serif; color: #c9d1d9; padding-bottom: 50px; }

        /* Header Styling */
        .header-section { 
            padding: 15px 20px; background: rgba(13, 17, 23, 0.9); 
            border-bottom: 1px solid rgba(48, 54, 61, 0.8); 
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(12px); 
            display: flex; justify-content: space-between; align-items: center;
        }

        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 20px 15px; }
        .stat-card { 
            background: var(--card-bg); border: 1px solid #30363d; 
            border-radius: 16px; padding: 12px 10px; text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .stat-val { font-size: 1rem; font-weight: 800; display: block; color: #fff; font-family: 'Consolas', monospace; margin-top: 5px; }
        .stat-label { font-size: 0.6rem; color: #8b949e; display: block; }

        /* Search Box */
        .search-box { position: relative; margin-bottom: 20px; padding: 0 5px; }
        .search-box input { 
            background: #0d1117 !important; border: 1px solid #30363d !important; 
            color: #fff !important; border-radius: 12px; padding: 12px 45px 12px 15px; width: 100%; 
            outline: none; transition: 0.3s;
        }
        .search-box input:focus { border-color: var(--neon-blue) !important; box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.1); }
        .search-box i { position: absolute; right: 30px; top: 15px; color: #8b949e; }

        /* Invoice Card Styling */
        .invoice-card { 
            background: var(--card-bg); border: 1px solid #30363d; 
            border-radius: 18px; padding: 16px; margin: 0 5px 12px 5px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; position: relative;
        }
        .invoice-card:hover { border-color: #8b949e; transform: translateY(-2px); background: #1c2128; }
        .invoice-card:active { transform: scale(0.98); }

        /* Return Styling */
        .invoice-card.return-style { border-right: 4px solid var(--neon-red); }
        .invoice-card.purchase-style { border-right: 4px solid var(--neon-blue); }

        .inv-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .sup-name { font-weight: 700; font-size: 1rem; color: #f0f6fc; margin: 0; }
        .inv-date { font-size: 0.7rem; color: #8b949e; margin-top: 2px; display: block; }
        
        .inv-badge { font-size: 0.65rem; padding: 4px 10px; border-radius: 8px; font-weight: bold; }
        .type-cash { background: rgba(63, 185, 80, 0.1); color: var(--neon-green); }
        .type-credit { background: rgba(210, 153, 34, 0.1); color: var(--neon-yellow); }
        .type-return { background: rgba(248, 81, 73, 0.1); color: var(--neon-red); }

        .price-tag { text-align: left; }
        .price-val { font-weight: 800; color: #fff; font-size: 1.2rem; font-family: 'Consolas', monospace; display: block; }
        .price-label { font-size: 0.55rem; color: #8b949e; text-transform: uppercase; }

        .edit-label { font-size: 0.7rem; color: #8b949e; display: flex; align-items: center; gap: 5px; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; }

        .back-btn { width: 38px; height: 38px; border-radius: 10px; background: #21262d; border: 1px solid #30363d; color: #fff; display: flex; align-items: center; justify-content: center; text-decoration: none; }
    </style>
</head>
<body>

<div class="header-section">
    <a href="purchase-mgmt.html" class="back-btn"><i class="fas fa-arrow-right"></i></a>
    <h6 class="m-0 fw-bold">سجل فواتير  <span style="color: var(--neon-blue)">المشتريات</span></h6>
    <i class="fas fa-sync-alt" onclick="init()" style="cursor:pointer; color: #8b949e; font-size: 1.1rem;"></i>
</div>

<div class="container-fluid mt-2">
    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-label">صافي الشراء</span>
            <span class="stat-val text-info" id="totalPurchase">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">المدفوع فعلاً</span>
            <span class="stat-val text-success" id="totalPaid">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">المتبقي</span>
            <span class="stat-val text-danger" id="totalPending">0</span>
        </div>
    </div>

    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="بحث باسم المورد أو التاريخ..." onkeyup="searchInvoices()">
    </div>

    <div id="invoicesContainer">
        <div class="text-center mt-5"><div class="spinner-border text-primary" role="status"></div></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
        authDomain: "elzyady-da509.firebaseapp.com",
        projectId: "elzyady-da509",
        storageBucket: "elzyady-da509.firebasestorage.app",
        messagingSenderId: "242117738897",
        appId: "1:242117738897:web:d658d6ca335b316f7f9a30"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let allInvoices = [];
    let suppliersNames = {};

    window.init = async function() {
        try {
            const supSnap = await getDocs(collection(db, "suppliers"));
            supSnap.forEach(d => suppliersNames[d.id] = d.data().name);

            const [transSnap, voucherSnap] = await Promise.all([
                getDocs(query(collection(db, "supplier_transactions"), orderBy("timestamp", "desc"))),
                getDocs(query(collection(db, "transactions"), where("type", "==", "صرف")))
            ]);
            
            allInvoices = [];
            let totalPurchaseSum = 0;
            let totalReturnSum = 0;
            let totalPaidFromInvoices = 0;

            transSnap.forEach(doc => {
                const data = { id: doc.id, ...doc.data() };
                const amt = Number(data.total) || Number(data.amount) || 0;
                
                if(data.type === "شراء" || data.type === "فاتورة شراء") {
                    data.displayAmount = amt;
                    data.isReturn = false;
                    allInvoices.push(data);
                    totalPurchaseSum += amt;
                    if(data.paymentType === 'cash') totalPaidFromInvoices += amt;
                    else totalPaidFromInvoices += (Number(data.paid) || 0);
                } 
                else if(data.type === "مرتجع شراء") {
                    data.displayAmount = amt;
                    data.isReturn = true;
                    allInvoices.push(data);
                    totalReturnSum += amt;
                }
            });

            let totalVouchersPaid = 0;
            voucherSnap.forEach(v => {
                totalVouchersPaid += Number(v.data().amount || 0);
            });

            const netPurchase = totalPurchaseSum - totalReturnSum;
            const finalPaid = totalPaidFromInvoices + totalVouchersPaid;
            const finalPending = netPurchase - finalPaid;

            document.getElementById('totalPurchase').innerText = netPurchase.toLocaleString();
            document.getElementById('totalPaid').innerText = finalPaid.toLocaleString();
            document.getElementById('totalPending').innerText = Math.max(0, finalPending).toLocaleString();

            renderInvoices(allInvoices);
        } catch (error) {
            console.error(error);
            document.getElementById('invoicesContainer').innerHTML = '<div class="text-danger text-center p-4">حدث خطأ في جلب البيانات</div>';
        }
    }

    function renderInvoices(dataList) {
        const container = document.getElementById('invoicesContainer');
        if(dataList.length === 0) {
            container.innerHTML = '<div class="text-center opacity-50 mt-5">لا توجد سجلات حالياً</div>';
            return;
        }

        container.innerHTML = dataList.map(inv => `
            <div class="invoice-card ${inv.isReturn ? 'return-style' : 'purchase-style'}" onclick="window.location.href='new-purchase-invoice.html?edit=${inv.id}'">
                <div class="inv-header">
                    <div>
                        <p class="sup-name">${suppliersNames[inv.supplierId] || 'مورد غير معروف'}</p>
                        <span class="inv-date"><i class="far fa-calendar-alt me-1"></i> ${inv.date || 'بلا تاريخ'}</span>
                    </div>
                    <span class="inv-badge ${inv.isReturn ? 'type-return' : (inv.paymentType === 'cash' ? 'type-cash' : 'type-credit')}">
                        ${inv.isReturn ? '<i class="fas fa-undo-alt me-1"></i>مرتجع' : (inv.paymentType === 'cash' ? '<i class="fas fa-money-bill-wave me-1"></i>نقدي' : '<i class="fas fa-user-clock me-1"></i>آجل')}
                    </span>
                </div>
                
                <div class="d-flex justify-content-between align-items-end mt-3">
                    <div class="edit-label">
                         <i class="fas fa-info-circle"></i>
                         <span>تفاصيل العملية</span>
                    </div>
                    <div class="price-tag">
                        <span class="price-label">المبلغ الإجمالي</span>
                        <span class="price-val" style="color: ${inv.isReturn ? 'var(--neon-red)' : '#fff'}">
                            ${inv.isReturn ? '-' : ''}${Number(inv.displayAmount).toLocaleString()}
                            <small style="font-size: 0.6rem;">ج.م</small>
                        </span>
                    </div>
                </div>
            </div>
        `).join('');
    }

    window.searchInvoices = () => {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allInvoices.filter(inv => {
            const name = (suppliersNames[inv.supplierId] || '').toLowerCase();
            return name.includes(term) || (inv.date && inv.date.includes(term));
        });
        renderInvoices(filtered);
    };

    init();
</script>
</body>
</html>
