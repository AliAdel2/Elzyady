<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شركة الزيادي | Sanad POS Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-deep: #0d1117;
            --bg-card: #161b22;
            --glass: rgba(255, 255, 255, 0.03);
            --accent: #58a6ff;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --danger: #f85149;
            --success: #3fb950;
            --border: rgba(48, 54, 61, 0.8);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-deep);
            margin: 0;
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* --- Header --- */
        header.top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: rgba(13, 17, 23, 0.8);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .nav-icons { display: flex; gap: 18px; align-items: center; }
        .nav-icons i { font-size: 20px; color: var(--text-secondary); cursor: pointer; transition: 0.3s; }
        .nav-icons i:hover { color: var(--accent); }

        .app-title { font-size: 16px; font-weight: 700; letter-spacing: 0.5px; color: var(--text-primary); }

        .logout-btn {
            background: rgba(248, 81, 73, 0.1);
            color: var(--danger);
            border: 1px solid rgba(248, 81, 73, 0.2);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* --- Dashboard Grid --- */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
            margin-bottom: 100px;
        }

        @media (min-width: 768px) {
            .dashboard { grid-template-columns: repeat(4, 1fr); padding: 40px 10%; }
        }

        /* تعديل تصميم الكارت ليكون رابط */
        .card-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px 10px;
            text-align: center;
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            height: 100%;
        }

        .card:hover { transform: translateY(-5px); border-color: var(--accent); background: #1c2128; }

        .icon-box {
            width: 45px;
            height: 45px;
            background: rgba(88, 166, 255, 0.05);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            color: var(--accent);
            font-size: 20px;
            border: 1px solid rgba(88, 166, 255, 0.1);
        }

        .card p { margin: 0; font-size: 13px; font-weight: 600; color: var(--text-secondary); }
        .card:hover p { color: var(--text-primary); }

        /* --- Sidebar --- */
        .sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 85%;
            max-width: 320px;
            height: 100%;
            background: var(--bg-deep);
            z-index: 2000;
            transition: 0.4s ease;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar.active { right: 0; }

        .sidebar-user {
            padding: 40px 25px;
            background: linear-gradient(to bottom left, #161b22, #0d1117);
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .sidebar-user h5 { margin: 0; font-size: 16px; color: var(--text-primary); }
        .sidebar-user span { font-size: 11px; color: var(--text-secondary); }

        .menu-list { padding: 15px; flex-grow: 1; overflow-y: auto; }
        .menu-label { font-size: 11px; color: var(--accent); text-transform: uppercase; margin: 15px 10px 8px; display: block; opacity: 0.7; }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border-radius: 10px;
            color: var(--text-secondary);
            text-decoration: none;
            margin-bottom: 4px;
            transition: 0.2s;
        }

        .menu-item i { width: 30px; font-size: 16px; }
        .menu-item:hover { background: var(--glass); color: var(--accent); }
        .menu-item.active { background: rgba(88, 166, 255, 0.1); color: var(--accent); }

        /* --- Bottom Bar --- */
        .bottom-bar {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 450px;
            background: rgba(22, 27, 34, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 18px;
            display: flex;
            padding: 10px;
            border: 1px solid var(--border);
            z-index: 1000;
        }

        .nav-action {
            flex: 1;
            text-align: center;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 10px;
        }

        .nav-action i { display: block; font-size: 18px; margin-bottom: 4px; color: var(--accent); }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: none; z-index: 1500;
        }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay"></div>

    <header class="top-nav">
        <div class="nav-icons">
            <i class="fas fa-align-right" onclick="toggleMenu()"></i>
        </div>
        <div class="app-title">شركة <span style="color:var(--accent)">الزيادى</span></div>
        <div class="nav-icons">
            <a href="index.html" class="logout-btn">
                <i class="fas fa-power-off"></i>
                خروج
            </a>
        </div>
    </header>

    <div class="dashboard">
        <a href="mabiat-menu.html" class="card-link">
            <div class="card">
                <div class="icon-box"><i class="fas fa-cash-register"></i></div>
                <p>المبيعات</p>
            </div>
        </a>
        <a href="purchase-mgmt.html" class="card-link">
            <div class="card">
                <div class="icon-box"><i class="fas fa-cart-arrow-down"></i></div>
                <p>المشتريات</p>
            </div>
        </a>
        <a href="inventory-menu.html" class="card-link">
            <div class="card">
                <div class="icon-box"><i class="fas fa-boxes-stacked"></i></div>
                <p>المخزن</p>
            </div>
        </a>
        <a href="client_menu.html" class="card-link">
            <div class="card">
                <div class="icon-box"><i class="fas fa-user-group"></i></div>
                <p>العملاء</p>
            </div>
        </a>
        <a href="supplier-management.html" class="card-link">
            <div class="card">
                <div class="icon-box"><i class="fas fa-truck-loading"></i></div>
                <p>الموردين</p>
            </div>
        </a>
        <a href="#" class="card-link">
            <div class="card">
                <div class="icon-box"><i class="fas fa-vault"></i></div>
                <p>الخزينة</p>
            </div>
        </a>
        <a href="#" class="card-link">
            <div class="card">
                <div class="icon-box"><i class="fas fa-receipt"></i></div>
                <p>المصروفات</p>
            </div>
        </a>
        <a href="#" class="card-link">
            <div class="card">
                <div class="icon-box"><i class="fas fa-chart-line"></i></div>
                <p>التقارير</p>
            </div>
        </a>
    </div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-user">
            <i class="fas fa-user-tie" style="font-size: 40px; color: var(--accent); margin-bottom: 10px;"></i>
            <h5> شركة الزيادى </h5>
            <span>مدير النظام</span>
        </div>
        
        <div class="menu-list">
            <span class="menu-label">العمليات اليومية</span>
            <a href="#" class="menu-item active"><i class="fas fa-house"></i> الرئيسية</a>
            <a href="transactions.html" class="menu-item"><i class="fas fa-exchange-alt"></i> حركة المعاملات</a>
            <a href="purchase-orders-list.html" class="menu-item"><i class="fas fa-file-invoice"></i> طلبات الشراء</a>

            <span class="menu-label">البيانات الأساسية</span>
            <a href="inventory-list.html" class="menu-item"><i class="fas fa-box-open"></i> إدارة الأصناف</a>
            <a href="supplier-list.html" class="menu-item"><i class="fas fa-truck"></i> سجل الموردين</a>
            <a href="customer-list.html" class="menu-item"><i class="fas fa-users-gear"></i> سجل العملاء</a>

            <span class="menu-label">النظام</span>
            <a href="settings.html" class="menu-item"><i class="fas fa-gears"></i> إعدادات البرنامج</a>
            <a href="#" class="menu-item"><i class="fas fa-shield-halved"></i> الأمان والنسخ</a>
        </div>
    </aside>

    <nav class="bottom-bar">
        <a href="sales-invoice.html" class="nav-action">
            <i class="fas fa-plus-circle"></i>
            بيع سريع
        </a>
        <a href="add-customer.html" class="nav-action">
            <i class="fas fa-user-plus"></i>
            إضافة عميل
        </a>
        <a href="#" class="nav-action">
            <i class="fas fa-money-bill-transfer"></i>
            قيد مصروف
        </a>
    </nav>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
        document.getElementById('overlay').onclick = toggleMenu;
    </script>

</body>
</html>
