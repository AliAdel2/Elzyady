<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أرصدة أول المدة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0d1117; --glass: rgba(255,255,255,0.05); --neon-blue: #58a6ff; }
        body { background: var(--bg); font-family: 'Cairo', sans-serif; color: #c9d1d9; padding-bottom: 50px; }
        
        .header-section { 
            padding: 20px; background: var(--glass); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
        }

        .info-alert {
            background: rgba(88, 166, 255, 0.1); border: 1px dashed var(--neon-blue);
            border-radius: 15px; padding: 15px; margin: 20px 0; font-size: 0.85rem; color: #58a6ff;
        }

        .sup-row {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; padding: 15px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .sup-name { font-weight: 700; font-size: 0.95rem; display: block; }
        .sup-phone { font-size: 0.75rem; color: #8b949e; }

        .input-group-custom { width: 140px; }
        .balance-input {
            background: rgba(255,255,255,0.08) !important; border: 1px solid rgba(255,255,255,0.2) !important;
            color: #fff !important; text-align: center; border-radius: 10px !important; font-weight: bold;
        }
        .balance-input:focus { border-color: var(--neon-blue) !important; box-shadow: none; }

        .save-all-btn {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: linear-gradient(45deg, #007bff, #00d4ff);
            border: none; border-radius: 15px; padding: 15px; font-weight: 700;
            box-shadow: 0 5px 20px rgba(0, 123, 255, 0.4); z-index: 1001;
        }

        .search-box {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: #fff; padding: 12px; margin-bottom: 15px; width: 100%;
        }
    </style>
</head>
<body>

<div class="header-section">
    <a href="supplier-list.html" class="text-white"><i class="fas fa-arrow-right"></i></a>
    <h5 class="m-0 fw-bold">أرصدة أول المدة</h5>
    <div style="width: 20px;"></div>
</div>

<div class="container">
    <div class="info-alert text-center">
        <i class="fas fa-info-circle me-1"></i> يتم ضبط الرصيد الافتتاحي للموردين لبدء الدورة المحاسبية.
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="بحث باسم المورد لضبط رصيده...">

    <div id="suppliersList">
        <div class="text-center mt-5"><div class="spinner-border text-primary"></div></div>
    </div>
</div>

<button class="btn btn-primary save-all-btn" id="saveAllBtn">
    <i class="fas fa-cloud-upload-alt me-2"></i> حفظ جميع التغييرات
</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
        authDomain: "elzyady-da509.firebaseapp.com",
        projectId: "elzyady-da509",
        storageBucket: "elzyady-da509.firebasestorage.app",
        messagingSenderId: "242117738897",
        appId: "1:242117738897:web:d658d6ca335b316f7f9a30"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadSuppliers() {
        const listDiv = document.getElementById('suppliersList');
        try {
            const querySnapshot = await getDocs(collection(db, "suppliers"));
            let html = '';
            
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                html += `
                    <div class="sup-row" data-name="${data.name.toLowerCase()}">
                        <div>
                            <span class="sup-name">${data.name}</span>
                            <span class="sup-phone">${data.phone || 'بدون هاتف'}</span>
                        </div>
                        <div class="input-group-custom">
                            <input type="number" 
                                   class="form-control balance-input" 
                                   data-id="${doc.id}" 
                                   value="${data.openingBalance || 0}" 
                                   placeholder="0.00">
                        </div>
                    </div>
                `;
            });

            listDiv.innerHTML = html;

            // تفعيل البحث
            document.getElementById('searchInput').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.sup-row').forEach(row => {
                    row.style.display = row.getAttribute('data-name').includes(term) ? 'flex' : 'none';
                });
            });

        } catch (error) {
            listDiv.innerHTML = '<div class="text-center text-danger">خطأ في تحميل البيانات</div>';
        }
    }

    // حفظ الكل باستخدام Batch (لحماية البيانات وسرعة التنفيذ)
    document.getElementById('saveAllBtn').addEventListener('click', async () => {
        const btn = document.getElementById('saveAllBtn');
        const inputs = document.querySelectorAll('.balance-input');
        
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> جاري تحديث الأرصدة...';

        try {
            const batch = writeBatch(db);
            
            inputs.forEach(input => {
                const supId = input.getAttribute('data-id');
                const newVal = Number(input.value);
                const docRef = doc(db, "suppliers", supId);
                
                // تحديث الرصيد الافتتاحي والحالي (بافتراض أن البداية هي الرصيد الافتتاحي)
                batch.update(docRef, { 
                    openingBalance: newVal,
                    currentBalance: newVal // عند ضبط أول المدة، الرصيد الحالي يتساوى معه
                });
            });

            await batch.commit();
            alert("تم تحديث جميع أرصدة أول المدة بنجاح ✅");
            window.location.reload();
        } catch (error) {
            console.error(error);
            alert("حدث خطأ أثناء الحفظ");
            btn.disabled = false;
            btn.innerHTML = 'حفظ جميع التغييرات';
        }
    });

    loadSuppliers();
</script>
</body>
</html>
