<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة الجرد - شركة الزيادي</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg-dark: #0d1117; 
            --glass: rgba(255,255,255,0.05); 
            --neon-blue: #58a6ff;
            --neon-red: #f85149;
            --neon-green: #3fb950;
        }

        body { background: var(--bg-dark); font-family: 'Cairo', sans-serif; color: #ffffff; padding-bottom: 50px; }
        .stat-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; text-align: center; height: 100%; }
        .stat-value { font-size: 1.4rem; font-weight: 700; display: block; }
        .inventory-container { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; overflow: hidden; }
        .search-box { background: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; border-radius: 12px; }
        .table { color: #ffffff !important; margin-bottom: 0; background: transparent !important; white-space: nowrap; }
        .table thead th { background: rgba(255, 255, 255, 0.05) !important; color: var(--neon-blue) !important; border-bottom: 1px solid rgba(255,255,255,0.1) !important; padding: 15px; }
        .table tbody td { background: transparent !important; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05) !important; color: #ffffff !important; }
        .low-stock-row { background: rgba(248, 81, 73, 0.1) !important; border-right: 4px solid var(--neon-red); }
        .action-btn { width: 32px; height: 32px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; text-decoration: none; }
        .btn-edit:hover { background: var(--neon-blue); color: #000; }
        .btn-delete:hover { background: var(--neon-red); color: #fff; }
        .price-text { color: var(--neon-blue); font-weight: 700; }
        .total-pcs-text { color: var(--neon-green); font-weight: 700; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold m-0 text-white"><i class="fas fa-boxes me-2"></i> قائمة الجرد اللحظية</h4>
        <div class="d-flex gap-2">
            <a href="trash.html" class="btn btn-outline-danger btn-sm px-3"><i class="fas fa-trash-restore"></i> السلة</a>
            <a href="inventory-menu.html" class="btn btn-outline-light btn-sm px-3">رجوع</a>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-12">
            <div class="stat-card border-bottom border-success border-3">
                <span class="stat-value text-success" id="totalValue">0</span>
                <small>إجمالي قيمة بضاعة المخزن (بسعر الشراء)</small>
            </div>
        </div>
        <div class="col-6">
            <div class="stat-card">
                <span class="stat-value text-white" id="totalItems">0</span>
                <small>عدد الأصناف</small>
            </div>
        </div>
        <div class="col-6">
            <div class="stat-card">
                <span class="stat-value text-danger" id="lowStockCount">0</span>
                <small>أصناف أوشكت على النفاذ</small>
            </div>
        </div>
    </div>

    <div class="mb-3 d-flex gap-2">
        <input type="text" id="searchStock" class="form-control search-box" placeholder="بحث باسم الصنف أو الباركود..." oninput="renderStock()">
        <button class="btn btn-info px-3" onclick="location.href='add-product.html'"><i class="fas fa-plus"></i></button>
    </div>

    <div class="inventory-container">
        <div class="table-responsive">
            <table class="table text-center align-middle">
                <thead>
                    <tr>
                        <th class="text-start">المنتج</th>
                        <th>الفئة</th>
                        <th>الكمية الحالية</th>
                        <th>الرصيد (قطعة)</th>
                        <th>سعر البيع</th>
                        <th>الحالة</th>
                        <th>إجراء</th>
                    </tr>
                </thead>
                <tbody id="stockTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, updateDoc, doc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
        authDomain: "elzyady-da509.firebaseapp.com",
        projectId: "elzyady-da509",
        storageBucket: "elzyady-da509.firebasestorage.app",
        messagingSenderId: "242117738897",
        appId: "1:242117738897:web:d658d6ca335b316f7f9a30"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let inventoryData = [];

    // استماع لحظي للبيانات مع فلترة المحذوفات "سوفت ديليت"
    function listenToInventory() {
        onSnapshot(collection(db, "inventory"), (snap) => {
            // نجلب فقط الأصناف التي ليس بها isDeleted == true
            inventoryData = [];
            snap.forEach(docSnap => {
                const data = docSnap.data();
                if (data.isDeleted !== true) {
                    inventoryData.push({ id: docSnap.id, ...data });
                }
            });
            updateStats();
            renderStock();
        });
    }

    function updateStats() {
        document.getElementById('totalItems').innerText = inventoryData.length;
        let totalVal = 0;
        let low = 0;

        inventoryData.forEach(i => {
            const factor = Number(i.unitFactor) || 1;
            const currentTotalPcs = Number(i.totalPcs) || 0;
            const minTotalPcs = (Number(i.min) || 0) * factor;

            if (currentTotalPcs <= minTotalPcs) low++;
            totalVal += (currentTotalPcs / factor) * (Number(i.buy) || 0);
        });

        document.getElementById('lowStockCount').innerText = low;
        document.getElementById('totalValue').innerText = Math.round(totalVal).toLocaleString() + " EGP";
    }

    window.renderStock = function() {
        const term = document.getElementById('searchStock').value.toLowerCase();
        const tbody = document.getElementById('stockTable');
        tbody.innerHTML = '';

        inventoryData.filter(i => 
            i.name.toLowerCase().includes(term) || 
            (i.barcode && i.barcode.includes(term))
        ).forEach(item => {
            const factor = Number(item.unitFactor) || 1;
            const totalPcs = Number(item.totalPcs) || 0;
            const boxes = Math.floor(totalPcs / factor);
            const pieces = totalPcs % factor;
            const isLow = totalPcs <= ((Number(item.min) || 0) * factor);
            
            let qtyDisplay = `${boxes} ك`;
            if(pieces > 0) qtyDisplay += ` و ${pieces} ق`;

            tbody.innerHTML += `
                <tr class="${isLow ? 'low-stock-row' : ''}">
                    <td class="text-start">
                        <div class="fw-bold text-white">${item.name}</div>
                        <small class="text-muted" style="font-size:0.7rem">${item.barcode || '---'}</small>
                    </td>
                    <td><span class="badge bg-secondary opacity-75">${item.category}</span></td>
                    <td><span class="fw-bold">${qtyDisplay}</span></td>
                    <td><span class="total-pcs-text">${totalPcs}</span></td>
                    <td class="price-text">${Number(item.sell).toLocaleString()}</td>
                    <td><span class="small ${isLow ? 'text-danger' : 'text-success'}">${isLow ? 'ناقص' : 'متوفر'}</span></td>
                    <td>
                        <div class="d-flex gap-2 justify-content-center">
                            <a href="add-product.html?edit=${item.id}" class="action-btn btn-edit"><i class="fas fa-edit"></i></a>
                            <button onclick="softDeleteItem('${item.id}', '${item.name}')" class="action-btn btn-delete"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                </tr>
            `;
        });
    }

    // تعديل دالة الحذف لتصبح "سوفت ديليت"
    window.softDeleteItem = async (id, name) => {
        if(confirm(`هل أنت متأكد من نقل "${name}" إلى سلة المحذوفات؟`)) { 
            try {
                await updateDoc(doc(db, "inventory", id), { 
                    isDeleted: true,
                    deletedAt: serverTimestamp() 
                });
                // لا نحتاج لعمل ريندر لأن onSnapshot سيتكفل بالأمر
            } catch (e) {
                console.error(e);
                alert("حدث خطأ أثناء الحذف");
            }
        }
    }

    listenToInventory();
</script>
</body>
</html>
