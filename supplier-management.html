<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الموردين - شركة الزيادى</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg: #0d1117; 
            --glass: rgba(255,255,255,0.05); 
            --neon-blue: #58a6ff; 
            --neon-green: #3fb950; 
            --neon-orange: #f0883e;
            --neon-purple: #bc8cff;
        }

        body { 
            background: var(--bg); 
            font-family: 'Cairo', sans-serif; 
            color: #c9d1d9; 
            min-height: 100vh;
        }

        .header-section {
            padding: 30px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-link {
            color: #8b949e;
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .main-title {
            font-weight: 800;
            font-size: 1.8rem;
            color: #fff;
            margin: 0;
            text-align: center;
            flex-grow: 1;
        }

        .menu-container {
            padding: 0 20px;
        }

        .menu-card {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
        }

        .menu-card:active {
            transform: scale(0.97);
            background: rgba(255,255,255,0.1);
        }

        .menu-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-direction: row-reverse; /* لضبط الاتجاه حسب الصورة */
        }

        .icon-box {
            width: 55px;
            height: 55px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .text-content {
            text-align: right;
        }

        .card-title {
            color: #fff;
            font-weight: 700;
            font-size: 1.1rem;
            margin: 0;
        }

        .card-desc {
            color: #8b949e;
            font-size: 0.8rem;
            margin: 5px 0 0 0;
        }

        .chevron {
            color: #484f58;
            font-size: 1rem;
        }

        /* Colors based on your icons */
        .bg-green { background: rgba(63, 185, 80, 0.15); color: var(--neon-green); }
        .bg-blue { background: rgba(88, 166, 255, 0.15); color: var(--neon-blue); }
        .bg-orange { background: rgba(240, 136, 62, 0.15); color: var(--neon-orange); }
        .bg-purple { background: rgba(188, 140, 255, 0.15); color: var(--neon-purple); }

    </style>
</head>
<body>

<div class="header-section">
    <a href="index1.html" class="back-link">رجوع <i class="fas fa-chevron-left"></i></a>
    <h1 class="main-title">إدارة الموردين</h1>
    <div style="width: 60px;"></div> </div>

<div class="menu-container">
    
    <a href="add-supplier.html" class="menu-card">
        <i class="fas fa-chevron-right chevron"></i>
        <div class="menu-info">
            <div class="text-content">
                <h3 class="card-title">إضافة مورد جديد</h3>
                <p class="card-desc">سجل بيانات المورد والحد الائتماني</p>
            </div>
            <div class="icon-box bg-green">
                <i class="fas fa-user-plus"></i>
            </div>
        </div>
    </a>
    
        <a href="supplier-list.html" class="menu-card">
        <i class="fas fa-chevron-right chevron"></i>
        <div class="menu-info">
            <div class="text-content">
                <h3 class="card-title">عرض وتعديل القائمة</h3>
                <p class="card-desc">البحث في قائمة الموردين وتحديث بياناتهم</p>
            </div>
            <div class="icon-box bg-purple">
                <i class="fas fa-users-cog"></i>
            </div>
        </div>
    </a>

    <a href="supplier-debts.html" class="menu-card">
        <i class="fas fa-chevron-right chevron"></i>
        <div class="menu-info">
            <div class="text-content">
                <h3 class="card-title">مديونيات الموردين</h3>
                <p class="card-desc">متابعة كافة فواتير الآجل غير المحصلة</p>
            </div>
            <div class="icon-box bg-orange">
                <i class="fas fa-truck-loading"></i>
            </div>
        </div>
    </a>

    <a href="supplier-opening-balance.html" class="menu-card">
        <i class="fas fa-chevron-right chevron"></i>
        <div class="menu-info">
            <div class="text-content">
                <h3 class="card-title">الأرصدة الإفتتاحية</h3>
                <p class="card-desc">ضبط أرصدة أول المدة للموردين</p>
            </div>
            <div class="icon-box bg-blue">
                <i class="fas fa-wallet"></i>
            </div>
        </div>
    </a>

</div>

</body>
</html>
