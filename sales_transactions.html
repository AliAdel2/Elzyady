<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل مبيعات</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0d1117; --card-bg: #161b22; --neon-blue: #58a6ff; --neon-green: #3fb950; --neon-red: #f85149; }
        body { background: var(--bg); font-family: 'Cairo', sans-serif; color: #c9d1d9; padding-bottom: 50px; }
        .header-nav { background: #010409; padding: 15px 20px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .stats-container { display: flex; gap: 10px; padding: 15px; overflow-x: auto; scrollbar-width: none; }
        .stat-card { background: var(--card-bg); border: 1px solid #30363d; border-radius: 15px; padding: 15px; min-width: 120px; flex: 1; text-align: center; }
        .stat-title { font-size: 0.75rem; color: #8b949e; margin-bottom: 5px; }
        .stat-value { font-weight: 800; font-size: 1rem; font-family: 'Consolas', monospace; }
        .search-container { padding: 0 15px 15px 15px; position: relative; }
        .search-input { width: 100%; background: var(--card-bg); border: 1px solid #30363d; padding: 12px 45px 12px 20px; border-radius: 12px; color: #fff; outline: none; }
        .search-icon { position: absolute; right: 30px; top: 50%; transform: translateY(-50%); color: var(--neon-blue); }
        .inv-card { background: var(--card-bg); border: 1px solid #30363d; border-radius: 20px; padding: 18px; margin: 0 15px 15px 15px; transition: 0.3s; }
        .rem-badge { font-size: 0.7rem; background: rgba(248, 81, 73, 0.1); color: var(--neon-red); padding: 3px 10px; border-radius: 8px; font-weight: bold; }
        .cash-badge { font-size: 0.7rem; background: rgba(63, 185, 80, 0.1); color: var(--neon-green); padding: 3px 10px; border-radius: 8px; font-weight: bold; }
        .action-icons { display: flex; justify-content: space-between; margin-top: 15px; padding-top: 15px; border-top: 1px solid #30363d; }
        .action-btn { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: #161b22; border: 1px solid var(--neon-blue); border-radius: 20px; color: #fff; }
        #printFrame { display: none; }
    </style>
</head>
<body>

<div class="header-nav">
    <i class="fas fa-sync-alt" onclick="loadInvoices()" style="cursor:pointer; color: #8b949e;"></i>
    <h6 class="m-0 fw-bold">سجل المبيعات <span style="color: var(--neon-blue)"></span></h6>
    <a href="sales-invoice.html" style="color: var(--neon-blue); font-size: 1.4rem;"><i class="fas fa-plus-circle"></i></a>
</div>

<div class="stats-container">
    <div class="stat-card"><div class="stat-title">إجمالي المبيعات</div><div class="stat-value text-info" id="totalAll">0</div></div>
    <div class="stat-card"><div class="stat-title">المحصل فعلياً</div><div class="stat-value text-success" id="paidAll">0</div></div>
    <div class="stat-card"><div class="stat-title">إجمالي الآجل</div><div class="stat-value text-danger" id="remAll">0</div></div>
</div>

<div class="search-container">
    <i class="fas fa-search search-icon"></i>
    <input type="text" id="searchInput" class="search-input" placeholder="بحث باسم العميل...">
</div>

<div id="listContainer">
    <div class="text-center p-5"><div class="spinner-border text-primary"></div></div>
</div>

<div class="modal fade" id="viewModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-body" id="modalBody"></div>
            <div class="p-3"><button class="btn btn-dark w-100 rounded-pill" data-bs-dismiss="modal">إغلاق</button></div>
        </div>
    </div>
</div>

<iframe id="printFrame"></iframe>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy, doc, deleteDoc, updateDoc, increment, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
        authDomain: "elzyady-da509.firebaseapp.com",
        projectId: "elzyady-da509",
        storageBucket: "elzyady-da509.firebasestorage.app",
        messagingSenderId: "242117738897",
        appId: "1:242117738897:web:d658d6ca335b316f7f9a30"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allInvoices = [];

    window.loadInvoices = async () => {
        try {
            // جلب الفواتير والسندات (Transactions)
            const [invSnap, transSnap] = await Promise.all([
                getDocs(query(collection(db, "invoices"), orderBy("timestamp", "desc"))),
                getDocs(query(collection(db, "transactions"), where("type", "==", "قبض")))
            ]);

            allInvoices = invSnap.docs.map(d => ({id: d.id, ...d.data()}));
            
            let totalSales = 0;
            let totalRemainingInInvoices = 0;
            let totalPaidAtInvoiceTime = 0;

            allInvoices.forEach(inv => {
                const total = Number(inv.total || 0);
                const rem = Number(inv.remaining || 0);
                totalSales += total;
                totalRemainingInInvoices += rem;
                totalPaidAtInvoiceTime += (total - rem); // ما تم دفعه لحظة الفاتورة
            });

            // حساب إجمالي السندات المحصلة من جدول الترانزاكشن
            let totalFromReceipts = 0;
            transSnap.forEach(t => {
                totalFromReceipts += Number(t.data().amount || 0);
            });

            // المحصل فعلياً = المقبوض من الفواتير + المقبوض من السندات
            // (بشرط أن سند القبض يُنقص مديونية العميل في قاعدة البيانات)
            const actualPaid = totalPaidAtInvoiceTime + totalFromReceipts;

            document.getElementById('totalAll').innerText = totalSales.toLocaleString();
            document.getElementById('remAll').innerText = (totalSales - actualPaid).toLocaleString();
            document.getElementById('paidAll').innerText = actualPaid.toLocaleString();
            
            render();
        } catch (e) { console.error(e); }
    };

    function render() {
        const container = document.getElementById('listContainer');
        container.innerHTML = allInvoices.map(inv => `
            <div class="inv-card" data-name="${inv.customerName || ''}">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <b class="d-block text-white mb-1">${inv.customerName || 'عميل نقدي'}</b>
                        <small class="text-muted"><i class="far fa-calendar-alt"></i> ${inv.time}</small>
                    </div>
                    <div class="text-end">
                        <div class="fw-bold text-info">${Number(inv.total).toLocaleString()}</div>
                        ${inv.remaining > 0 ? `<div class="rem-badge mt-2">آجل: ${inv.remaining}</div>` : `<div class="cash-badge mt-2">خالص</div>`}
                    </div>
                </div>
                <div class="action-icons">
                    <button class="action-btn" onclick="showInv('${inv.id}')"><i class="fas fa-eye text-info"></i></button>
                    <button class="action-btn" onclick="editInv('${inv.id}')"><i class="fas fa-edit text-success"></i></button>
                    <button class="action-btn" onclick="printInv('${inv.id}')"><i class="fas fa-print text-warning"></i></button>
                    <button class="action-btn" onclick="deleteInv('${inv.id}')"><i class="fas fa-trash-alt text-danger"></i></button>
                </div>
            </div>
        `).join('');
    }

    window.printInv = (id) => {
        const inv = allInvoices.find(i => i.id === id);
        let rows = "";
        Object.keys(inv).forEach(k => {
            if(!isNaN(k)) {
                rows += `<tr>
                    <td style="text-align:right; padding:5px; border-bottom:1px dashed #ccc;">${inv[k].name}</td>
                    <td style="text-align:center;">${inv[k].qty}</td>
                    <td style="text-align:center;">${Number(inv[k].price || 0).toLocaleString()}</td>
                    <td style="text-align:left;">${(inv[k].qty * (inv[k].price || 0)).toLocaleString()}</td>
                </tr>`;
            }
        });

        const content = `
            <html dir="rtl"><head><style>
                body { font-family: 'Arial'; padding: 10px; width: 72mm; font-size: 11px; }
                .h { text-align: center; border-bottom: 2px solid #000; margin-bottom: 10px; }
                table { width: 100%; border-collapse: collapse; }
                th { border-bottom: 1px solid #000; padding: 5px 2px; font-size: 10px; }
                .total-sec { border-top: 1px solid #000; margin-top: 10px; padding-top: 5px; font-weight: bold; }
            </style></head>
            <body>
                <div class="h"><h3>شركة الزيادي</h3><p>قطع غيار وزيوت</p><small>${inv.time}</small></div>
                <p><b>العميل:</b> ${inv.customerName}</p>
                <table>
                    <thead><tr><th>البيان</th><th>كمية</th><th>سعر</th><th>إجمالي</th></tr></thead>
                    <tbody>${rows}</tbody>
                </table>
                <div class="total-sec">
                    <div style="display:flex; justify-content:space-between"><span>الإجمالي:</span><span>${Number(inv.total).toLocaleString()} ج.م</span></div>
                    ${inv.remaining > 0 ? `<div style="display:flex; justify-content:space-between; color:red"><span>المتبقي:</span><span>${inv.remaining.toLocaleString()} ج.م</span></div>` : ''}
                </div>
                <div style="text-align:center; margin-top:15px; font-size:10px;">شركة الزيادى لقطع الغيار</div>
            </body></html>`;
        
        const printFrame = document.getElementById('printFrame');
        const pri = printFrame.contentWindow || printFrame.contentDocument;
        pri.document.open(); pri.document.write(content); pri.document.close();
        setTimeout(() => { pri.focus(); pri.print(); }, 500);
    };

    window.showInv = (id) => {
        const inv = allInvoices.find(i => i.id === id);
        let itemsHtml = "";
        Object.keys(inv).forEach(k => {
            if(!isNaN(k)) {
                itemsHtml += `<div class="d-flex justify-content-between border-bottom border-secondary py-2 small">
                    <span>${inv[k].name} (x${inv[k].qty})</span>
                    <b>${(inv[k].qty * (inv[k].price || 0)).toLocaleString()}</b>
                </div>`;
            }
        });
        document.getElementById('modalBody').innerHTML = `
            <h6 class="text-info fw-bold mb-3 border-bottom pb-2">تفاصيل الفاتورة</h6>
            ${itemsHtml || '<p class="text-center">لا توجد أصناف</p>'}
            <div class="mt-3 p-3 rounded-4 bg-blue bg-opacity-50">
                <div class="d-flex justify-content-between small"><span>الإجمالي:</span><b>${inv.total}</b></div>
                <div class="d-flex justify-content-between small text-danger"><span>المتبقي:</span><b>${inv.remaining || 0}</b></div>
            </div>`;
        new bootstrap.Modal(document.getElementById('viewModal')).show();
    };

    window.editInv = (id) => window.location.href = `sales-invoice.html?edit=${id}`;

    window.deleteInv = async (id) => {
        if(!confirm("حذف الفاتورة سيؤدي لتعديل مديونية العميل. موافق؟")) return;
        const inv = allInvoices.find(i => i.id === id);
        try {
            await deleteDoc(doc(db, "invoices", id));
            if (inv.customerId && inv.remaining > 0) {
                await updateDoc(doc(db, "customers", inv.customerId), { currentBalance: increment(-inv.remaining) });
            }
            loadInvoices();
        } catch(e) { alert("خطأ: " + e.message); }
    };

    document.getElementById('searchInput').oninput = (e) => {
        const val = e.target.value.toLowerCase();
        document.querySelectorAll('.inv-card').forEach(card => {
            card.style.display = card.dataset.name.toLowerCase().includes(val) ? 'block' : 'none';
        });
    };

    loadInvoices();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
