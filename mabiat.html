<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يومية مبيعات  - الزيادى</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0d1117; --glass: rgba(255,255,255,0.05); --neon: #58a6ff; --success: #3fb950; --danger: #f85149; --gold: #f1c40f; }
        body { background: var(--bg-dark); font-family: 'Cairo', sans-serif; color: #c9d1d9; padding: 12px; }
        
        .stat-card { 
            border-radius: 18px; 
            padding: 18px 10px; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .stat-label { font-size: 0.8rem; opacity: 0.8; display: block; margin-bottom: 5px; font-weight: 600; }
        .stat-val { font-size: 1.4rem; font-weight: 700; display: block; letter-spacing: 0.5px; }

        .section-title { 
            font-size: 1.1rem; 
            font-weight: 700; 
            margin: 25px 0 15px 0; 
            color: var(--neon); 
            display: flex; 
            align-items: center;
        }
        .section-title::after { content: ""; flex: 1; height: 1px; background: rgba(88, 166, 255, 0.2); margin-right: 15px; }

        .custom-card { 
            background: var(--glass); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .table { margin-bottom: 0; }
        .table thead th { 
            background: rgba(88, 166, 255, 0.1) !important; 
            color: #fff; 
            font-weight: 700; 
            border: none; 
            padding: 15px 10px;
            font-size: 0.85rem;
        }
        .table tbody td { 
            padding: 14px 10px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            vertical-align: middle;
            font-size: 0.9rem;
        }
        th, td { vertical-align:middle; white-space:nowrap; padding: 12px 8px !important; border:none !important; }
        .client-name { color: #fff; font-weight: 600; }
        .item-name { color: var(--gold); font-weight: 600; }
        .price-tag { color: var(--success); font-weight: 700; }
        
        .btn-view { 
            background: rgba(88, 166, 255, 0.1); 
            border: 1px solid var(--neon); 
            color: var(--neon); 
            border-radius: 8px; 
            padding: 4px 12px; 
            font-weight: 600;
        }
        .badge-time { background: rgba(255,255,255,0.1); padding: 3px 8px; border-radius: 6px; font-size: 0.75rem; color: #aaa; }
    </style>
</head>
<body>

<div class="container-fluid p-0">
    <div class="d-flex justify-content-between align-items-center mb-4 px-2">
        <div>
            <h4 class="fw-bold m-0 text-white">يومية المبيعات</h4>
            <small class="text-secondary">متابعة حركة فواتير </small>
        </div>
        <input type="date" id="saleDate" class="form-control form-control-sm w-auto bg-dark border-secondary text-white shadow-none" onchange="fetchFullReport()">
    </div>

    <div class="row g-3 mb-2">
        <div class="col-6">
            <div class="stat-card" style="border-bottom: 4px solid var(--neon);">
                <span class="stat-label text-info"><i class="fas fa-shopping-cart me-1"></i> إجمالي البيع</span>
                <span id="totalSales" class="stat-val text-white">0</span>
            </div>
        </div>
        <div class="col-6">
            <div class="stat-card" style="border-bottom: 4px solid var(--success);">
                <span class="stat-label text-success"><i class="fas fa-money-bill-wave me-1"></i> المدفوع كاش</span>
                <span id="totalPaid" class="stat-val text-white">0</span>
            </div>
        </div>
        <div class="col-6">
            <div class="stat-card" style="border-bottom: 4px solid var(--danger);">
                <span class="stat-label text-danger"><i class="fas fa-hand-holding-usd me-1"></i> المتبقي (آجل)</span>
                <span id="totalRest" class="stat-val text-white">0</span>
            </div>
        </div>
        <div class="col-6">
            <div class="stat-card" style="border-bottom: 4px solid var(--gold);">
                <span class="stat-label text-warning"><i class="fas fa-coins me-1"></i> صافي الأرباح</span>
                <span id="totalProfit" class="stat-val text-white">0</span>
            </div>
        </div>
    </div>

    <div class="section-title"><i class="fas fa-file-invoice me-2"></i> حركة الفواتير الصادرة</div>
    <div class="custom-card mb-4">
        <div class="table-responsive">
            <table class="table text-center">
                <thead>
                    <tr>
                        <th style="width: 40px;">م</th>
                        <th>الوقت</th>
                        <th class="text-start">اسم العميل</th>
                        <th>المبلغ</th>
                        <th>الفاتورة</th>
                    </tr>
                </thead>
                <tbody id="invoicesTableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="section-title"><i class="fas fa-box-open me-2"></i> تفاصيل الأصناف المباعة</div>
    <div class="custom-card">
        <div class="table-responsive">
            <table class="table text-center">
                <thead>
                    <tr>
                        <th style="width: 40px;">م</th>
                        <th class="text-start">اسم الصنف المباع</th>
                        <th>سعر البيع</th>
                        <th class="text-start">اشترى بواسطة</th>
                    </tr>
                </thead>
                <tbody id="itemsTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
  authDomain: "elzyady-da509.firebaseapp.com",
  projectId: "elzyady-da509",
  storageBucket: "elzyady-da509.firebasestorage.app",
  messagingSenderId: "242117738897",
  appId: "1:242117738897:web:d658d6ca335b316f7f9a30",
  measurementId: "G-JPRK3BT495"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('saleDate').value = new Date().toISOString().split('T')[0];

    window.fetchFullReport = async function() {
        const selDate = document.getElementById('saleDate').value;
        const start = new Date(selDate); start.setHours(0,0,0,0);
        const end = new Date(selDate); end.setHours(23,59,59,999);

        let tSales = 0, tPaidInvoices = 0, tExtraPayments = 0, tProfit = 0;
        let invRows = '', itemRows = '';
        let itemCounter = 1;

        try {
            // 1. جلب المدفوعات الإضافية (دفعات الحساب من جدول payments)
            const paySnap = await getDocs(collection(db, "payments"));
            paySnap.forEach(pDoc => {
                const pData = pDoc.data();
                const pDate = pData.timestamp?.toDate();
                if (pDate >= start && pDate <= end) {
                    tExtraPayments += parseFloat(pData.amount || 0);
                }
            });

            // 2. جلب الفواتير وحساب الأرباح يدوياً (بيع - شراء)
            const snap = await getDocs(query(collection(db, "invoices"), orderBy("timestamp", "desc")));
            let invCounter = 1;

            snap.forEach(doc => {
                const data = doc.data();
                const sDate = data.timestamp?.toDate();

                if (sDate >= start && sDate <= end) {
                    let cName = data.customer?.name || data.customerName || "عميل نقدي";
                    const total = parseFloat(data.total || data.grandTotal || 0);
                    const paid = parseFloat(data.paid || 0);
                    
                    tSales += total; 
                    tPaidInvoices += paid;

                    // حساب الربح الصافي بناءً على حقل buy
                    const items = data.items || [];
                    items.forEach(item => {
                        const sPrice = parseFloat(item.sell || item.price || 0);
                        const bPrice = parseFloat(item.buy || 0);
                        tProfit += (sPrice - bPrice);

                        itemRows += `
                            <tr>
                                <td class="text-secondary">${itemCounter++}</td>
                                <td class="text-start item-name">${item.name || "صنف"}</td>
                                <td class="price-tag">${sPrice.toLocaleString()}</td>
                                <td class="text-start small opacity-100">${cName}</td>
                            </tr>
                        `;
                    });

                    invRows += `
                        <tr>
                            <td class="text-secondary">${invCounter++}</td>
                            <td><span class="badge-time">${sDate.toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'})}</span></td>
                            <td class="text-start client-name">${cName}</td>
                            <td class="fw-bold text-info">${total.toLocaleString()}</td>
                            <td><button class="btn btn-view" onclick="viewInvoice('${doc.id}')"><i class="fas fa-eye"></i></button></td>
                        </tr>
                    `;
                }
            });

            // التحديث النهائي: إجمالي الكاش = مدفوع الفواتير + دفعات الحساب الخارجية
            const totalCashToday = tPaidInvoices + tExtraPayments;

            document.getElementById('invoicesTableBody').innerHTML = invRows || '<tr><td colspan="5" class="py-5">لا توجد فواتير</td></tr>';
            document.getElementById('itemsTableBody').innerHTML = itemRows || '<tr><td colspan="4" class="py-5">لا توجد أصناف</td></tr>';
            
            document.getElementById('totalSales').innerText = tSales.toLocaleString();
            document.getElementById('totalPaid').innerText = totalCashToday.toLocaleString();
            document.getElementById('totalRest').innerText = Math.max(0, tSales - tPaidInvoices).toLocaleString();
            document.getElementById('totalProfit').innerText = tProfit.toLocaleString();

        } catch (e) { console.error(e); }
    }

    window.viewInvoice = (id) => window.location.href = `pos6.html?id=${id}`;
    fetchFullReport();
</script>
</body>
</html>
