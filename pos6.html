<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warchat Pro - نظام الإدارة المتكامل</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   <style>
        :root {
            --bg-dark: #0d1117;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-blue: #58a6ff;
            --danger-red: #ff4d4d;
            --modal-bg: rgba(22, 27, 34, 0.98);
        }

        body { 
            background: var(--bg-dark); 
            font-family: 'Cairo', sans-serif; 
            color: #c9d1d9; 
            padding-bottom: 120px; 
            overflow-x: hidden;
        }

        .header-card { position: relative; z-index: 1050; }

        .glass-card { 
            background: var(--glass-bg); 
            backdrop-filter: blur(12px); 
            border: 1px solid var(--glass-border); 
            border-radius: 15px; 
            padding: 15px; 
            margin-bottom: 12px; 
            position: relative;
        }
        
        .form-control { 
            background: rgba(0, 0, 0, 0.3) !important; 
            border: 1px solid var(--glass-border) !important; 
            color: #fff !important; 
            border-radius: 10px; 
            font-size: 0.9rem; 
        }

        .form-control:focus { 
            border-color: var(--neon-blue) !important; 
            box-shadow: 0 0 10px rgba(88, 166, 255, 0.2); 
        }

        .log-item { 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
            padding: 12px 5px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .item-time { font-size: 0.65rem; color: #8b949e; display: block; }
        .item-price { font-weight: 700; color: var(--neon-blue); }

        .search-results { 
            max-height: 250px; 
            overflow-y: auto; 
            background: #1c2128; 
            border: 1px solid var(--neon-blue); 
            border-radius: 10px; 
            margin-top: 5px; 
            position: absolute; 
            width: 100%; 
            right: 0;
            z-index: 9999 !important; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .search-item { 
            padding: 12px; 
            cursor: pointer; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            transition: 0.2s; 
            display: flex;
            justify-content: space-between;
        }

        .search-item:hover { background: var(--neon-blue); color: #fff; }

        .modal-content { 
            background: var(--modal-bg); 
            border: 1px solid var(--neon-blue); 
            border-radius: 20px; 
            backdrop-filter: blur(20px); 
        }

        .fixed-actions { 
            position: fixed; 
            bottom: 0; left: 0; right: 0; 
            padding: 15px; 
            background: rgba(13, 17, 23, 0.9); 
            border-top: 1px solid var(--glass-border); 
            z-index: 1000; 
        }

        @media print {
            @page { margin: 0; size: auto; }
            body { background: white !important; color: black !important; padding: 20px; margin: 0 !important; }
            .fixed-actions, .btn, #toggleBtn, .fas.fa-trash, .btn-close, .fa-times-circle, #cloudStatus, .no-print { display: none !important; }
            .glass-card { 
                background: transparent !important; 
                border: 1px solid #eee !important; 
                color: black !important; 
                backdrop-filter: none !important; 
                box-shadow: none !important;
                margin-bottom: 10px !important;
            }
            .form-control { 
                background: transparent !important; 
                color: black !important; 
                border: none !important; 
                padding: 0 !important;
                text-align: center !important;
            }
            .text-info, .text-white, .item-price, .fw-bold, h5, h6 { color: black !important; }
            #custSearchInput, #pSearch { display: none !important; }
            #selectedCustomer { display: flex !important; visibility: visible !important; }
        }
    </style>
</head>
<body>

<div class="container-fluid py-3">
    <header class="text-center mb-3">
        <h5 class="fw-bold text-white mb-0" id="invTitle">فاتورة صيانة جارية</h5>
        <small class="text-secondary opacity-50 text-uppercase" style="font-size: 10px;">الزيادى لقطع الغيار</small>
    </header>

    <div class="glass-card header-card">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h6 class="m-0 small text-secondary"><i class="fas fa-user-circle me-1 text-info"></i> بيانات العميل</h6>
            <span class="text-info small no-print" style="cursor:pointer; text-decoration: underline;" id="toggleBtn" onclick="toggleCustMode()">تسجيل عميل جديد</span>
        </div>
        <div id="searchMode" class="position-relative">
            <input type="text" id="custSearchInput" class="form-control no-print" placeholder="ابحث باسم العميل أو الموبايل..." oninput="handleCustomerSearch()" autocomplete="off">
            <div id="custResults" class="search-results d-none no-print"></div>
            <div id="selectedCustomer" class="mt-2 d-none alert alert-info py-2 px-3 border-0 bg-primary bg-opacity-10 d-flex justify-content-between align-items-center">
                <div><i class="fas fa-check-circle me-1"></i><span id="displayCustName" class="fw-bold small text-white"></span></div>
                <i class="fas fa-times-circle text-danger no-print" style="cursor:pointer" onclick="clearCustomer()"></i>
            </div>
        </div>
        <div id="newMode" class="d-none mt-2 no-print">
            <input type="text" id="nName" class="form-control mb-2" placeholder="الاسم بالكامل">
            <div class="row g-2">
                <div class="col-6"><input type="tel" id="nPhone" class="form-control" placeholder="رقم الموبايل"></div>
                <div class="col-6"><input type="text" id="nAddress" class="form-control" placeholder="العنوان"></div>
            </div>
        </div>
    </div>

    <div class="row g-2 mb-3 text-center">
        <div class="col-4"><div class="glass-card p-2 border-0 bg-info bg-opacity-10"><small class="text-secondary d-block" style="font-size: 0.6rem;">الإجمالي</small><span class="fw-bold text-info" id="totalVal">0</span></div></div>
        <div class="col-4"><div class="glass-card p-2 border-0 bg-white bg-opacity-10"><small class="text-secondary d-block" style="font-size: 0.6rem;">المدفوع</small><input type="number" id="pAmount" class="form-control form-control-sm text-center border-0 p-0 fw-bold bg-transparent shadow-none" value="0" oninput="doCalc()"></div></div>
        <div class="col-4"><div class="glass-card p-2 border-0 bg-danger bg-opacity-10"><small class="text-secondary d-block" style="font-size: 0.6rem;">المتبقي</small><span class="fw-bold text-danger" id="balVal">0</span></div></div>
    </div>

    <div class="glass-card">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h6 class="m-0 small fw-bold">القطع والخدمات المضافة</h6>
            <button class="btn btn-info btn-sm rounded-pill px-3 no-print" onclick="openAddModal()">
                <i class="fas fa-plus me-1"></i> إضافة
            </button>
        </div>
        <div id="mainLog"></div>
    </div>
</div>

<div class="fixed-actions no-print">
    <div class="row g-2">
        <div class="col-6"><button id="btnDraft" class="btn btn-dark w-100 py-2 border-secondary small" onclick="handleCloudAction('draft')">حفظ سحابي</button></div>
        <div class="col-6"><button id="btnFinal" class="btn btn-success w-100 py-2 fw-bold" onclick="handleCloudAction('final')">تقفيل وطباعة</button></div>
    </div>
</div>

<div class="modal fade no-print" id="addModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0 pb-0">
                <h6 class="modal-title text-info fw-bold">إضافة للمسحوبات</h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body pt-2 position-relative">
                <input type="text" id="pSearch" class="form-control mb-2" placeholder="ابحث في المخزن..." oninput="handlePartSearch()" autocomplete="off">
                <div id="pResults" class="search-results d-none"></div>
                <div class="text-center my-3 opacity-50 small">أو إضافة خدمة يدوية</div>
                <input type="text" id="mName" class="form-control mb-2" placeholder="اسم الخدمة/المصنعية">
                <input type="number" id="mPrice" class="form-control" placeholder="السعر">
                <button class="btn btn-info w-100 mt-3 fw-bold py-2" onclick="addManual()">تأكيد الإضافة</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, getDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
  authDomain: "elzyady-da509.firebaseapp.com",
  projectId: "elzyady-da509",
  storageBucket: "elzyady-da509.firebasestorage.app",
  messagingSenderId: "242117738897",
  appId: "1:242117738897:web:d658d6ca335b316f7f9a30",
  measurementId: "G-JPRK3BT495"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let itemsList = [];
    let isNew = false;
    let inventoryList = [];

    async function syncInventory() {
        const snap = await getDocs(collection(db, "inventory"));
        inventoryList = [];
        snap.forEach(d => inventoryList.push({id: d.id, ...d.data()}));
    }
    syncInventory();

    // تعديل البحث لإرسال سعر الشراء (buy)
    window.handlePartSearch = function() {
        const q = document.getElementById('pSearch').value.toLowerCase();
        const res = document.getElementById('pResults');
        if(q.length < 1) { res.classList.add('d-none'); return; }
        const filtered = inventoryList.filter(p => p.name.toLowerCase().includes(q));
        res.innerHTML = '';
        if(filtered.length > 0) {
            res.classList.remove('d-none');
            filtered.forEach(p => {
                const d = document.createElement('div');
                d.className = 'search-item';
                d.innerHTML = `<div class="fw-bold small">${p.name}</div><span class="text-info fw-bold small">${p.sell || p.price} EGP</span>`;
                d.onclick = () => { 
                    // التعديل هنا: تمرير p.buy اللي جاي من المخزن
                    addItemToTable(p.name, parseFloat(p.sell || p.price), p.id, parseFloat(p.buy || 0)); 
                    const modal = bootstrap.Modal.getInstance(document.getElementById('addModal'));
                    modal.hide();
                    document.getElementById('pSearch').value = '';
                };
                res.appendChild(d);
            });
        }
    };

    window.addItemToTable = function(name, price, stockId = null, buyPrice = 0) {
        // إضافة حقل buy للأوبجكت عشان يتحفظ في الفاتورة
        itemsList.push({ 
            id: Date.now(), 
            name, 
            price, 
            buy: buyPrice, // سعر الشراء تم حفظه هنا
            stockId, 
            time: new Date().toLocaleString('ar-EG') 
        });
        updateUI();
    };

    window.updateUI = () => {
        const log = document.getElementById('mainLog');
        log.innerHTML = '';
        let total = 0;
        itemsList.forEach(i => {
            total += i.price;
            log.innerHTML += `
                <div class="log-item">
                    <div><span class="fw-bold small text-white">${i.name}</span><small class="item-time">${i.time}</small></div>
                    <div class="text-end"><div class="item-price small">${i.price}</div><i class="fas fa-trash text-danger no-print" onclick="removeItem(${i.id})"></i></div>
                </div>`;
        });
        document.getElementById('totalVal').innerText = total;
        doCalc();
    };

    window.handleCloudAction = async function(type) {
        const urlParams = new URLSearchParams(window.location.search);
        const editId = urlParams.get('id') || urlParams.get('edit'); 
        
        let cName, cPhone;
        if(isNew) {
            cName = document.getElementById('nName').value;
            cPhone = document.getElementById('nPhone').value;
            if(!cName) return alert("الاسم مطلوب");
        } else {
            const displayTxt = document.getElementById('displayCustName').innerText;
            if(!displayTxt) return alert("حدد العميل");
            cName = displayTxt.split(' (')[0];
            cPhone = displayTxt.split(' (')[1]?.replace(')', '') || '';
        }

        try {
            const invoiceData = {
                customer: { name: cName, phone: cPhone },
                items: itemsList, // دلوقت الـ itemsList جواها الـ buy لكل صنف
                total: parseFloat(document.getElementById('totalVal').innerText),
                paid: parseFloat(document.getElementById('pAmount').value) || 0,
                status: type,
                timestamp: serverTimestamp()
            };

            if(editId) {
                await updateDoc(doc(db, "invoices", editId), invoiceData);
                alert("تم تحديث الفاتورة ✅");
            } else {
                await addDoc(collection(db, "invoices"), invoiceData);
                alert("تم الحفظ بنجاح ✅");
            }
            window.location.href = 'invoices_log.html';
        } catch (e) { alert("خطأ في الحفظ"); }
    };

    window.doCalc = () => {
        const total = parseFloat(document.getElementById('totalVal').innerText) || 0;
        const paid = parseFloat(document.getElementById('pAmount').value) || 0;
        document.getElementById('balVal').innerText = (total - paid).toFixed(2);
    };

    window.removeItem = (id) => { itemsList = itemsList.filter(i => i.id !== id); updateUI(); };

    async function checkResume() {
        const urlParams = new URLSearchParams(window.location.search);
        const editId = urlParams.get('id') || urlParams.get('edit'); 
        if(editId) {
            document.getElementById('invTitle').innerText = "تعديل فاتورة صيانة";
            try {
                const d = await getDoc(doc(db, "invoices", editId));
                if(d.exists()) {
                    const data = d.data();
                    document.getElementById('custSearchInput').classList.add('d-none');
                    document.getElementById('selectedCustomer').classList.remove('d-none');
                    document.getElementById('displayCustName').innerText = data.customer.name + (data.customer.phone ? " (" + data.customer.phone + ")" : "");
                    itemsList = data.items || [];
                    document.getElementById('pAmount').value = data.paid || 0;
                    updateUI();
                }
            } catch(e) { console.log("Error loading"); }
        }
    }

    window.handleCustomerSearch = async function() {
        const qStr = document.getElementById('custSearchInput').value.trim();
        const resDiv = document.getElementById('custResults');
        if(qStr.length < 1) return resDiv.classList.add('d-none');
        const snap = await getDocs(collection(db, "customers"));
        resDiv.innerHTML = '';
        snap.forEach(doc => {
            const data = doc.data();
            if(data.name.includes(qStr) || data.phone.includes(qStr)) {
                resDiv.classList.remove('d-none');
                const d = document.createElement('div');
                d.className = 'search-item small';
                d.innerHTML = `${data.name} - ${data.phone}`;
                d.onclick = () => {
                    document.getElementById('custSearchInput').classList.add('d-none');
                    document.getElementById('selectedCustomer').classList.remove('d-none');
                    document.getElementById('displayCustName').innerText = data.name + " (" + data.phone + ")";
                    resDiv.classList.add('d-none');
                };
                resDiv.appendChild(d);
            }
        });
    };

    window.clearCustomer = () => {
        document.getElementById('custSearchInput').classList.remove('d-none');
        document.getElementById('selectedCustomer').classList.add('d-none');
        document.getElementById('displayCustName').innerText = '';
    };

    window.toggleCustMode = function() {
        isNew = !isNew;
        document.getElementById('searchMode').classList.toggle('d-none', isNew);
        document.getElementById('newMode').classList.toggle('d-none', !isNew);
    };

    window.addManual = () => {
        const n = document.getElementById('mName').value;
        const p = parseFloat(document.getElementById('mPrice').value);
        if(n && p) {
            addItemToTable(n, p, null, p); // للمصنعيات بنعتبر البيع هو الشراء عشان ربحها 100%
            document.getElementById('mName').value = '';
            document.getElementById('mPrice').value = '';
            bootstrap.Modal.getInstance(document.getElementById('addModal')).hide();
        }
    };

    window.openAddModal = () => { new bootstrap.Modal(document.getElementById('addModal')).show(); };

    checkResume();
</script>
</body>
</html>
