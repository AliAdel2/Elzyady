<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معلومات المورد - شركة الزيادى</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0d1117; --glass: rgba(255,255,255,0.05); --neon-blue: #58a6ff; --neon-green: #3fb950; --neon-red: #f85149; }
        body { background: var(--bg); font-family: 'Cairo', sans-serif; color: #c9d1d9; padding-bottom: 50px; }
        
        .header-nav { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: var(--glass); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .header-nav i { font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        .header-nav i:hover { opacity: 0.7; }

        .balance-hero {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px; padding: 30px; margin: 20px 0; text-align: center;
            backdrop-filter: blur(20px); position: relative; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .status-badge { 
            position: absolute; top: 20px; left: 20px; background: rgba(255, 255, 255, 0.05); 
            padding: 5px 15px; border-radius: 10px; font-size: 0.8rem; font-weight: bold;
        }
        .main-balance { font-size: 3rem; font-weight: 800; color: #fff; margin: 10px 0; letter-spacing: -1px; }
        .opening-balance { border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; opacity: 0.6; font-size: 0.9rem; }

        .action-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 25px 0; }
        .action-item { text-align: center; text-decoration: none; color: inherit; cursor: pointer; transition: 0.2s; }
        .icon-circle {
            width: 55px; height: 55px; background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 8px; font-size: 1.3rem; transition: 0.3s;
        }
        .action-item:active .icon-circle { transform: scale(0.9); background: rgba(255,255,255,0.1); }
        .action-item span { font-size: 0.75rem; font-weight: 600; display: block; }

        .info-row {
            background: var(--glass); border-radius: 18px; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.03);
        }
        .info-label { font-size: 0.85rem; opacity: 0.6; }
        .info-value { font-weight: 700; color: #fff; font-size: 0.9rem; }

        .c-green { color: var(--neon-green); }
        .c-blue { color: var(--neon-blue); }
        .c-purple { color: #bc8cff; }
        .c-orange { color: #f0883e; }
        .c-red { color: var(--neon-red); }
    </style>
</head>
<body>

<div class="header-nav">
    <div>
        <i class="fas fa-trash-alt c-red me-3" onclick="deleteSupplier()"></i>
        <a id="editLink" href="#"><i class="fas fa-edit c-blue"></i></a>
    </div>
    <h5 class="m-0 fw-bold" id="displaySupName">جاري التحميل...</h5>
    <a href="supplier-list.html" class="text-white"><i class="fas fa-arrow-left"></i></a>
</div>

<div class="container">
    <div class="balance-hero">
        <span class="status-badge" id="balanceStatus">...</span>
        <div class="info-label">صافي المديونية للمورد</div>
        <div class="main-balance" id="displayBalance">0</div>
        <div class="opening-balance d-flex justify-content-between">
            <span>ج.م</span>
            <span>الرصيد الافتتاحي: <b id="displayOpening">0.00</b></span>
        </div>
    </div>

    <div class="action-grid">
        <a href="#" id="payBtn" class="action-item">
            <div class="icon-circle c-green"><i class="fas fa-money-bill-wave"></i></div>
            <span>سداد</span>
        </a>
        <div id="remindBtn" class="action-item">
            <div class="icon-circle c-blue"><i class="fab fa-whatsapp"></i></div>
            <span>تذكير</span>
        </div>
        <a href="#" id="callBtn" class="action-item">
            <div class="icon-circle c-green"><i class="fas fa-phone-alt"></i></div>
            <span>اتصال</span>
        </a>
        <a href="#" id="statementBtn" class="action-item">
            <div class="icon-circle c-purple"><i class="fas fa-file-invoice"></i></div>
            <span>كشف حساب</span>
        </a>
        <div class="action-item" onclick="window.print()">
            <div class="icon-circle c-blue"><i class="fas fa-camera"></i></div>
            <span>سكرين</span>
        </div>
        <a href="#" id="historyBtn" class="action-item">
            <div class="icon-circle c-orange"><i class="fas fa-history"></i></div>
            <span>سجل الحركات</span>
        </a>
        <a href="#" id="installmentsBtn" class="action-item">
            <div class="icon-circle c-purple"><i class="fas fa-calendar-alt"></i></div>
            <span>أقساط</span>
        </a>
        <div class="action-item" onclick="resetAccount()">
            <div class="icon-circle c-red"><i class="fas fa-sync-alt"></i></div>
            <span>تصفير</span>
        </div>
    </div>

    <div class="info-row">
        <span class="info-value" id="displayAddress">غير مسجل</span>
        <span class="info-label">العنوان</span>
    </div>
    <div class="info-row">
        <span class="info-value" id="displayDate">--/--/----</span>
        <span class="info-label">تاريخ الإنشاء</span>
    </div>
    <div class="info-row">
        <span class="info-value" id="displayPhone">01xxxxxxxxx</span>
        <span class="info-label">الهاتف</span>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, deleteDoc, updateDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
        authDomain: "elzyady-da509.firebaseapp.com",
        projectId: "elzyady-da509",
        storageBucket: "elzyady-da509.firebasestorage.app",
        messagingSenderId: "242117738897",
        appId: "1:242117738897:web:d658d6ca335b316f7f9a30"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const supId = urlParams.get('id');

    async function calculateRealBalance(supplierId, openingBal) {
        // 1. جلب المدفوعات (صرف) والقبض من السندات
        const qTrans = query(collection(db, "transactions"), where("partyId", "==", supplierId));
        const snapTrans = await getDocs(qTrans);
        
        // 2. جلب المشتريات والمرتجعات
        const qItems = query(collection(db, "supplier_transactions"), where("supplierId", "==", supplierId));
        const snapItems = await getDocs(qItems);

        let totalPurchases = 0; // مديونية (علينا)
        let totalPayments = 0;  // سداد (لينا)

        // معالجة السندات
        snapTrans.forEach(doc => {
            const d = doc.data();
            const amt = Number(d.amount) || 0;
            if (d.type === "صرف") totalPayments += amt;
            else if (d.type === "قبض") totalPurchases += amt;
        });

        // معالجة الفواتير والمرتجعات
        snapItems.forEach(doc => {
            const d = doc.data();
            const amt = Number(d.total) || Number(d.amount) || 0; // دعم الحقلين
            if (d.type === "شراء" || d.type === "فاتورة شراء") totalPurchases += amt;
            else if (d.type === "مرتجع شراء") totalPayments += amt;
        });

        return (Number(openingBal) + totalPurchases) - totalPayments;
    }

    async function getSupplierDetails() {
        if(!supId) return;

        document.getElementById('editLink').href = `edit-supplier.html?id=${supId}`;
        document.getElementById('payBtn').href = `supplier-payment.html?id=${supId}`;
        document.getElementById('statementBtn').href = `supplier-statement.html?id=${supId}`;
        document.getElementById('historyBtn').href = `transactions-log.html?id=${supId}`;
        document.getElementById('installmentsBtn').href = `supplier-installments.html?id=${supId}`;

        try {
            const docRef = doc(db, "suppliers", supId);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                const opening = Number(data.openingBalance || 0);
                
                // حساب الرصيد الحقيقي من كل الحركات
                const realBalance = await calculateRealBalance(supId, opening);
                
                // تحديث واجهة المستخدم
                document.getElementById('displaySupName').innerText = data.name;
                document.getElementById('displayBalance').innerText = realBalance.toLocaleString();
                document.getElementById('displayOpening').innerText = opening.toLocaleString();
                document.getElementById('displayPhone').innerText = data.phone || 'غير مسجل';
                document.getElementById('displayAddress').innerText = data.address || 'غير مسجل';
                
                const status = document.getElementById('balanceStatus');
                if(realBalance === 0) {
                    status.innerText = "خالص";
                    status.style.color = "var(--neon-green)";
                } else if (realBalance > 0) {
                    status.innerText = "مديونية للمورد";
                    status.style.color = "var(--neon-red)";
                } else {
                    status.innerText = "رصيد لك (فائض)";
                    status.style.color = "var(--neon-blue)";
                }

                if(data.phone) {
                    document.getElementById('callBtn').href = `tel:${data.phone}`;
                    document.getElementById('remindBtn').onclick = () => {
                        const msg = encodeURIComponent(`شركة الزيادي لقطع الغيار ترحب بكم.\nنود تذكيركم بأن الرصيد الحالي المستحق لكم هو: ${realBalance.toLocaleString()} ج.م`);
                        window.open(`https://wa.me/2${data.phone}?text=${msg}`, '_blank');
                    };
                }

                if(data.createdAt) {
                    const date = data.createdAt.toDate ? data.createdAt.toDate() : new Date(data.createdAt);
                    document.getElementById('displayDate').innerText = date.toLocaleDateString('ar-EG');
                }
            }
        } catch (error) {
            console.error("Error fetching details:", error);
        }
    }

    window.resetAccount = async () => {
        if(confirm("تنبيه: التصفير هنا سيقوم بتصفير حقل الرصيد فقط، هل أنت متأكد؟")) {
            await updateDoc(doc(db, "suppliers", supId), { 
                currentBalance: 0,
                openingBalance: 0 
            });
            location.reload();
        }
    };

    window.deleteSupplier = async () => {
        if(confirm("هل أنت متأكد من حذف المورد نهائياً من النظام؟")) {
            await deleteDoc(doc(db, "suppliers", supId));
            window.location.href = "supplier-list.html";
        }
    };

    getSupplierDetails();
</script>
</body>
</html>
