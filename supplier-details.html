<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معلومات المورد - شركة الزيادى</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --accent: #0b5e3d; 
            --header-bg: #0b5e3d;
            --bg-light: #f4f7f6;
            --text-primary: #1b2e26;
            --border: #dce3de;
            --white: #ffffff;
            --danger: #d90429;
            --info: #0d6efd;
            --success: #2d6a4f;
        }

        body { 
            background: var(--bg-light); 
            font-family: 'Cairo', sans-serif; 
            color: var(--text-primary); 
            padding-bottom: 50px; 
        }
        
        /* Header */
        .header-nav { 
            padding: 12px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--header-bg); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .header-nav i { font-size: 1.1rem; cursor: pointer; transition: 0.3s; color: white; }

        /* Main Balance Hero */
        .balance-hero {
            background: var(--white); 
            border: 1px solid var(--border);
            border-radius: 20px; 
            padding: 30px 20px; 
            margin: 15px; 
            text-align: center;
            position: relative;
            box-shadow: 0 3px 12px rgba(0,0,0,0.03);
        }
        .status-badge { 
            position: absolute; top: 15px; left: 15px; 
            background: var(--bg-light); 
            padding: 4px 12px; border-radius: 8px; 
            font-size: 0.75rem; font-weight: 800;
        }
        .main-balance { 
            font-size: 2.8rem; 
            font-weight: 800; 
            color: var(--accent); 
            margin: 5px 0; 
            letter-spacing: -1px; 
        }
        .opening-balance { 
            border-top: 1px solid var(--bg-light); 
            padding-top: 15px; 
            margin-top: 10px;
            color: #6c757d; 
            font-size: 0.85rem; 
            font-weight: 600;
        }

        /* Actions Grid */
        .action-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 12px; 
            padding: 0 15px; 
            margin: 20px 0; 
        }
        .action-item { text-align: center; text-decoration: none; color: var(--text-primary); cursor: pointer; }
        .icon-circle {
            width: 52px; height: 52px; 
            background: var(--white); 
            border: 1px solid var(--border);
            border-radius: 16px; 
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 8px; font-size: 1.2rem; 
            transition: 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .action-item:active .icon-circle { transform: scale(0.9); background: var(--bg-light); }
        .action-item span { font-size: 0.7rem; font-weight: 700; display: block; color: #44554f; }

        /* Info Rows */
        .info-row {
            background: var(--white); border-radius: 14px; padding: 12px 18px;
            display: flex; justify-content: space-between; align-items: center; 
            margin: 0 15px 10px 15px;
            border: 1px solid var(--border);
        }
        .info-label { font-size: 0.8rem; font-weight: 700; color: #6c757d; }
        .info-value { font-weight: 700; color: var(--text-primary); font-size: 0.85rem; }

        /* Utility Colors */
        .c-green { color: var(--success) !important; }
        .c-blue { color: var(--info) !important; }
        .c-purple { color: #6f42c1 !important; }
        .c-orange { color: #fd7e14 !important; }
        .c-red { color: var(--danger) !important; }
    </style>
</head>
<body>

<div class="header-nav">
    <div>
        <i class="fas fa-trash-alt me-3" style="color: #ffcccc;" onclick="deleteSupplier()"></i>
        <a id="editLink" href="#"><i class="fas fa-edit"></i></a>
    </div>
    <h6 class="m-0 fw-bold" id="displaySupName">جاري التحميل...</h6>
    <a href="supplier-list.html" class="text-white"><i class="fas fa-arrow-left"></i></a>
</div>

<div class="container-fluid p-0">
    <div class="balance-hero">
        <span class="status-badge" id="balanceStatus">...</span>
        <div class="info-label">صافي المديونية للمورد</div>
        <div class="main-balance" id="displayBalance">0</div>
        <div class="opening-balance d-flex justify-content-between">
            <span>جنية مصري</span>
            <span>الرصيد الافتتاحي: <b id="displayOpening" style="color: var(--text-primary)">0.00</b></span>
        </div>
    </div>

    <div class="action-grid">
        <a href="#" id="payBtn" class="action-item">
            <div class="icon-circle c-green"><i class="fas fa-hand-holding-usd"></i></div>
            <span>سداد</span>
        </a>
        <div id="remindBtn" class="action-item">
            <div class="icon-circle c-blue"><i class="fab fa-whatsapp"></i></div>
            <span>تذكير</span>
        </div>
        <a href="#" id="callBtn" class="action-item">
            <div class="icon-circle c-green"><i class="fas fa-phone-alt"></i></div>
            <span>اتصال</span>
        </a>
        <a href="#" id="statementBtn" class="action-item">
            <div class="icon-circle c-purple"><i class="fas fa-file-invoice"></i></div>
            <span>كشف حساب</span>
        </a>
        <div class="action-item" onclick="window.print()">
            <div class="icon-circle c-blue"><i class="fas fa-print"></i></div>
            <span>طباعة</span>
        </div>
        <a href="#" id="historyBtn" class="action-item">
            <div class="icon-circle c-orange"><i class="fas fa-history"></i></div>
            <span>سجل الحركات</span>
        </a>
        <a href="#" id="installmentsBtn" class="action-item">
            <div class="icon-circle c-purple"><i class="fas fa-calendar-alt"></i></div>
            <span>أقساط</span>
        </a>
        <div class="action-item" onclick="resetAccount()">
            <div class="icon-circle c-red"><i class="fas fa-undo-alt"></i></div>
            <span>تصفير</span>
        </div>
    </div>

    <div class="info-row">
        <span class="info-value" id="displayAddress">غير مسجل</span>
        <span class="info-label">العنوان</span>
    </div>
    <div class="info-row">
        <span class="info-value" id="displayDate">--/--/----</span>
        <span class="info-label">تاريخ الإنشاء</span>
    </div>
    <div class="info-row">
        <span class="info-value" id="displayPhone">01xxxxxxxxx</span>
        <span class="info-label">رقم الهاتف</span>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, deleteDoc, updateDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
        authDomain: "elzyady-da509.firebaseapp.com",
        projectId: "elzyady-da509",
        storageBucket: "elzyady-da509.firebasestorage.app",
        messagingSenderId: "242117738897",
        appId: "1:242117738897:web:d658d6ca335b316f7f9a30"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const supId = urlParams.get('id');

    async function calculateRealBalance(supplierId, openingBal) {
        const qTrans = query(collection(db, "transactions"), where("partyId", "==", supplierId));
        const snapTrans = await getDocs(qTrans);
        
        const qItems = query(collection(db, "supplier_transactions"), where("supplierId", "==", supplierId));
        const snapItems = await getDocs(qItems);

        let totalPurchases = 0; 
        let totalPayments = 0;  

        snapTrans.forEach(doc => {
            const d = doc.data();
            const amt = Number(d.amount) || 0;
            if (d.type === "صرف") totalPayments += amt;
            else if (d.type === "قبض") totalPurchases += amt;
        });

        snapItems.forEach(doc => {
            const d = doc.data();
            const amt = Number(d.total) || Number(d.amount) || 0;
            if (d.type === "شراء" || d.type === "فاتورة شراء") totalPurchases += amt;
            else if (d.type === "مرتجع شراء") totalPayments += amt;
        });

        return (Number(openingBal) + totalPurchases) - totalPayments;
    }

    async function getSupplierDetails() {
        if(!supId) return;

        document.getElementById('editLink').href = `edit-supplier.html?id=${supId}`;
        document.getElementById('payBtn').href = `supplier-payment.html?id=${supId}`;
        document.getElementById('statementBtn').href = `supplier-statement.html?id=${supId}`;
        document.getElementById('historyBtn').href = `transactions-log.html?id=${supId}`;
        document.getElementById('installmentsBtn').href = `supplier-installments.html?id=${supId}`;

        try {
            const docRef = doc(db, "suppliers", supId);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                const opening = Number(data.openingBalance || 0);
                const realBalance = await calculateRealBalance(supId, opening);
                
                document.getElementById('displaySupName').innerText = data.name;
                document.getElementById('displayBalance').innerText = realBalance.toLocaleString('ar-EG');
                document.getElementById('displayOpening').innerText = opening.toLocaleString('ar-EG');
                document.getElementById('displayPhone').innerText = data.phone || 'غير مسجل';
                document.getElementById('displayAddress').innerText = data.address || 'غير مسجل';
                
                const status = document.getElementById('balanceStatus');
                if(Math.abs(realBalance) < 0.1) {
                    status.innerText = "الحساب خالص ✅";
                    status.style.color = "var(--success)";
                } else if (realBalance > 0) {
                    status.innerText = "مديونية للمورد ⚠️";
                    status.style.color = "var(--danger)";
                } else {
                    status.innerText = "رصيد فائض لنا 💎";
                    status.style.color = "var(--info)";
                }

                if(data.phone) {
                    document.getElementById('callBtn').href = `tel:${data.phone}`;
                    document.getElementById('remindBtn').onclick = () => {
                        const msg = encodeURIComponent(`شركة الزيادي ترحب بكم.\nنود إحاطتكم بأن الرصيد الحالي هو: ${realBalance.toLocaleString('ar-EG')} ج.م`);
                        window.open(`https://wa.me/2${data.phone}?text=${msg}`, '_blank');
                    };
                }

                if(data.createdAt) {
                    const date = data.createdAt.toDate ? data.createdAt.toDate() : new Date(data.createdAt);
                    document.getElementById('displayDate').innerText = date.toLocaleDateString('ar-EG');
                }
            }
        } catch (error) {
            console.error(error);
        }
    }

    window.resetAccount = async () => {
        if(confirm("تنبيه: سيتم تصفير حقول الرصيد في بيانات المورد الأساسية، هل أنت متأكد؟")) {
            await updateDoc(doc(db, "suppliers", supId), { openingBalance: 0 });
            location.reload();
        }
    };

    window.deleteSupplier = async () => {
        if(confirm("هل أنت متأكد من حذف المورد نهائياً من سجلات شركة الزيادي؟")) {
            await deleteDoc(doc(db, "suppliers", supId));
            window.location.href = "supplier-list.html";
        }
    };

    getSupplierDetails();
</script>
</body>
</html>
