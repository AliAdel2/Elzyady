<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المبالغ المتبقية - Masar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg-dark: #0d1117; 
            --glass: rgba(255,255,255,0.05); 
            --neon-blue: #58a6ff; 
            --neon-red: #ff7b72;
            --text-gray: #c9d1d9;
        }
        
        body { background: var(--bg-dark); font-family: 'Cairo', sans-serif; color: var(--text-gray); }
        
        .header { 
            background: rgba(13, 17, 23, 0.9); padding: 20px; 
            backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .summary-card {
            background: linear-gradient(45deg, #1f2937, #111827);
            border-radius: 20px; padding: 20px; margin-top: 15px;
            border: 1px solid rgba(88, 166, 255, 0.2);
            text-align: center;
        }

        .debt-item {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; padding: 15px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: 0.3s;
        }
        .debt-item:active { transform: scale(0.98); }

        .debt-value { color: var(--neon-red); font-weight: bold; font-size: 1.1rem; }
        
        .search-bar {
            background: rgba(255,255,255,0.03) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            color: white !important; border-radius: 12px; padding: 10px 15px;
        }
    </style>
</head>
<body>

<div class="header d-flex justify-content-between align-items-center">
    <i class="fas fa-chevron-right text-white" onclick="history.back()"></i>
    <h5 class="m-0 fw-bold">كشف المبالغ المتبقية</h5>
    <i class="fas fa-print text-info" onclick="window.print()"></i>
</div>

<div class="container">
    <div class="summary-card">
        <small class="opacity-50">إجمالي المديونيات المستحقة على العملاء</small>
        <h2 class="mt-2 fw-bold text-white" id="totalDebts">0.00 <small style="font-size: 1rem;">EGP</small></h2>
    </div>

    <div class="mt-3">
        <input type="text" id="searchDebt" class="form-control search-bar" placeholder="ابحث عن اسم العميل..." oninput="filterDebts()">
    </div>

    <div id="debtsList" class="mt-4">
        <div class="text-center opacity-50 my-5">
            <div class="spinner-border spinner-border-sm text-info"></div> جاري تجميع الحسابات الحقيقية...
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
        authDomain: "elzyady-da509.firebaseapp.com",
        projectId: "elzyady-da509",
        storageBucket: "elzyady-da509.firebasestorage.app",
        messagingSenderId: "242117738897",
        appId: "1:242117738897:web:d658d6ca335b316f7f9a30"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let debtData = [];

    // دالة حساب المديونية الحقيقية (شاملة الرصيد الافتتاحي الجديد)
    async function getCustomerRealBalance(customerData, customerId) {
        try {
            // 1. الرصيد الافتتاحي
            const opening = Number(customerData.initialBalance) || 0;

            // 2. متبقي الفواتير
            const qInv = query(collection(db, "invoices"), where("customerId", "==", customerId));
            const snapInv = await getDocs(qInv);
            let invRemaining = 0;
            snapInv.forEach(doc => invRemaining += (Number(doc.data().remaining) || 0));

            // 3. أثر السندات (قبض/صرف)
            const qTrans = query(collection(db, "transactions"), where("partyId", "==", customerId));
            const snapTrans = await getDocs(qTrans);
            let transEffect = 0;
            snapTrans.forEach(doc => {
                const tr = doc.data();
                if(tr.type === 'قبض') transEffect -= (Number(tr.amount) || 0);
                else if(tr.type === 'صرف') transEffect += (Number(tr.amount) || 0);
            });

            // الحسبة: افتتاحي + متبقي فواتير + اثر السندات
            return opening + invRemaining + transEffect;
        } catch (e) { return 0; }
    }

    async function loadDebts() {
        const snap = await getDocs(collection(db, "customers"));
        
        const promises = snap.docs.map(async (docSnap) => {
            const data = docSnap.data();
            const balance = await getCustomerRealBalance(data, docSnap.id);
            if (balance > 0) { 
                return { id: docSnap.id, ...data, realBalance: balance };
            }
            return null;
        });

        const results = await Promise.all(promises);
        debtData = results.filter(item => item !== null);

        // ترتيب من الأكبر للأصغر (عشان يظهر لك أكتر عميل مديون فوق)
        debtData.sort((a, b) => b.realBalance - a.realBalance);
        
        let total = debtData.reduce((sum, item) => sum + item.realBalance, 0);
        document.getElementById('totalDebts').innerText = total.toLocaleString('en-US', {minimumFractionDigits: 2});
        
        renderDebts(debtData);
    }

    function renderDebts(data) {
        const list = document.getElementById('debtsList');
        list.innerHTML = '';

        if(data.length === 0) {
            list.innerHTML = '<div class="text-center opacity-20 my-5">لا يوجد مديونيات حالياً</div>';
            return;
        }

        data.forEach(c => {
            list.innerHTML += `
                <div class="debt-item" onclick="window.location.href='customer-details.html?id=${c.id}'">
                    <div>
                        <div class="fw-bold text-white">${c.name}</div>
                        <small class="text-muted"><i class="fas fa-phone-alt me-1" style="font-size: 0.7rem;"></i> ${c.phone || 'بدون هاتف'}</small>
                    </div>
                    <div class="text-end">
                        <div class="debt-value">${c.realBalance.toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                        <small class="opacity-50" style="font-size: 0.7rem;">جنيه مصري</small>
                    </div>
                </div>
            `;
        });
    }

    window.filterDebts = () => {
        const term = document.getElementById('searchDebt').value.toLowerCase();
        const filtered = debtData.filter(c => c.name.toLowerCase().includes(term));
        renderDebts(filtered);
    }

    loadDebts();
</script>
</body>
</html>
