<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كبار العملاء - Masar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg-dark: #0d1117; 
            --glass: rgba(255,255,255,0.05); 
            --gold: #f2ca30;
            --neon-blue: #58a6ff; 
            --text-gray: #c9d1d9;
        }
        
        body { background: var(--bg-dark); font-family: 'Cairo', sans-serif; color: var(--text-gray); }
        
        .header { 
            background: rgba(13, 17, 23, 0.9); padding: 20px; 
            backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .top-three {
            display: flex; justify-content: space-around; align-items: flex-end;
            padding: 30px 10px; margin-bottom: 20px;
            background: radial-gradient(circle at top, rgba(242, 202, 48, 0.1), transparent);
        }

        .rank-box { text-align: center; position: relative; width: 30%; }
        .rank-avatar { 
            width: 60px; height: 60px; border-radius: 50%; border: 3px solid var(--glass);
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
            margin: 0 auto 10px auto; background: var(--bg-dark);
        }
        .rank-1 .rank-avatar { width: 85px; height: 85px; border-color: var(--gold); box-shadow: 0 0 20px rgba(242, 202, 48, 0.2); font-size: 2rem; }
        .rank-crown { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); color: var(--gold); font-size: 1.2rem; }

        .customer-row {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; padding: 15px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .sales-value { color: var(--gold); font-weight: bold; display: block; font-size: 0.9rem; }
        .badge-rank { background: rgba(255,255,255,0.1); width: 25px; height: 25px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; margin-left: 10px; }
        
        .name-limit { 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
            max-width: 100%; display: block; 
        }

        /* ستايل الجدول الجديد */
        .table-container {
            background: var(--glass);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow-x: auto;
        }
        .custom-table { width: 100%; color: var(--text-gray); border-collapse: collapse; }
        .custom-table th { color: var(--neon-blue); font-size: 0.85rem; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .custom-table td { padding: 12px; font-size: 0.9rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .custom-table tr:last-child td { border-bottom: none; }
    </style>
</head>
<body>

<div class="header d-flex justify-content-between align-items-center">
    <i class="fas fa-chevron-right text-white" onclick="history.back()"></i>
    <h5 class="m-0 fw-bold">كبار العملاء (الأكثر شراءً)</h5>
    <i class="fas fa-medal text-warning"></i>
</div>

<div class="container pb-5">
    <div class="top-three" id="podium"></div>

    <div class="section-title opacity-50 mb-3" style="font-size: 0.8rem;">قائمة العملاء (كروت)</div>
    <div id="topCustomersList"></div>

    <div class="section-title opacity-50 mb-3 mt-4" style="font-size: 0.8rem;">جدول ترتيب المسحوبات</div>
    <div class="table-container">
        <table class="custom-table">
            <thead>
                <tr>
                    <th class="text-center">#</th>
                    <th>العميل</th>
                    <th class="text-center">إجمالي المسحوبات</th>
                </tr>
            </thead>
            <tbody id="rankingTableBody">
                <tr>
                    <td colspan="3" class="text-center py-4">جاري تحميل الجدول...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
        authDomain: "elzyady-da509.firebaseapp.com",
        projectId: "elzyady-da509",
        storageBucket: "elzyady-da509.firebasestorage.app",
        messagingSenderId: "242117738897",
        appId: "1:242117738897:web:d658d6ca335b316f7f9a30"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function calculateSales() {
        try {
            const [customersSnap, invoicesSnap] = await Promise.all([
                getDocs(collection(db, "customers")),
                getDocs(collection(db, "invoices"))
            ]);
            
            const salesMap = {};
            invoicesSnap.forEach(doc => {
                const inv = doc.data();
                salesMap[inv.customerId] = (salesMap[inv.customerId] || 0) + (Number(inv.total) || 0);
            });

            const ranking = [];
            customersSnap.forEach(doc => {
                const data = doc.data();
                ranking.push({
                    id: doc.id,
                    name: data.name,
                    phone: data.phone || 'بدون هاتف',
                    totalSales: salesMap[doc.id] || 0
                });
            });

            return ranking.sort((a, b) => b.totalSales - a.totalSales);
        } catch (e) {
            console.error(e);
            return [];
        }
    }

    async function loadTopCustomers() {
        const fullRanking = await calculateSales();
        renderTopThree(fullRanking.slice(0, 3));
        renderRest(fullRanking.slice(3, 10)); // الكروت (توب 10)
        renderTable(fullRanking); // الجدول يعرض الكل
    }

    function renderTopThree(top) {
        const podium = document.getElementById('podium');
        if(top.length === 0) return;
        podium.innerHTML = `
            <div class="rank-box rank-2">
                <div class="rank-avatar"><i class="fas fa-user text-secondary"></i></div>
                <small class="name-limit fw-bold">${top[1]?.name || '---'}</small>
                <small class="sales-value">${(top[1]?.totalSales || 0).toLocaleString()} ج.م</small>
            </div>
            <div class="rank-box rank-1">
                <i class="fas fa-crown rank-crown"></i>
                <div class="rank-avatar"><i class="fas fa-user text-warning"></i></div>
                <small class="name-limit fw-bold">${top[0]?.name || '---'}</small>
                <small class="sales-value">${(top[0]?.totalSales || 0).toLocaleString()} ج.م</small>
            </div>
            <div class="rank-box rank-3">
                <div class="rank-avatar"><i class="fas fa-user" style="color: #cd7f32;"></i></div>
                <small class="name-limit fw-bold">${top[2]?.name || '---'}</small>
                <small class="sales-value">${(top[2]?.totalSales || 0).toLocaleString()} ج.م</small>
            </div>
        `;
    }

    function renderRest(others) {
        const list = document.getElementById('topCustomersList');
        list.innerHTML = others.map((c, i) => `
            <div class="customer-row" onclick="window.location.href='customer-details.html?id=${c.id}'">
                <div class="d-flex align-items-center overflow-hidden">
                    <div class="badge-rank">${i + 4}</div>
                    <div class="ms-2">
                        <div class="fw-bold text-white name-limit">${c.name}</div>
                        <small class="opacity-50" style="font-size: 0.7rem;">${c.phone}</small>
                    </div>
                </div>
                <div class="text-end" style="min-width: 100px;">
                    <div class="sales-value">${c.totalSales.toLocaleString()}</div>
                </div>
            </div>
        `).join('');
    }

    function renderTable(all) {
        const tbody = document.getElementById('rankingTableBody');
        tbody.innerHTML = all.map((c, i) => `
            <tr onclick="window.location.href='customer-details.html?id=${c.id}'" style="cursor:pointer">
                <td class="text-center"><span class="opacity-50">${i + 1}</span></td>
                <td>
                    <div class="fw-bold">${c.name}</div>
                    <small class="opacity-40">${c.phone}</small>
                </td>
                <td class="text-center fw-bold text-warning">${c.totalSales.toLocaleString()} <small>ج.م</small></td>
            </tr>
        `).join('');
    }

    loadTopCustomers();
</script>
</body>
</html>
