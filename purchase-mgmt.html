<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المشتريات </title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg: #0d1117; 
            --glass: rgba(255,255,255,0.05); 
            --neon-blue: #58a6ff; 
            --neon-pink: #f85149; /* مائل للأحمر النيون حسب ستايلك */
            --neon-green: #3fb950;
            --neon-purple: #bc8cff;
            --neon-orange: #d29922;
        }

        body { 
            background: var(--bg); 
            font-family: 'Cairo', sans-serif; 
            color: #c9d1d9; 
            padding-bottom: 30px; 
        }
        
        .header-section { 
            padding: 20px; background: var(--glass); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px;
        }

        .menu-card {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 22px;
            padding: 25px 10px;
            text-align: center;
            transition: 0.3s;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
        }

        .menu-card:hover {
            transform: translateY(-8px);
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.2);
        }

        .icon-box {
            width: 65px;
            height: 65px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.7rem;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* توزيع الألوان النيون */
        .c-pink { color: var(--neon-pink); border-color: rgba(248, 81, 73, 0.2); }
        .c-blue { color: var(--neon-blue); border-color: rgba(88, 166, 255, 0.2); }
        .c-green { color: var(--neon-green); border-color: rgba(63, 185, 80, 0.2); }
        .c-purple { color: var(--neon-purple); border-color: rgba(188, 140, 255, 0.2); }
        .c-orange { color: var(--neon-orange); border-color: rgba(210, 153, 34, 0.2); }

        .card-title {
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 5px;
        }

        .card-desc {
            font-size: 0.75rem;
            color: #8b949e;
            margin: 0;
            line-height: 1.4;
        }

    </style>
</head>
<body>

<div class="header-section">
    <a href="dashboard.html" class="text-white"><i class="fas fa-arrow-right"></i></a>
    <h5 class="m-0 fw-bold">إدارة المشتريات</h5>
    <i class="fas fa-cog opacity-50"></i>
</div>

<div class="container">
    <div class="row row-cols-2 g-3">
        
        <div class="col">
            <a href="new-purchase-invoice.html" class="menu-card">
                <div class="icon-box c-pink">
                    <i class="fas fa-cart-plus"></i>
                </div>
                <div class="card-title">فاتورة شراء</div>
                <p class="card-desc">توريد أصناف للمخزن</p>
            </a>
        </div>

        <div class="col">
            <a href="purchase-invoices-list.html" class="menu-card">
                <div class="icon-box c-blue">
                    <i class="fas fa-file-invoice-dollar"></i>
                </div>
                <div class="card-title">سجل الفواتير </div>
                <p class="card-desc">عرض فواتير الشراء</p>
            </a>
        </div>

        <div class="col">
            <a href="new-order.html" class="menu-card">
                <div class="icon-box c-green">
                    <i class="fas fa-file-medical"></i>
                </div>
                <div class="card-title">طلبية جديدة</div>
                <p class="card-desc">طلب أصناف من مورد</p>
            </a>
        </div>

        <div class="col">
            <a href="purchase-orders-list.html" class="menu-card">
                <div class="icon-box c-orange">
                    <i class="fas fa-clipboard-list"></i>
                </div>
                <div class="card-title">متابعة الطلبات</div>
                <p class="card-desc">إدارة أوامر الشراء</p>
            </a>
        </div>

        <div class="col">
            <a href="purchase-return.html" class="menu-card">
                <div class="icon-box c-purple">
                    <i class="fas fa-box-open"></i>
                </div>
                <div class="card-title">مرتجع شراء</div>
                <p class="card-desc">إرجاع أصناف للمورد</p>
            </a>
        </div>

        <div class="col">
            <a href="returns-list.html" class="menu-card">
                <div class="icon-box opacity-75">
                    <i class="fas fa-history text-white"></i>
                </div>
                <div class="card-title">سجل المرتجع</div>
                <p class="card-desc">الأصناف المرجعة</p>
            </a>
        </div>

    </div>
</div>

</body>
</html>
