<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل الفواتير - Warchat Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0d1117;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --neon-blue: #58a6ff;
            --success-green: #3fb950;
            --danger-red: #f85149;
        }

        body { background: var(--bg-dark); font-family: 'Cairo', sans-serif; color: #c9d1d9; padding: 1px; }

        /* شريط البحث */
        .search-box {
            background: var(--glass-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px 15px;
            margin-bottom: 20px;
        }
        .search-box input {
            background: transparent !important;
            border: none !important;
            color: white !important;
            box-shadow: none !important;
        }

        /* كارت الفاتورة المطور */
        .invoice-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 15px;
            position: relative;
        }

        .status-badge {
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 20px;
            float: left;
        }
        .bg-draft { background: rgba(88, 166, 255, 0.1); color: var(--neon-blue); border: 1px solid var(--neon-blue); }
        .bg-final { background: rgba(69, 185, 80, 0.1); color: var(--success-green); border: 1px solid var(--success-green); }

        /* كروت المبالغ الصغيرة داخل الفاتورة */
        .payment-info {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-top: 15px;
        }
        .mini-card {
            padding: 8px;
            border-radius: 10px;
            text-align: center;
            font-size: 0.85rem;
        }
        .mini-total { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); }
        .mini-paid { background: rgba(63, 185, 80, 0.1); border: 1px solid rgba(63, 185, 80, 0.2); color: #85e09b; }
        .mini-remain { background: rgba(248, 81, 73, 0.1); border: 1px solid rgba(248, 81, 73, 0.2); color: #ff7b72; }

        .btn-action {
            width: 100%;
            margin-top: 15px;
            border-radius: 10px;
            font-weight: 600;
            padding: 8px;
            border: none;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }
        .btn-resume { background: var(--neon-blue); color: white; }
        .btn-resume:hover { background: #4091eb; color: white; }
        .btn-view { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        .btn-view:hover { background: rgba(255,255,255,0.2); color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mt-3 mb-3">
        <h5 class="fw-bold mb-0"><i class="fas fa-history me-2 text-info"></i> سجل العمليات</h5>
        <a href="index1.html" class="btn btn-outline-light btn-sm rounded-pill px-3">الرئيسية</a>
    </div>

    <div class="search-box d-flex align-items-center">
        <i class="fas fa-search text-secondary me-2"></i>
        <input type="text" id="searchInput" class="form-control" placeholder="بحث باسم العميل أو الموبايل..." oninput="filterInvoices()">
    </div>

    <div id="invoicesList">
        <div class="text-center py-5" id="mainLoader">
            <div class="spinner-border text-info"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
  apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
  authDomain: "elzyady-da509.firebaseapp.com",
  projectId: "elzyady-da509",
  storageBucket: "elzyady-da509.firebasestorage.app",
  messagingSenderId: "242117738897",
  appId: "1:242117738897:web:d658d6ca335b316f7f9a30",
  measurementId: "G-JPRK3BT495"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allInvoices = [];

    async function loadData() {
        try {
            const q = query(collection(db, "invoices"), orderBy("timestamp", "desc"));
            const snap = await getDocs(q);
            allInvoices = [];
            snap.forEach(doc => {
                allInvoices.push({ id: doc.id, ...doc.data() });
            });
            renderInvoices(allInvoices);
        } catch(e) { 
            console.error(e); 
            document.getElementById('invoicesList').innerHTML = '<div class="text-center text-danger">خطأ في التحميل</div>';
        }
    }

    window.renderInvoices = function(dataArray) {
        const list = document.getElementById('invoicesList');
        list.innerHTML = '';
        
        if(dataArray.length === 0) {
            list.innerHTML = '<div class="text-center opacity-50 mt-5">لا توجد نتائج</div>';
            return;
        }

        dataArray.forEach(inv => {
            const date = inv.timestamp?.toDate ? 
                inv.timestamp.toDate().toLocaleString('ar-EG', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}) 
                : 'غير مؤرخ';
            
            const total = inv.total || 0;
            const paid = inv.paid || 0;
            const remain = (total - paid).toFixed(2);
            const isDraft = inv.status === 'draft';
            const statusLabel = isDraft ? 'مفتوحة' : 'مكتملة';
            const statusClass = isDraft ? 'bg-draft' : 'bg-final';

            // تحديد شكل الزرار بناءً على الحالة
            const actionBtn = isDraft ? 
                `<a href="pos6.html?edit=${inv.id}" class="btn-action btn-resume">
                    استكمال وتعديل <i class="fas fa-edit"></i>
                 </a>` : 
                `<a href="pos6.html?edit=${inv.id}" class="btn-action btn-view">
                    عرض تفاصيل الفاتورة <i class="fas fa-eye"></i>
                 </a>`;

            list.innerHTML += `
                <div class="invoice-card">
                    <span class="status-badge ${statusClass}">${statusLabel}</span>
                    <h6 class="fw-bold text-white mb-1 mt-1">${inv.customer?.name || 'عميل غير مسجل'}</h6>
                    <small class="text-secondary d-block mb-3" style="font-size: 0.7rem;">
                        <i class="fas fa-phone-alt me-1"></i> ${inv.customer?.phone || 'لا يوجد رقم'} | <i class="far fa-clock ms-2"></i> ${date}
                    </small>

                    <div class="payment-info">
                        <div class="mini-card mini-total">
                            <small class="d-block opacity-50">الإجمالي</small>
                            <span class="fw-bold">${total}</span>
                        </div>
                        <div class="mini-card mini-paid">
                            <small class="d-block opacity-75">المدفوع</small>
                            <span class="fw-bold">${paid}</span>
                        </div>
                        <div class="mini-card mini-remain">
                            <small class="d-block opacity-75">المتبقي</small>
                            <span class="fw-bold">${remain}</span>
                        </div>
                    </div>

                    ${actionBtn}
                </div>
            `;
        });
    }

    window.filterInvoices = function() {
        const text = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allInvoices.filter(inv => 
            (inv.customer?.name || "").toLowerCase().includes(text) || 
            (inv.customer?.phone || "").includes(text)
        );
        renderInvoices(filtered);
    }

    loadData();
</script>

</body>
</html>
