<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل العملاء - الزيادى</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">

    <style>
        :root { --bg: #0d1117; --glass: rgba(255,255,255,0.05); --neon: #58a6ff; }
        body { background: var(--bg); font-family: 'Cairo', sans-serif; color: #c9d1d9; padding: 2px; margin-top: 15px; }
        .glass-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 12px; margin-bottom: 12px; transition: 0.3s; display: flex; justify-content: space-between; align-items: center; }
        .glass-card:hover { border-color: var(--neon); background: rgba(255,255,255,0.08); transform: translateY(-2px); }
        .form-control { background: rgba(0,0,0,0.2) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: #fff !important; border-radius: 12px; }
        .cust-avatar { width: 45px; height: 45px; background: var(--neon); color: #fff; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-weight: bold; margin-left: 15px; }
        .btn-profile { background: rgba(88, 166, 255, 0.1); color: var(--neon); border: 1px solid var(--neon); border-radius: 10px; font-size: 0.8rem; padding: 6px 15px; text-decoration: none; transition: 0.3s; }
        .btn-profile:hover { background: var(--neon); color: #fff; }
        .search-box { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 5px 15px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="fw-bold m-0"><i class="fas fa-users text-info me-2"></i> دليل العملاء</h5>
        <a href="index1.html" class="btn btn-outline-light btn-sm rounded-pill px-3">الرئيسية</a>
    </div>

    <div class="search-box">
        <div class="input-group">
            <span class="input-group-text bg-transparent border-0 text-secondary"><i class="fas fa-search"></i></span>
            <input type="text" id="searchInput" class="form-control border-0 shadow-none" placeholder="ابحث باسم العميل أو رقم الموبايل..." oninput="filterCustomers()">
        </div>
    </div>

    <div id="customersContainer">
        <div class="text-center opacity-20 py-5">
            <div class="spinner-border text-info mb-3" role="status"></div>
            <p>جاري تحميل قائمة العملاء...</p>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
  apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
  authDomain: "elzyady-da509.firebaseapp.com",
  projectId: "elzyady-da509",
  storageBucket: "elzyady-da509.firebasestorage.app",
  messagingSenderId: "242117738897",
  appId: "1:242117738897:web:d658d6ca335b316f7f9a30",
  measurementId: "G-JPRK3BT495"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let allCustomers = [];

    async function fetchCustomers() {
        try {
            const q = query(collection(db, "customers"), orderBy("name", "asc"));
            const snap = await getDocs(q);
            allCustomers = [];
            
            snap.forEach(doc => {
                allCustomers.push({ id: doc.id, ...doc.data() });
            });
            
            renderCustomers(allCustomers);
        } catch (error) {
            console.error("Error fetching customers:", error);
            document.getElementById('customersContainer').innerHTML = '<div class="text-center text-danger py-5">خطأ في تحميل البيانات.</div>';
        }
    }

    function renderCustomers(list) {
        const container = document.getElementById('customersContainer');
        container.innerHTML = '';
        
        if(list.length === 0) {
            container.innerHTML = '<div class="text-center opacity-50 py-5">لا يوجد عملاء بهذا الاسم.</div>';
            return;
        }

        list.forEach(cust => {
            const firstLetter = cust.name ? cust.name.charAt(0).toUpperCase() : '?';
            const safeName = encodeURIComponent(cust.name); // تشفير الاسم عشان لو فيه مسافات أو رموز في الـ URL
            const safePhone = cust.phone || '';

            container.innerHTML += `
                <div class="glass-card">
                    <div class="d-flex align-items-center">
                        <div class="cust-avatar">${firstLetter}</div>
                        <div>
                            <div class="fw-bold text-white mb-0">${cust.name}</div>
                            <small class="text-secondary"><i class="fas fa-phone-alt me-1" style="font-size: 0.7rem;"></i> ${cust.phone || 'بدون رقم'}</small>
                        </div>
                    </div>
                    <a href="customer_profile.html?name=${safeName}&phone=${safePhone}" class="btn-profile">
                        <i class="fas fa-eye me-1"></i> عرض الملف
                    </a>
                </div>
            `;
        });
    }

    window.filterCustomers = function() {
        const term = document.getElementById('searchInput').value.toLowerCase().trim();
        const filtered = allCustomers.filter(c => 
            (c.name && c.name.toLowerCase().includes(term)) || 
            (c.phone && c.phone.includes(term))
        );
        renderCustomers(filtered);
    }

    fetchCustomers();
</script>
</body>
</html>
