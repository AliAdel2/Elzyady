<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مديونيات الموردين - شركة الزيادى</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0d1117; --glass: rgba(255,255,255,0.05); --neon-blue: #58a6ff; --neon-red: #f85149; --neon-green: #3fb950; }
        body { background: var(--bg); font-family: 'Cairo', sans-serif; color: #c9d1d9; padding-bottom: 30px; }
        
        .header-section { 
            padding: 20px; background: var(--glass); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
        }

        .total-debt-card {
            background: linear-gradient(135deg, rgba(248, 81, 73, 0.1), rgba(88, 166, 255, 0.1));
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            padding: 20px; margin: 20px 0; text-align: center;
        }
        .total-debt-amount { font-size: 2.2rem; font-weight: 800; color: #fff; transition: 0.3s; }

        .filter-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .filter-btn {
            flex: 1; padding: 10px; border-radius: 12px; background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1); color: #8b949e;
            font-size: 0.85rem; font-weight: 600; transition: 0.3s; cursor: pointer; text-align: center;
        }
        .filter-btn.active { background: rgba(88, 166, 255, 0.15); border-color: var(--neon-blue); color: #fff; }
        .filter-btn.active.btn-red { background: rgba(248, 81, 73, 0.15); border-color: var(--neon-red); }
        .filter-btn.active.btn-green { background: rgba(63, 185, 80, 0.15); border-color: var(--neon-green); }

        .debt-item {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px; padding: 15px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s; text-decoration: none; color: inherit;
        }
        .debt-item:hover { transform: scale(1.01); border-color: var(--neon-blue); background: rgba(255,255,255,0.08); }

        .sup-info h6 { margin: 0; font-weight: 700; color: #fff; }
        .sup-info small { color: #8b949e; }
        .debt-value { text-align: left; }
        .debt-value .amount { font-weight: 800; display: block; font-size: 1.1rem; }

        .search-box {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: #fff; padding: 12px 15px; margin-bottom: 15px; width: 100%; outline: none;
        }
        .search-box:focus { border-color: var(--neon-blue); }
        .c-red { color: var(--neon-red) !important; }
        .c-green { color: var(--neon-green) !important; }
        .empty-state { text-align: center; padding: 50px; opacity: 0.5; }
    </style>
</head>
<body>

<div class="header-section">
    <a href="supplier-management.html" class="text-white"><i class="fas fa-arrow-right"></i></a>
    <h5 class="m-0 fw-bold">مديونيات الموردين</h5>
    <i class="fas fa-sync" onclick="location.reload()" style="cursor:pointer"></i>
</div>

<div class="container">
    <div class="total-debt-card">
        <div id="cardTitle" style="font-size: 0.9rem; opacity: 0.8;">صافي إجمالي المديونيات للموردين</div>
        <div class="total-debt-amount" id="totalDebtSum">0.00</div>
        <div id="debtStatusLabel" style="font-size: 0.8rem; margin-top: 5px;">جاري حساب الإجماليات...</div>
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="ابحث باسم المورد...">

    <div class="filter-tabs">
        <div class="filter-btn active" onclick="filterData('all', this)">الكل</div>
        <div class="filter-btn btn-red" onclick="filterData('madin', this)">علينا (مدين)</div>
        <div class="filter-btn btn-green" onclick="filterData('daen', this)">لينا (دائن)</div>
    </div>

    <div id="debtList">
        <div class="text-center mt-5"><div class="spinner-border text-info"></div><br><p class="mt-2">جاري التدقيق المالي...</p></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
        authDomain: "elzyady-da509.firebaseapp.com",
        projectId: "elzyady-da509",
        storageBucket: "elzyady-da509.firebasestorage.app",
        messagingSenderId: "242117738897",
        appId: "1:242117738897:web:d658d6ca335b316f7f9a30"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function getRealBalance(supId, openingBal) {
        const [snapTrans, snapItems] = await Promise.all([
            getDocs(query(collection(db, "transactions"), where("partyId", "==", supId))),
            getDocs(query(collection(db, "supplier_transactions"), where("supplierId", "==", supId)))
        ]);

        let debt = 0;   // علينا
        let credit = 0; // سددناه

        snapTrans.forEach(doc => {
            const d = doc.data();
            const amt = Number(d.amount) || 0;
            if (d.type === "صرف") credit += amt;
            else if (d.type === "قبض") debt += amt;
        });

        snapItems.forEach(doc => {
            const d = doc.data();
            const amt = Number(d.total) || Number(d.amount) || 0;
            if (d.type === "شراء" || d.type === "فاتورة شراء") debt += amt;
            else if (d.type === "مرتجع شراء") credit += amt;
        });

        return (Number(openingBal || 0) + debt) - credit;
    }

    window.updateTopCard = () => {
        const items = document.querySelectorAll('.debt-item');
        let totalSum = 0;
        let visibleCount = 0;

        items.forEach(item => {
            if (item.style.display !== 'none') {
                totalSum += parseFloat(item.getAttribute('data-balance'));
                visibleCount++;
            }
        });

        const sumEl = document.getElementById('totalDebtSum');
        sumEl.innerText = Math.abs(totalSum).toLocaleString() + " ج.م";
        sumEl.className = `total-debt-amount ${totalSum >= 0 ? 'c-red' : 'c-green'}`;
        document.getElementById('cardTitle').innerText = totalSum >= 0 ? "صافي مديونية علينا للموردين" : "صافي رصيد فائض لنا عند الموردين";
        document.getElementById('debtStatusLabel').innerText = `عدد الموردين المعروضين: ${visibleCount}`;
    };

    window.filterData = (type, btn) => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const items = document.querySelectorAll('.debt-item');
        items.forEach(item => {
            const bal = parseFloat(item.getAttribute('data-balance'));
            if (type === 'all') item.style.display = 'flex';
            else if (type === 'madin') item.style.display = bal > 0.1 ? 'flex' : 'none';
            else if (type === 'daen') item.style.display = bal < -0.1 ? 'flex' : 'none';
        });
        window.updateTopCard();
    };

    async function loadDebts() {
        const debtList = document.getElementById('debtList');
        try {
            const supSnap = await getDocs(collection(db, "suppliers"));
            let html = '';
            
            const balancePromises = supSnap.docs.map(async (doc) => {
                const data = doc.data();
                const balance = await getRealBalance(doc.id, data.openingBalance);
                return { id: doc.id, data, balance };
            });

            const results = await Promise.all(balancePromises);
            
            // ترتيب الموردين من الأكبر مديونية للأصغر
            results.sort((a, b) => b.balance - a.balance);

            results.forEach(res => {
                if (Math.abs(res.balance) > 0.1) {
                    const colorClass = res.balance < 0 ? 'c-green' : 'c-red';
                    html += `
                        <a href="supplier-details.html?id=${res.id}" 
                           class="debt-item" 
                           data-balance="${res.balance}" 
                           data-name="${res.data.name.toLowerCase()}">
                            <div class="sup-info">
                                <h6>${res.data.name}</h6>
                                <small><i class="fas fa-phone-alt me-1" style="font-size:0.6rem"></i> ${res.data.phone || 'غير مسجل'}</small>
                            </div>
                            <div class="debt-value text-start">
                                <span class="amount ${colorClass}">${Math.abs(res.balance).toLocaleString()}</span>
                                <small class="opacity-50" style="font-size:0.7rem">${res.balance > 0 ? 'علينا له' : 'لنا عنده'}</small>
                            </div>
                        </a>
                    `;
                }
            });

            debtList.innerHTML = html || '<div class="empty-state">لا يوجد مديونيات حالياً.. الحسابات خالية ✅</div>';
            window.updateTopCard();

            // تفعيل البحث
            document.getElementById('searchInput').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.debt-item').forEach(item => {
                    const match = item.getAttribute('data-name').includes(term);
                    item.style.display = match ? 'flex' : 'none';
                });
                window.updateTopCard();
            });

        } catch (error) {
            console.error(error);
            debtList.innerHTML = '<div class="alert alert-danger text-center">عذراً، حدث خطأ في جلب المديونيات</div>';
        }
    }

    loadDebts();
</script>
</body>
</html>
