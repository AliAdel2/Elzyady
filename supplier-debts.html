<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مديونيات الموردين - شركة الزيادى</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --accent: #0b5e3d; 
            --header-bg: #0b5e3d;
            --bg-light: #f4f7f6;
            --text-primary: #1b2e26;
            --border: #dce3de;
            --white: #ffffff;
            --danger: #d90429;
            --info: #0d6efd;
            --success: #2d6a4f;
        }

        body { background: var(--bg-light); font-family: 'Cairo', sans-serif; color: var(--text-primary); padding-bottom: 50px; }
        
        /* Header */
        .header-section { 
            background: var(--header-bg); padding: 12px 20px; color: white;
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* Stats/Total Card */
        .total-debt-card {
            background: var(--white); border: 1px solid var(--border); 
            border-radius: 18px; padding: 25px 15px; margin: 15px; text-align: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.03);
        }
        .total-debt-amount { font-size: 2rem; font-weight: 800; color: var(--accent); transition: 0.3s; }
        #cardTitle { font-size: 0.85rem; color: #6c757d; margin-bottom: 5px; font-weight: 700; }

        /* Tabs */
        .filter-tabs { display: flex; gap: 8px; padding: 0 15px 15px 15px; overflow-x: auto; scrollbar-width: none; }
        .filter-btn {
            flex: 1; padding: 10px; border-radius: 12px; background: var(--white);
            border: 1px solid var(--border); color: #6c757d;
            font-size: 0.8rem; font-weight: 700; transition: 0.3s; cursor: pointer; text-align: center; white-space: nowrap;
        }
        .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

        /* Debt Item Card */
        .debt-item {
            background: var(--white); border: 1px solid var(--border);
            border-radius: 18px; padding: 15px; margin: 0 15px 12px 15px;
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s; text-decoration: none; color: inherit;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .debt-item:hover { transform: translateY(-2px); border-color: var(--accent); }

        .sup-info h6 { margin: 0; font-weight: 800; color: var(--accent); font-size: 0.95rem; }
        .sup-info small { color: #6c757d; font-weight: 600; font-size: 0.75rem; }
        
        .debt-value { text-align: left; }
        .debt-value .amount { font-weight: 800; display: block; font-size: 1.1rem; }

        /* Search Box */
        .search-container { padding: 0 15px 15px 15px; }
        .search-box {
            width: 100%; background: var(--white); border: 1px solid var(--border); 
            padding: 10px 15px; border-radius: 12px; 
            color: var(--text-primary); outline: none; font-weight: 600; font-size: 0.9rem;
        }
        .search-box:focus { border-color: var(--accent); }

        .c-red { color: var(--danger) !important; }
        .c-green { color: var(--success) !important; }
        .empty-state { text-align: center; padding: 50px; opacity: 0.5; font-weight: 700; }
    </style>
</head>
<body>

<div class="header-section">
    <a href="supplier-management.html" class="text-white"><i class="fas fa-arrow-right"></i></a>
    <h6 class="m-0 fw-bold"><i class="fas fa-file-invoice-dollar me-1"></i> مديونيات الموردين</h6>
    <i class="fas fa-sync-alt" onclick="location.reload()" style="cursor:pointer; opacity: 0.8;"></i>
</div>

<div class="container-fluid p-0">
    <div class="total-debt-card">
        <div id="cardTitle">صافي إجمالي المديونيات للموردين</div>
        <div class="total-debt-amount" id="totalDebtSum">0.00</div>
        <div id="debtStatusLabel" style="font-size: 0.75rem; margin-top: 5px; font-weight: 700; color: #6c757d;">جاري الحساب...</div>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-box" placeholder="ابحث باسم المورد...">
    </div>

    <div class="filter-tabs">
        <div class="filter-btn active" onclick="filterData('all', this)">الكل</div>
        <div class="filter-btn" onclick="filterData('madin', this)">علينا (مدين)</div>
        <div class="filter-btn" onclick="filterData('daen', this)">لينا (دائن)</div>
    </div>

    <div id="debtList">
        <div class="text-center mt-5"><div class="spinner-border spinner-border-sm" style="color: var(--accent);"></div><p class="mt-2 small fw-bold">جاري التدقيق المالي...</p></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
        authDomain: "elzyady-da509.firebaseapp.com",
        projectId: "elzyady-da509",
        storageBucket: "elzyady-da509.firebasestorage.app",
        messagingSenderId: "242117738897",
        appId: "1:242117738897:web:d658d6ca335b316f7f9a30"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function getRealBalance(supId, openingBal) {
        const [snapTrans, snapItems] = await Promise.all([
            getDocs(query(collection(db, "transactions"), where("partyId", "==", supId))),
            getDocs(query(collection(db, "supplier_transactions"), where("supplierId", "==", supId)))
        ]);

        let debt = 0;   
        let credit = 0; 

        snapTrans.forEach(doc => {
            const d = doc.data();
            const amt = Number(d.amount) || 0;
            if (d.type === "صرف") credit += amt;
            else if (d.type === "قبض") debt += amt;
        });

        snapItems.forEach(doc => {
            const d = doc.data();
            const amt = Number(d.total) || Number(d.amount) || 0;
            if (d.type === "شراء" || d.type === "فاتورة شراء") debt += amt;
            else if (d.type === "مرتجع شراء") credit += amt;
        });

        return (Number(openingBal || 0) + debt) - credit;
    }

    window.updateTopCard = () => {
        const items = document.querySelectorAll('.debt-item');
        let totalSum = 0;
        let visibleCount = 0;

        items.forEach(item => {
            if (item.style.display !== 'none') {
                totalSum += parseFloat(item.getAttribute('data-balance'));
                visibleCount++;
            }
        });

        const sumEl = document.getElementById('totalDebtSum');
        sumEl.innerText = Math.abs(totalSum).toLocaleString('ar-EG') + " ج.م";
        sumEl.className = `total-debt-amount ${totalSum >= 0 ? 'c-red' : 'c-green'}`;
        document.getElementById('cardTitle').innerText = totalSum >= 0 ? "صافي مديونية علينا للموردين" : "صافي رصيد فائض لنا عند الموردين";
        document.getElementById('debtStatusLabel').innerText = `عدد الموردين: ${visibleCount}`;
    };

    window.filterData = (type, btn) => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const items = document.querySelectorAll('.debt-item');
        items.forEach(item => {
            const bal = parseFloat(item.getAttribute('data-balance'));
            if (type === 'all') item.style.display = 'flex';
            else if (type === 'madin') item.style.display = bal > 0.1 ? 'flex' : 'none';
            else if (type === 'daen') item.style.display = bal < -0.1 ? 'flex' : 'none';
        });
        window.updateTopCard();
    };

    async function loadDebts() {
        const debtList = document.getElementById('debtList');
        try {
            const supSnap = await getDocs(collection(db, "suppliers"));
            let html = '';
            
            const balancePromises = supSnap.docs.map(async (doc) => {
                const data = doc.data();
                const balance = await getRealBalance(doc.id, data.openingBalance);
                return { id: doc.id, data, balance };
            });

            const results = await Promise.all(balancePromises);
            results.sort((a, b) => b.balance - a.balance);

            results.forEach(res => {
                if (Math.abs(res.balance) > 0.1) {
                    const colorClass = res.balance < 0 ? 'c-green' : 'c-red';
                    html += `
                        <a href="supplier-details.html?id=${res.id}" 
                           class="debt-item" 
                           data-balance="${res.balance}" 
                           data-name="${res.data.name.toLowerCase()}">
                            <div class="sup-info">
                                <h6>${res.data.name}</h6>
                                <small><i class="fas fa-phone-alt me-1" style="font-size:0.6rem; color: var(--accent)"></i> ${res.data.phone || 'بدون هاتف'}</small>
                            </div>
                            <div class="debt-value text-start">
                                <span class="amount ${colorClass}">${Math.abs(res.balance).toLocaleString('ar-EG')}</span>
                                <small class="opacity-50" style="font-size:0.7rem; font-weight:800;">${res.balance > 0 ? 'علينا له' : 'لنا عنده'}</small>
                            </div>
                        </a>
                    `;
                }
            });

            debtList.innerHTML = html || '<div class="empty-state">لا يوجد مديونيات حالياً ✅</div>';
            window.updateTopCard();

            document.getElementById('searchInput').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.debt-item').forEach(item => {
                    const match = item.getAttribute('data-name').includes(term);
                    item.style.display = match ? 'flex' : 'none';
                });
                window.updateTopCard();
            });

        } catch (error) {
            console.error(error);
            debtList.innerHTML = '<div class="alert alert-danger mx-3 text-center small fw-bold">خطأ في جلب البيانات</div>';
        }
    }

    loadDebts();
</script>
</body>
</html>
