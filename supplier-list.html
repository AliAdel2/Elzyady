<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة الموردين - شركة الزيادى</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0d1117; --glass: rgba(255,255,255,0.05); --neon-blue: #58a6ff; --neon-green: #3fb950; --neon-red: #f85149; }
        body { background: var(--bg); font-family: 'Cairo', sans-serif; color: #c9d1d9; }
        .header-section { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; background: var(--bg); z-index: 100; }
        .search-box { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 10px 15px; display: flex; align-items: center; margin: 15px 0; }
        .search-box input { background: transparent; border: none; color: #fff; width: 100%; margin-right: 10px; outline: none; }
        .supplier-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 22px; padding: 18px; margin-bottom: 15px; transition: 0.3s; display: flex; justify-content: space-between; align-items: center; }
        .supplier-name { color: #fff; font-weight: 700; font-size: 1.05rem; margin: 0; }
        .balance-label { font-size: 0.7rem; opacity: 0.5; display: block; margin-bottom: 2px; }
        .balance-value { font-weight: 700; font-size: 0.95rem; }
        .text-debt { color: var(--neon-red); }
        .text-clear { color: var(--neon-green); }
        .action-container { display: flex; gap: 10px; margin-left: 5px; }
        .action-btn { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; text-decoration: none; transition: 0.2s; font-size: 1.1rem; }
        .btn-pay { background: rgba(63, 185, 80, 0.1); color: var(--neon-green); border: 1px solid rgba(63, 185, 80, 0.2); }
        .btn-info { background: rgba(88, 166, 255, 0.1); color: var(--neon-blue); border: 1px solid rgba(88, 166, 255, 0.2); }
    </style>
</head>
<body>

<div class="header-section">
    <div class="container d-flex justify-content-between align-items-center">
        <a href="purchase-mgmt.html" class="text-white"><i class="fas fa-chevron-right"></i></a>
        <h5 class="m-0 fw-bold">قائمة الموردين</h5>
        <div style="width: 24px;"></div>
    </div>
    <div class="container">
        <div class="search-box">
            <i class="fas fa-search opacity-50"></i>
            <input type="text" id="searchInput" placeholder="ابحث بالإسم أو رقم الهاتف..." oninput="filterSuppliers()">
        </div>
    </div>
</div>

<div class="container py-3" id="suppliersContainer">
    <div class="text-center py-5 opacity-50 text-info">
        <div class="spinner-border spinner-border-sm me-2"></div>
        جاري جرد حسابات الموردين...
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, orderBy, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
        authDomain: "elzyady-da509.firebaseapp.com",
        projectId: "elzyady-da509",
        storageBucket: "elzyady-da509.firebasestorage.app",
        messagingSenderId: "242117738897",
        appId: "1:242117738897:web:d658d6ca335b316f7f9a30"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allSuppliers = [];

    async function calculateSupplierBalance(supId, openingBal) {
        // 1. السندات (صرف / قبض)
        const qTrans = query(collection(db, "transactions"), where("partyId", "==", supId));
        const snapTrans = await getDocs(qTrans);
        
        // 2. الفواتير والمرتجعات
        const qItems = query(collection(db, "supplier_transactions"), where("supplierId", "==", supId));
        const snapItems = await getDocs(qItems);

        let debt = 0;   // مبالغ علينا (مشتريات)
        let credit = 0; // مبالغ لينا (سداد أو مرتجع)

        snapTrans.forEach(doc => {
            const d = doc.data();
            const amt = Number(d.amount) || 0;
            if (d.type === "صرف") credit += amt;
            else if (d.type === "قبض") debt += amt;
        });

        snapItems.forEach(doc => {
            const d = doc.data();
            const amt = Number(d.total) || Number(d.amount) || 0;
            if (d.type === "شراء" || d.type === "فاتورة شراء") debt += amt;
            else if (d.type === "مرتجع شراء") credit += amt;
        });

        return (Number(openingBal || 0) + debt) - credit;
    }

    async function loadSuppliers() {
        const container = document.getElementById('suppliersContainer');
        try {
            const q = query(collection(db, "suppliers"), orderBy("name"));
            const snap = await getDocs(q);
            
            const supplierPromises = snap.docs.map(async (d) => {
                const data = d.data();
                const balance = await calculateSupplierBalance(d.id, data.openingBalance);
                return { id: d.id, ...data, calculatedBalance: balance };
            });

            allSuppliers = await Promise.all(supplierPromises);
            renderSuppliers(allSuppliers);
        } catch (e) {
            console.error(e);
            container.innerHTML = `<div class="text-danger text-center">خطأ في تحميل البيانات</div>`;
        }
    }

    window.renderSuppliers = (list) => {
        const container = document.getElementById('suppliersContainer');
        if(list.length === 0) {
            container.innerHTML = '<div class="text-center opacity-50 py-5">لا يوجد موردين بهذا الاسم</div>';
            return;
        }
        
        container.innerHTML = list.map(sup => {
            const balance = sup.calculatedBalance || 0;
            const balanceText = balance === 0 ? "خالص" : Math.abs(balance).toLocaleString() + " ج.م";
            const balanceClass = balance > 0 ? 'text-debt' : (balance < 0 ? 'text-info' : 'text-clear');
            const label = balance > 0 ? 'مديونية للمورد' : (balance < 0 ? 'رصيد لك' : 'الحساب');

            return `
                <div class="supplier-card">
                    <div class="supplier-main">
                        <h6 class="supplier-name">${sup.name}</h6>
                        <div class="mt-2">
                            <span class="balance-label">${label}</span>
                            <span class="balance-value ${balanceClass}">${balanceText}</span>
                        </div>
                    </div>
                    <div class="action-container">
                        <a href="supplier-details.html?id=${sup.id}" class="action-btn btn-info" title="التفاصيل"><i class="fas fa-info-circle"></i></a>
                        <a href="supplier-payment.html?id=${sup.id}" class="action-btn btn-pay" title="سداد"><i class="fas fa-money-bill-wave"></i></a>
                    </div>
                </div>
            `;
        }).join('');
    }

    window.filterSuppliers = () => {
        const term = document.getElementById('searchInput').value.toLowerCase();
        renderSuppliers(allSuppliers.filter(s => 
            s.name.toLowerCase().includes(term) || 
            (s.phone && s.phone.includes(term))
        ));
    }

    loadSuppliers();
</script>
</body>
</html>
