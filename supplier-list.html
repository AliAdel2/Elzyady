<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة الموردين - شركة الزيادى</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --accent: #0b5e3d; 
            --header-bg: #0b5e3d;
            --bg-light: #f4f7f6;
            --text-primary: #1b2e26;
            --border: #dce3de;
            --white: #ffffff;
            --danger: #d90429;
            --success: #2d6a4f;
            --info: #0d6efd;
        }

        body { background: var(--bg-light); font-family: 'Cairo', sans-serif; color: var(--text-primary); }
        
        .header-section { 
            padding: 15px 0; background: var(--header-bg); 
            color: white; position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .search-box { 
            background: var(--white); border: 1px solid var(--border); 
            border-radius: 12px; padding: 10px 15px; display: flex; 
            align-items: center; margin: 15px 0; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .search-box input { 
            background: transparent; border: none; color: var(--text-primary); 
            width: 100%; outline: none; font-size: 0.9rem; font-weight: 600;
        }
        .search-box i { color: var(--accent); opacity: 0.7; margin-left: 10px; }

        .supplier-card { 
            background: var(--white); border: 1px solid var(--border); 
            border-radius: 18px; padding: 15px; margin-bottom: 12px; 
            transition: 0.3s; display: flex; justify-content: space-between; 
            align-items: center; box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }
        .supplier-card:hover { border-color: var(--accent); transform: translateY(-2px); }

        .supplier-name { color: var(--accent); font-weight: 800; font-size: 1rem; margin: 0; }
        .balance-label { font-size: 0.7rem; color: #6c757d; font-weight: 700; display: block; margin-bottom: 2px; }
        .balance-value { font-weight: 800; font-size: 0.95rem; }
        
        .text-debt { color: var(--danger); }
        .text-clear { color: var(--success); }
        .text-credit { color: var(--info); }

        .action-container { display: flex; gap: 8px; }
        .action-btn { 
            width: 40px; height: 40px; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; 
            text-decoration: none; transition: 0.2s; font-size: 1rem; 
            border: 1px solid var(--border);
        }
        .btn-pay { background: #e9f5ee; color: var(--success); border-color: #c9e7d5; }
        .btn-info { background: #f0f4ff; color: var(--info); border-color: #dbe4ff; }
        
        .spinner-custom { color: var(--accent); font-weight: 700; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="header-section">
    <div class="container d-flex justify-content-between align-items-center">
        <a href="supplier-management.html" class="text-white"><i class="fas fa-arrow-right"></i></a>
        <h6 class="m-0 fw-bold">قائمة الموردين </h6>
        <div style="width: 20px;"></div>
    </div>
    <div class="container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="ابحث باسم المورد أو الهاتف..." oninput="filterSuppliers()">
            <i class="fas fa-search"></i>
        </div>
    </div>
</div>

<div class="container py-3" id="suppliersContainer">
    <div class="text-center py-5 spinner-custom">
        <div class="spinner-border spinner-border-sm me-2"></div>
        جاري مراجعة حسابات الموردين...
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, orderBy, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
        authDomain: "elzyady-da509.firebaseapp.com",
        projectId: "elzyady-da509",
        storageBucket: "elzyady-da509.firebasestorage.app",
        messagingSenderId: "242117738897",
        appId: "1:242117738897:web:d658d6ca335b316f7f9a30"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allSuppliers = [];

    async function calculateSupplierBalance(supId, openingBal) {
        const [snapTrans, snapItems] = await Promise.all([
            getDocs(query(collection(db, "transactions"), where("partyId", "==", supId))),
            getDocs(query(collection(db, "supplier_transactions"), where("supplierId", "==", supId)))
        ]);

        let debt = 0;   
        let credit = 0; 

        snapTrans.forEach(doc => {
            const d = doc.data();
            const amt = Number(d.amount) || 0;
            if (d.type === "صرف") credit += amt;
            else if (d.type === "قبض") debt += amt;
        });

        snapItems.forEach(doc => {
            const d = doc.data();
            const amt = Number(d.total) || Number(d.amount) || 0;
            if (d.type === "شراء" || d.type === "فاتورة شراء") debt += amt;
            else if (d.type === "مرتجع شراء") credit += amt;
        });

        return (Number(openingBal || 0) + debt) - credit;
    }

    async function loadSuppliers() {
        const container = document.getElementById('suppliersContainer');
        try {
            const q = query(collection(db, "suppliers"), orderBy("name"));
            const snap = await getDocs(q);
            
            const supplierPromises = snap.docs.map(async (d) => {
                const data = d.data();
                const balance = await calculateSupplierBalance(d.id, data.openingBalance);
                return { id: d.id, ...data, calculatedBalance: balance };
            });

            allSuppliers = await Promise.all(supplierPromises);
            renderSuppliers(allSuppliers);
        } catch (e) {
            container.innerHTML = `<div class="text-danger text-center fw-bold">عذراً، فشل الاتصال بالقاعدة</div>`;
        }
    }

    window.renderSuppliers = (list) => {
        const container = document.getElementById('suppliersContainer');
        if(list.length === 0) {
            container.innerHTML = '<div class="text-center opacity-50 py-5 fw-bold">لا توجد نتائج بحث..</div>';
            return;
        }
        
        container.innerHTML = list.map(sup => {
            const balance = sup.calculatedBalance || 0;
            const balanceText = Math.abs(balance).toLocaleString('ar-EG') + " ج.م";
            
            let balanceClass = 'text-clear';
            let label = 'الحساب خالص ✅';
            
            if (balance > 0.1) {
                balanceClass = 'text-debt';
                label = 'مديونية للمورد ⚠️';
            } else if (balance < -0.1) {
                balanceClass = 'text-credit';
                label = 'رصيد لك 💎';
            }

            return `
                <div class="supplier-card">
                    <div>
                        <h6 class="supplier-name">${sup.name}</h6>
                        <div class="mt-2">
                            <span class="balance-label">${label}</span>
                            <span class="balance-value ${balanceClass}">${balance === 0 ? '' : balanceText}</span>
                        </div>
                    </div>
                    <div class="action-container">
                        <a href="supplier-details.html?id=${sup.id}" class="action-btn btn-info" title="التفاصيل"><i class="fas fa-user-cog"></i></a>
                        <a href="supplier-payment.html?id=${sup.id}" class="action-btn btn-pay" title="سداد"><i class="fas fa-wallet"></i></a>
                    </div>
                </div>
            `;
        }).join('');
    }

    window.filterSuppliers = () => {
        const term = document.getElementById('searchInput').value.toLowerCase();
        renderSuppliers(allSuppliers.filter(s => 
            s.name.toLowerCase().includes(term) || 
            (s.phone && s.phone.includes(term))
        ));
    }

    loadSuppliers();
</script>
</body>
</html>
