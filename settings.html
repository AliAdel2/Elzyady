<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعدادات النظام - Al-Nada Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0d1117; --glass: rgba(255,255,255,0.05); --neon: #58a6ff; }
        body { background: var(--bg); font-family: 'Cairo', sans-serif; color: #c9d1d9; padding-bottom: 50px; }
        .header-section { padding: 20px; background: var(--glass); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .settings-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-top: 20px; }
        .form-control, .form-select { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: #fff !important; border-radius: 12px; padding: 12px; margin-bottom: 15px; }
        .form-label { font-size: 0.85rem; opacity: 0.7; margin-bottom: 5px; display: block; }
        .btn-save { background: var(--neon); color: #fff; border: none; padding: 15px; border-radius: 15px; font-weight: 700; width: 100%; box-shadow: 0 4px 15px rgba(88, 166, 255, 0.3); }
        .btn-backup { background: rgba(63, 185, 80, 0.1); color: #3fb950; border: 1px solid #3fb950; width: 100%; padding: 12px; border-radius: 12px; margin-top: 10px; }
        .btn-danger-custom { background: rgba(248, 81, 73, 0.1); color: #f85149; border: 1px solid #f85149; width: 100%; padding: 12px; border-radius: 12px; margin-top: 20px; }
        
        /* تصميم جدول المستخدمين */
        .table-custom { background: rgba(255,255,255,0.02); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .table { color: #c9d1d9; margin-bottom: 0; vertical-align: middle; }
        .table thead { background: rgba(255,255,255,0.05); }
        .table th { border: none; padding: 12px; font-size: 0.9rem; }
        .table td { border-top: 1px solid rgba(255,255,255,0.05); padding: 12px; }
        .btn-action { width: 32px; height: 32px; padding: 0; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="header-section">
    <a href="index.html" class="text-white"><i class="fas fa-arrow-right"></i></a>
    <h6 class="m-0 fw-bold">إعدادات النظام المتقدمة</h6>
    <i class="fas fa-user-shield text-primary"></i>
</div>

<div class="container">
    <div class="settings-card">
        <h6 class="mb-3 text-info"><i class="fas fa-id-card me-2"></i> بيانات الفاتورة والمحل</h6>
        <div class="row g-2">
            <div class="col-md-6">
                <label class="form-label">اسم المؤسسة</label>
                <input type="text" id="storeName" class="form-control" placeholder="الزيادي لقطع الغيار">
            </div>
            <div class="col-md-6">
                <label class="form-label">رقم واتساب التواصل</label>
                <input type="text" id="storePhone" class="form-control" placeholder="010xxxxxxx">
            </div>
            <div class="col-12">
                <label class="form-label">العنوان</label>
                <input type="text" id="storeAddress" class="form-control" placeholder="العنوان بالتفصيل">
            </div>
        </div>
    </div>

    <div class="settings-card">
        <h6 class="mb-3 text-primary"><i class="fas fa-users-gear me-2"></i> صلاحيات الدخول والمستخدمين</h6>
        <div class="row g-2 mb-3">
            <div class="col-6 col-md-4">
                <input type="text" id="newUsername" class="form-control mb-0" placeholder="اسم المستخدم">
            </div>
            <div class="col-6 col-md-4">
                <select id="userRole" class="form-select mb-0">
                    <option value="admin">مدير (كل الصلاحيات)</option>
                    <option value="cashier">كاشير (بيع فقط)</option>
                </select>
            </div>
            <div class="col-12 col-md-4">
                <input type="password" id="userPass" class="form-control mb-0" placeholder="كلمة السر">
            </div>
            <div class="col-12 mt-2">
                <button class="btn btn-primary w-100 py-2 fw-bold" id="btnAddUser">
                    <i class="fas fa-plus-circle me-1"></i> إضافة / تحديث بيانات المستخدم
                </button>
            </div>
        </div>

        <div class="table-custom mt-4">
            <table class="table">
                <thead>
                    <tr>
                        <th>المستخدم</th>
                        <th>الصلاحية</th>
                        <th class="text-center">إجراء</th>
                    </tr>
                </thead>
                <tbody id="usersListTable">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="settings-card">
        <h6 class="mb-3 text-warning"><i class="fas fa-boxes-stacked me-2"></i> إعدادات المخزن</h6>
        <label class="form-label">حد تنبيه النواقص الافتراضي</label>
        <input type="number" id="defaultMinQty" class="form-control" value="5">
    </div>

    <div class="settings-card">
        <h6 class="mb-3 text-success"><i class="fas fa-database me-2"></i> تصدير البيانات (Excel متوافق)</h6>
        <p class="small opacity-50">تم استخدام فاصل (;) لضمان توزيع البيانات على الأعمدة في نسخ ويندوز العربية.</p>
        <button class="btn btn-backup" id="btnExportCSV">
            <i class="fas fa-file-excel me-2"></i> تحميل ملف المخزن (أعمدة منفصلة)
        </button>
    </div>

    <div class="mt-4">
        <button class="btn-save" id="btnSaveSettings">حفظ إعدادات النظام</button>
        <button class="btn btn-danger-custom" id="btnResetApp">
            <i class="fas fa-trash-can me-2"></i> تصفير كافة السجلات المالية
        </button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
        authDomain: "elzyady-da509.firebaseapp.com",
        projectId: "elzyady-da509",
        storageBucket: "elzyady-da509.firebasestorage.app",
        messagingSenderId: "242117738897",
        appId: "1:242117738897:web:d658d6ca335b316f7f9a30"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadSettings() {
        try {
            const docSnap = await getDoc(doc(db, "settings", "general"));
            if (docSnap.exists()) {
                const d = docSnap.data();
                document.getElementById('storeName').value = d.storeName || "";
                document.getElementById('storePhone').value = d.storePhone || "";
                document.getElementById('storeAddress').value = d.storeAddress || "";
                document.getElementById('defaultMinQty').value = d.defaultMinQty || "5";
            }
            loadUsers();
        } catch (e) { console.log(e); }
    }

    async function loadUsers() {
        const tableBody = document.getElementById('usersListTable');
        tableBody.innerHTML = "";
        const snap = await getDocs(collection(db, "users"));
        snap.forEach(u => {
            const user = u.data();
            tableBody.innerHTML += `
                <tr>
                    <td><b class="text-white">${u.id}</b></td>
                    <td><span class="badge ${user.role === 'admin' ? 'bg-primary' : 'bg-secondary'}">${user.role === 'admin' ? 'مدير' : 'كاشير'}</span></td>
                    <td class="text-center">
                        <button class="btn btn-action btn-outline-info me-1" onclick="editUser('${u.id}', '${user.role}', '${user.pass}')">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn btn-action btn-outline-danger" onclick="deleteUser('${u.id}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>`;
        });
    }

    window.editUser = (id, role, pass) => {
        document.getElementById('newUsername').value = id;
        document.getElementById('userRole').value = role;
        document.getElementById('userPass').value = pass;
    };

    window.deleteUser = async (id) => {
        if(confirm(`حذف المستخدم ${id}؟`)) {
            await deleteDoc(doc(db, "users", id));
            loadUsers();
        }
    };

    document.getElementById('btnAddUser').addEventListener('click', async () => {
        const id = document.getElementById('newUsername').value;
        const role = document.getElementById('userRole').value;
        const pass = document.getElementById('userPass').value;
        if(!id || !pass) return alert("أكمل البيانات");
        
        await setDoc(doc(db, "users", id), { role, pass });
        alert("تم الحفظ");
        document.getElementById('newUsername').value = "";
        document.getElementById('userPass').value = "";
        loadUsers();
    });

    document.getElementById('btnSaveSettings').addEventListener('click', async () => {
        await setDoc(doc(db, "settings", "general"), {
            storeName: document.getElementById('storeName').value,
            storePhone: document.getElementById('storePhone').value,
            storeAddress: document.getElementById('storeAddress').value,
            defaultMinQty: document.getElementById('defaultMinQty').value
        });
        alert("تم حفظ الإعدادات بنجاح ✅");
    });

    // تصدير البيانات مع حل نهائي لمشكلة الأعمدة في Excel
    document.getElementById('btnExportCSV').addEventListener('click', async () => {
        const snap = await getDocs(collection(db, "inventory"));
        
        // استخدام سيمي كولون (;) كفاصل يضمن توزيع الأعمدة بشكل سليم في الويندوز العربي
        let csvContent = "الصنف;الكمية المتاحة;سعر الشراء;سعر البيع\n";
        
        snap.forEach(doc => {
            const d = doc.data();
            const name = (d.name || "").replace(/;/g, '-'); // منع تداخل الفواصل
            csvContent += `${name};${d.qty || 0};${d.buy || 0};${d.sell || 0}\n`;
        });

        const BOM = "\uFEFF"; // لدعم العربي
        const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `مخزن_${new Date().toLocaleDateString('ar-EG')}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    });

    loadSettings();
</script>
</body>
</html>
