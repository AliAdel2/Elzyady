<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كشف حساب - Al-Nada Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0d1117; --glass: rgba(255,255,255,0.05); --neon: #58a6ff; }
        body { background: var(--bg-dark); font-family: 'Cairo', sans-serif; color: #c9d1d9; padding: 1px; margin-top: 15px; }
        .glass-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .stat-box { border-radius: 12px; padding: 10px; text-align: center; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); }
        .debt-alert { background: rgba(248, 81, 73, 0.1); border: 1px solid #f85149; color: #f85149; }
        .form-control, .form-select { background: rgba(0,0,0,0.2) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: #fff !important; }
        .search-results { position: absolute; width: 100%; z-index: 100; background: #1c2128; border: 1px solid var(--neon); border-radius: 8px; max-height: 200px; overflow-y: auto; }
        .search-item { padding: 10px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .search-item:hover { background: var(--neon); color: white; }
        .invoice-row { border-right: 4px solid var(--neon); font-weight: bold; }
        .payment-row { border-right: 4px solid #3fb950; background: rgba(63, 185, 80, 0.05); }
        .nested-pay-row { font-size: 0.75rem; color: #3fb950 !important; }
        
        #printHeader, #printFooter { display: none; }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; padding: 0; }
            .glass-card { border: 1px solid #eee !important; background: none !important; margin-bottom: 10px !important; color: black !important; }
            .stat-box { border: 1px solid #eee !important; color: black !important; }
            .debt-alert { border: 2px solid black !important; background: #f9f9f9 !important; color: black !important; }
            #ledgerContent { display: block !important; }
            .table { color: black !important; border-color: #eee !important; }
            .text-white, .text-info, .text-success { color: black !important; }
            #printHeader { display: block; border-bottom: 2px solid #333; margin-bottom: 20px; padding-bottom: 10px; }
            #printFooter { display: block; position: fixed; bottom: 0; width: 100%; text-align: center; border-top: 1px solid #eee; padding: 10px; font-size: 10px; }
            .invoice-row { border-right: 4px solid #333 !important; }
            .payment-row { border-right: 4px solid #666 !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="printHeader" class="text-center">
        <div class="d-flex justify-content-between align-items-center">
            <div class="text-start">
                <h2 class="fw-bold m-0">الزيادى</h2>
                <small>لقطع غيار الموتوسيكلات والصيانة</small>
            </div>
            <i class="fas fa-motorcycle fa-3x"></i>
        </div>
        <hr>
        <h4 class="fw-bold">كشف حساب عميل: <span id="printCustName">........</span></h4>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3 no-print">
        <h5 class="fw-bold m-0 text-info"><i class="fas fa-motorcycle me-2"></i> الزيادى</h5>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-info btn-sm" onclick="window.print()"><i class="fas fa-print"></i> طباعة</button>
            <a href="index1.html" class="btn btn-outline-light btn-sm">الرئيسية</a>
        </div>
    </div>

    <div class="glass-card position-relative no-print">
        <div class="input-group">
            <span class="input-group-text bg-transparent border-secondary border-opacity-25 text-secondary"><i class="fas fa-search"></i></span>
            <input type="text" id="custSearch" class="form-control shadow-none" placeholder="ابحث باسم العميل..." oninput="searchCustomer()">
        </div>
        <div id="results" class="search-results d-none"></div>
    </div>

    <div id="ledgerContent" class="d-none">
        <div class="row g-2 mb-3">
            <div class="col-4">
                <div class="stat-box">
                    <small class="opacity-50">إجمالي المسحوبات</small>
                    <div id="totalWithdraw" class="fw-bold text-white">0</div>
                </div>
            </div>
            <div class="col-4">
                <div class="stat-box">
                    <small class="opacity-50 text-success">إجمالي المدفوع</small>
                    <div id="totalPaid" class="fw-bold text-success">0</div>
                </div>
            </div>
            <div class="col-4">
                <div class="stat-box debt-alert">
                    <small class="opacity-50 text-white">المديونية المتبقية</small>
                    <div id="currentDebt" class="fw-bold">0</div>
                </div>
            </div>
        </div>

        <div class="glass-card border-success border-opacity-25 no-print">
            <h6 class="fw-bold text-success mb-3 small"><i class="fas fa-cash-register me-2"></i> تحصيل دفعة مديونية</h6>
            <div class="row g-2">
                <div class="col-6"><input type="number" id="payAmount" class="form-control" placeholder="المبلغ"></div>
                <div class="col-6">
                    <select id="payMethod" class="form-select">
                        <option value="كاش">💵 نقدى(كاش)</option>
                        <option value="فودافون كاش">📱 فودافون كاش</option>
                        <option value="انستا باي">⚡ انستا باي</option>
                    </select>
                </div>
                <div class="col-12 mt-1">
                    <div class="input-group">
                        <input type="text" id="payNote" class="form-control" placeholder="ملاحظات...">
                        <button class="btn btn-success px-4" onclick="savePayment()">حفظ</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-card p-0 overflow-hidden">
            <table class="table table-dark table-hover m-0" style="font-size: 0.85rem;">
                <thead>
                    <tr class="opacity-50">
                        <th width="20%">التاريخ</th>
                        <th>البيان والوصف</th>
                        <th class="text-start">القيمة</th>
                    </tr>
                </thead>
                <tbody id="ledgerBody"></tbody>
            </table>
        </div>
    </div>

    <div id="printFooter">
        <p>  لإدارة الصيانة وقطع الغيار</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
   apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
  authDomain: "elzyady-da509.firebaseapp.com",
  projectId: "elzyady-da509",
  storageBucket: "elzyady-da509.firebasestorage.app",
  messagingSenderId: "242117738897",
  appId: "1:242117738897:web:d658d6ca335b316f7f9a30",
  measurementId: "G-JPRK3BT495"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let currentCust = null;

    window.searchCustomer = async function() {
        const val = document.getElementById('custSearch').value.trim();
        const resDiv = document.getElementById('results');
        if(val.length < 1) { resDiv.classList.add('d-none'); return; }
        
        const snap = await getDocs(collection(db, "customers"));
        resDiv.innerHTML = '';
        snap.forEach(doc => {
            const data = doc.data();
            // البحث بالاسم أو التليفون
            if(data.name.includes(val) || (data.phone && data.phone.includes(val))) {
                resDiv.classList.remove('d-none');
                const d = document.createElement('div');
                d.className = 'search-item';
                d.innerHTML = `${data.name} <small class="float-start opacity-50">${data.phone || ''}</small>`;
                // نمرر الاسم والتليفون للدالة
                d.onclick = () => loadLedger(data.name, data.phone);
                resDiv.appendChild(d);
            }
        });
    }

    async function loadLedger(name, phone) {
        currentCust = { name, phone };
        const cleanName = name.trim(); // تنظيف الاسم من أي مسافات زائدة
        
        document.getElementById('custSearch').value = cleanName;
        document.getElementById('printCustName').innerText = cleanName;
        document.getElementById('results').classList.add('d-none');
        document.getElementById('ledgerContent').classList.remove('d-none');

        let totalRequired = 0;
        let totalPaid = 0;
        let actions = [];

        // 1. جلب الفواتير المفلترة بالاسم فقط
        const invSnap = await getDocs(query(collection(db, "invoices"), orderBy("timestamp", "desc")));
        invSnap.forEach(doc => {
            const d = doc.data();
            // التحقق من تطابق الاسم سواء كان في الـ Object أو كحقل منفصل
            const invCustName = (d.customer && d.customer.name) ? d.customer.name.trim() : (d.customerName ? d.customerName.trim() : "");
            
            if(invCustName === cleanName) {
                const total = parseFloat(d.total || d.grandTotal || 0);
                const paid = parseFloat(d.paid || 0);
                totalRequired += total;
                totalPaid += paid;
                
                actions.push({ 
                    date: d.timestamp?.toDate(), 
                    type: `فاتورة صيانة #${doc.id.slice(-4)}`, 
                    amt: total, 
                    style: 'invoice-row' 
                });
                
                if(paid > 0) {
                    actions.push({ 
                        date: d.timestamp?.toDate(), 
                        type: `↳ مدفوع وقت الفاتورة`, 
                        amt: -paid, 
                        style: 'nested-pay-row' 
                    });
                }
            }
        });

        // 2. جلب دفعات الحساب المفلترة بالاسم
        const paySnap = await getDocs(query(collection(db, "payments"), orderBy("timestamp", "desc")));
        paySnap.forEach(doc => {
            const d = doc.data();
            const payCustName = d.customerName ? d.customerName.trim() : "";
            
            if(payCustName === cleanName) {
                const amt = parseFloat(d.amount || 0);
                totalPaid += amt;
                actions.push({ 
                    date: d.timestamp?.toDate(), 
                    type: `دفعة حساب: ${d.method || ''} ${d.note || ''}`, 
                    amt: -amt, 
                    style: 'payment-row' 
                });
            }
        });

        // الترتيب حسب التاريخ (الأحدث أولاً)
        actions.sort((a, b) => (b.date || 0) - (a.date || 0));

        document.getElementById('totalWithdraw').innerText = totalRequired.toLocaleString();
        document.getElementById('totalPaid').innerText = totalPaid.toLocaleString();
        document.getElementById('currentDebt').innerText = (totalRequired - totalPaid).toLocaleString();

        const body = document.getElementById('ledgerBody');
        body.innerHTML = '';
        actions.forEach(a => {
            body.innerHTML += `
                <tr class="${a.style}">
                    <td class="small opacity-50">${a.date ? a.date.toLocaleDateString('ar-EG') : '---'}</td>
                    <td>${a.type}</td>
                    <td dir="ltr" class="text-start fw-bold ${a.amt > 0 ? 'text-white' : 'text-success'}">${Math.abs(a.amt).toLocaleString()}</td>
                </tr>`;
        });
    }

    window.savePayment = async function() {
        const amount = parseFloat(document.getElementById('payAmount').value);
        const method = document.getElementById('payMethod').value;
        const note = document.getElementById('payNote').value;
        if(!amount || !currentCust) return;
        try {
            await addDoc(collection(db, "payments"), {
                customerName: currentCust.name,
                customerPhone: currentCust.phone,
                amount: amount, 
                method: method, 
                note: note,
                timestamp: serverTimestamp()
            });
            loadLedger(currentCust.name, currentCust.phone);
            document.getElementById('payAmount').value = '';
            document.getElementById('payNote').value = '';
        } catch(e) { console.error(e); }
    }
</script>
</body>
</html>
