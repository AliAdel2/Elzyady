<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل الصنف - شركة الزيادي</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #0b6641; /* لون الزيادي المعتمد */
            --bg-light: #f7f9fc;
            --card-shadow: 0 10px 20px rgba(0, 0, 0, 0.02);
        }

        body {
            background-color: var(--bg-light);
            font-family: 'Cairo', sans-serif;
            padding-bottom: 120px;
        }

        /* الهيدر الأخضر المنحني */
        .details-header {
            background-color: var(--primary-green);
            height: 150px;
            color: white;
            padding: 20px;
            border-radius: 0 0 45px 45px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .back-btn {
            position: absolute;
            top: 25px;
            left: 20px;
            color: white;
            font-size: 1.3rem;
        }

        /* كروت البيانات */
        .info-card {
            background: white;
            border-radius: 25px;
            padding: 20px;
            margin: 60px 20px 20px; /* تداخل احترافي مع الهيدر */
            box-shadow: var(--card-shadow);
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: #2d3436;
            margin: 25px 25px 10px;
        }

        .data-row {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f1f2f6;
        }

        .data-row:last-child {
            border: none;
        }

        .icon-box {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 15px;
            font-size: 1.2rem;
        }

        /* ألوان أيقونات لطيفة ومتناسقة */
        .bg-blue-light { background: #eef2ff; color: #6366f1; }
        .bg-orange-light { background: #fff7ed; color: #f97316; }
        .bg-green-light { background: #f0fdf4; color: #22c55e; }

        /* شبكة المخزون */
        .stock-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 0 20px;
        }

        .stock-box {
            background: white;
            padding: 20px;
            border-radius: 25px;
            text-align: center;
            box-shadow: var(--card-shadow);
        }

        .stock-val {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary-green);
            display: block;
        }

        .stock-label {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        /* أزرار التحكم السفلية */
        .bottom-actions {
            position: fixed;
            bottom: 25px;
            left: 20px;
            right: 20px;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 15px;
            z-index: 1000;
        }

        .btn-delete {
            background: #fff1f2;
            color: #f43f5e;
            border-radius: 20px;
            padding: 16px;
            border: none;
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(244, 63, 94, 0.1);
        }

        .btn-edit {
            background: var(--primary-green);
            color: white;
            border-radius: 20px;
            padding: 16px;
            border: none;
            font-weight: 700;
            box-shadow: 0 8px 20px rgba(11, 102, 65, 0.2);
        }
    </style>
</head>

<body>

    <div class="details-header" id="headerColor">
        <a href="#" onclick="history.back()" class="back-btn"><i class="fas fa-chevron-left"></i></a>
        <h2 class="fw-bold" id="productName">...</h2>
    </div>

    <div class="info-card">
        <div class="data-row">
            <div class="icon-box bg-blue-light"><i class="fas fa-qrcode"></i></div>
            <div>
                <small class="text-muted d-block">الباركود</small>
                <span class="fw-bold" id="barcode">---</span>
            </div>
        </div>
        <div class="data-row">
            <div class="icon-box bg-orange-light"><i class="fas fa-layer-group"></i></div>
            <div>
                <small class="text-muted d-block">التصنيف</small>
                <span class="fw-bold" id="category">---</span>
            </div>
        </div>
        <div class="data-row">
            <div class="icon-box bg-green-light"><i class="fas fa-calendar-alt"></i></div>
            <div>
                <small class="text-muted d-block">تاريخ الإضافة</small>
                <span class="fw-bold" id="dateAdded">2026-04-21</span>
            </div>
        </div>
    </div>

    <div class="section-title">حالة المخزون</div>
    <div class="stock-grid">
        <div class="stock-box">
            <span class="stock-val" id="currentStock">0</span>
            <span class="stock-label">الكمية الحالية</span>
        </div>
        <div class="stock-box">
            <span class="stock-val text-warning" id="reorderLevel">0</span>
            <span class="stock-label">حد الطلب</span>
        </div>
    </div>

    <div class="section-title">أسعار البيع والوحدات</div>
    <div class="info-card">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <span class="badge bg-success-subtle text-success px-4 py-2 rounded-pill">الوحدة الأساسية</span>
            <span class="fw-bold text-primary">قطعة</span>
        </div>
        <div class="row text-center">
            <div class="col-4 border-start">
                <small class="text-muted">تجزئة</small>
                <div class="fw-bold" id="priceRetail">0</div>
            </div>
            <div class="col-4 border-start">
                <small class="text-muted">جملة</small>
                <div class="fw-bold" id="priceWholesale">0</div>
            </div>
            <div class="col-4">
                <small class="text-muted">نصف جملة</small>
                <div class="fw-bold" id="priceHalf">0</div>
            </div>
        </div>
    </div>

    <div class="section-title">وصف المنتج</div>
    <div class="info-card text-muted small" id="productDesc">
        لا يوجد وصف متاح لهذا المنتج..
    </div>

    <div class="bottom-actions">
        <button class="btn-delete" onclick="deleteItem()"><i class="fas fa-trash-alt me-2"></i> حذف</button>
        <button class="btn-edit" id="editBtn"><i class="fas fa-edit me-2"></i> تعديل المنتج</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
            authDomain: "elzyady-da509.firebaseapp.com",
            projectId: "elzyady-da509",
            storageBucket: "elzyady-da509.firebasestorage.app",
            messagingSenderId: "242117738897",
            appId: "1:242117738897:web:d658d6ca335b316f7f9a30"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        async function loadProductDetails() {
            if (!productId) return;
            const docRef = doc(db, "inventory", productId);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('productName').innerText = data.name;
                document.getElementById('barcode').innerText = data.barcode || '---';
                document.getElementById('category').innerText = data.category || 'عام';
                document.getElementById('currentStock').innerText = data.totalPcs || 0;
                document.getElementById('reorderLevel').innerText = (data.min || 0) * (data.unitFactor || 1);
                document.getElementById('priceRetail').innerText = data.sell || 0;
                document.getElementById('priceWholesale').innerText = data.wholesale || 0;
                document.getElementById('priceHalf').innerText = data.halfWholesale || 0;
                document.getElementById('productDesc').innerText = data.description || data.name;

                document.getElementById('editBtn').onclick = () => {
                    window.location.href = `add-product.html?edit=${productId}`;
                };
            }
        }

        window.deleteItem = async () => {
            if (confirm("هل أنت متأكد من نقل الصنف للسلة؟")) {
                await updateDoc(doc(db, "inventory", productId), {
                    isDeleted: true,
                    deletedAt: serverTimestamp()
                });
                history.back();
            }
        };

        loadProductDetails();
    </script>
</body>

</html>
