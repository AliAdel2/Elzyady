<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معلومات العميل - Masar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0d1117; --glass: rgba(255,255,255,0.05); --neon-blue: #58a6ff; --neon-green: #3fb950; --neon-red: #f85149; }
        body { background: var(--bg); font-family: 'Cairo', sans-serif; color: #c9d1d9; padding-bottom: 50px; }
        
        .header-nav { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: var(--glass); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .header-nav i { font-size: 1.2rem; cursor: pointer; transition: 0.3s; }

        .balance-hero {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px; padding: 30px; margin: 20px 0; text-align: center;
            backdrop-filter: blur(20px); position: relative; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .status-badge { 
            position: absolute; top: 20px; left: 20px; background: rgba(255, 255, 255, 0.05); 
            padding: 5px 15px; border-radius: 10px; font-size: 0.8rem; font-weight: bold;
        }
        .main-balance { font-size: 3.5rem; font-weight: 800; color: #fff; margin: 10px 0; letter-spacing: -1px; }
        .opening-balance { border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; opacity: 0.6; font-size: 0.9rem; }

        .action-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 25px 0; }
        .action-item { text-align: center; text-decoration: none; color: inherit; cursor: pointer; transition: 0.2s; }
        .icon-circle {
            width: 55px; height: 55px; background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 8px; font-size: 1.3rem; transition: 0.3s;
        }
        .action-item:active .icon-circle { transform: scale(0.9); }
        .action-item span { font-size: 0.75rem; font-weight: 600; display: block; }

        .info-row {
            background: var(--glass); border-radius: 18px; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.03);
        }
        .info-label { font-size: 0.85rem; opacity: 0.6; }
        .info-value { font-weight: 700; color: #fff; font-size: 0.9rem; }

        .c-green { color: var(--neon-green); }
        .c-blue { color: var(--neon-blue); }
        .c-purple { color: #bc8cff; }
        .c-orange { color: #f0883e; }
        .c-red { color: var(--neon-red); }
    </style>
</head>
<body>

<div class="header-nav">
    <div>
        <i class="fas fa-trash-alt c-red me-3" onclick="deleteCustomer()"></i>
        <a id="editLink" href="#"><i class="fas fa-edit c-blue"></i></a>
    </div>
    <h5 class="m-0 fw-bold" id="displayName">جاري التحميل...</h5>
    <a href="customer-list.html" class="text-white"><i class="fas fa-arrow-left"></i></a>
</div>

<div class="container">
    <div class="balance-hero">
        <span class="status-badge" id="balanceStatus">...</span>
        <div class="info-label">رصيد العميل الحالي</div>
        <div class="main-balance" id="displayBalance">0</div>
        <div class="opening-balance d-flex justify-content-between">
            <span>ج.م</span>
            <span>الرصيد الافتتاحي: <b id="displayOpening">0.00</b></span>
        </div>
    </div>

    <div class="action-grid">
        <a href="#" id="payBtn" class="action-item">
            <div class="icon-circle c-green"><i class="fas fa-money-bill-wave"></i></div>
            <span>تحصيل</span>
        </a>
        <div id="remindBtn" class="action-item">
            <div class="icon-circle c-blue"><i class="fas fa-comment-alt"></i></div>
            <span>تذكير</span>
        </div>
        <a href="#" id="callBtn" class="action-item">
            <div class="icon-circle c-green"><i class="fas fa-phone-alt"></i></div>
            <span>اتصال</span>
        </a>
        <a href="#" id="statementBtn" class="action-item">
            <div class="icon-circle c-purple"><i class="fas fa-university"></i></div>
            <span>كشف حساب</span>
        </a>
        <div class="action-item" onclick="window.print()">
            <div class="icon-circle c-blue"><i class="fas fa-mobile-alt"></i></div>
            <span>سكرين</span>
        </div>
        <a href="#" id="historyBtn" class="action-item">
            <div class="icon-circle c-orange"><i class="fas fa-history"></i></div>
            <span>السجلات</span>
        </a>
        <a href="#" id="installmentsBtn" class="action-item">
            <div class="icon-circle c-purple"><i class="fas fa-file-invoice-dollar"></i></div>
            <span>أقساط</span>
        </a>
        <div class="action-item" onclick="resetAccount()">
            <div class="icon-circle c-red"><i class="fas fa-sync-alt"></i></div>
            <span>تصفير</span>
        </div>
    </div>

    <div class="info-row">
        <span class="info-value" id="displayAddress">غير مسجل</span>
        <span class="info-label">العنوان</span>
    </div>
    <div class="info-row">
        <span class="info-value" id="displayDate">--/--/----</span>
        <span class="info-label">تاريخ التسجيل</span>
    </div>
    <div class="info-row">
        <span class="info-value" id="displayPhone">01xxxxxxxxx</span>
        <span class="info-label">الهاتف</span>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, deleteDoc, updateDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
        authDomain: "elzyady-da509.firebaseapp.com",
        projectId: "elzyady-da509",
        storageBucket: "elzyady-da509.firebasestorage.app",
        messagingSenderId: "242117738897",
        appId: "1:242117738897:web:d658d6ca335b316f7f9a30"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const custId = urlParams.get('id');

    // دالة محسنة: تجمع (الرصيد الافتتاحي + مديونية الفواتير + السندات)
    async function calculateDetailedBalance(customerId, initialBalance) {
        try {
            // 1. حساب مديونية الفواتير
            const qInvoices = query(collection(db, "invoices"), where("customerId", "==", customerId));
            const snapInvoices = await getDocs(qInvoices);
            let totalInvoicesRemaining = 0;
            snapInvoices.forEach(doc => {
                totalInvoicesRemaining += (Number(doc.data().remaining) || 0);
            });

            // 2. حساب أثر السندات
            const qTrans = query(collection(db, "transactions"), where("partyId", "==", customerId));
            const snapTrans = await getDocs(qTrans);
            let transEffect = 0;
            snapTrans.forEach(doc => {
                const tr = doc.data();
                if(tr.type === 'قبض') transEffect -= (Number(tr.amount) || 0);
                else if(tr.type === 'صرف') transEffect += (Number(tr.amount) || 0);
            });

            // الجمع النهائي يشمل الرصيد اللي بدأ بيه العميل
            return Number(initialBalance) + totalInvoicesRemaining + transEffect;
        } catch (e) {
            console.error("Error calculating balance:", e);
            return Number(initialBalance);
        }
    }

    async function getDetails() {
        if(!custId) return;

        document.getElementById('editLink').href = `edit-customer.html?id=${custId}`;
        document.getElementById('payBtn').href = `customer-payment.html?id=${custId}`;
        document.getElementById('statementBtn').href = `customer-statement.html?id=${custId}`;
        document.getElementById('historyBtn').href = `customer-transactions-log.html?id=${custId}`;
        document.getElementById('installmentsBtn').href = `customer-installments.html?id=${custId}`;

        try {
            const docRef = doc(db, "customers", custId);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                
                // تنبيه: غيرناopeningBalance لـ initialBalance ليتوافق مع كود الإضافة
                const startBalance = Number(data.initialBalance || 0);
                const realBalance = await calculateDetailedBalance(custId, startBalance);
                
                document.getElementById('displayName').innerText = data.name;
                document.getElementById('displayBalance').innerText = Math.abs(realBalance).toLocaleString(undefined, {minimumFractionDigits: 2});
                document.getElementById('displayOpening').innerText = startBalance.toLocaleString();
                document.getElementById('displayPhone').innerText = data.phone || 'غير مسجل';
                document.getElementById('displayAddress').innerText = data.address || 'غير مسجل';
                
                const status = document.getElementById('balanceStatus');
                if(Math.abs(realBalance) < 0.01) {
                    status.innerText = "خالص";
                    status.style.color = "var(--neon-green)";
                } else if (realBalance > 0) {
                    status.innerText = "عليه مديونية";
                    status.style.color = "var(--neon-red)";
                } else {
                    status.innerText = "له رصيد دائن";
                    status.style.color = "var(--neon-blue)";
                }

                if(data.phone) {
                    document.getElementById('callBtn').href = `tel:${data.phone}`;
                    document.getElementById('remindBtn').onclick = () => {
                        const state = realBalance > 0 ? "مديونية" : "رصيد دائن";
                        const msg = encodeURIComponent(`عميلنا العزيز ${data.name}، نود تذكيركم بأن ${state} حسابكم الحالي لدى شركة الزيادي هو: ${Math.abs(realBalance).toLocaleString()} ج.م. شكراً لتعاملكم معنا.`);
                        window.open(`https://wa.me/2${data.phone}?text=${msg}`, '_blank');
                    };
                }

                if(data.createdAt) {
                    const date = data.createdAt.toDate ? data.createdAt.toDate() : new Date(data.createdAt);
                    document.getElementById('displayDate').innerText = date.toLocaleDateString('ar-EG');
                }
            }
        } catch (error) {
            console.error("Error:", error);
        }
    }

    window.resetAccount = async () => {
        if(confirm("تنبيه: هل تريد تصفير الرصيد الافتتاحي للعميل؟ (هذا لن يحذف الفواتير المسجلة)")) {
            await updateDoc(doc(db, "customers", custId), { initialBalance: 0 });
            location.reload();
        }
    };

    window.deleteCustomer = async () => {
        if(confirm("هل أنت متأكد من حذف العميل نهائياً؟")) {
            await deleteDoc(doc(db, "customers", custId));
            window.location.href = "customer-list.html";
        }
    };

    getDetails();
</script>
</body>
</html>
