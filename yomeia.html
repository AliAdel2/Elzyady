<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقرير اليومية - Al-Nada Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0d1117; --glass: rgba(255,255,255,0.05); --neon: #58a6ff; --success: #3fb950; --danger: #f85149; --gold: #f1c40f; }
        body { background: var(--bg-dark); font-family: 'Cairo', sans-serif; color: #c9d1d9; padding: 1px; }
        
        .glass-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; margin-bottom: 15px; }
        
        .day-card { border-radius: 12px; padding: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .card-sales { background: rgba(88, 166, 255, 0.1); border-color: var(--neon); }
        .card-purchases { background: rgba(248, 81, 73, 0.1); border-color: var(--danger); }
        .card-net { background: rgba(63, 185, 80, 0.1); border-color: var(--success); border-width: 2px; }
        
        .val-large { font-size: 1.6rem; font-weight: 700; display: block; margin-top: 5px; }
        .label-sm { font-size: 0.75rem; opacity: 0.8; }

        .table { color: #fff !important; font-size: 0.85rem; }
        .table thead th { background: rgba(255,255,255,0.05) !important; color: var(--neon); border-bottom: 2px solid var(--neon); }
        .table tbody tr { border-bottom: 1px solid rgba(000,000,000,0.2); }
        
        .badge-type { padding: 4px 8px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; width: 60px; display: inline-block; }
        .bg-in { background: var(--neon); color: #fff; }
        .bg-out { background: var(--danger); color: #fff; }
        .bg-exp { background: var(--gold); color: #000; }
    </style>
</head>
<body>

<div class="container py-2">
    <div class="d-flex justify-content-between align-items-center mb-4 px-2">
        <h4 class="fw-bold m-0"><i class="fas fa-cash-register text-warning me-2"></i> تقرير يومية الخزينة</h4>
        <button class="btn btn-outline-light btn-sm" onclick="fetchDailyReport()"><i class="fas fa-sync"></i></button>
    </div>

    <div class="glass-card p-3 mb-3 text-center">
        <label class="label-sm mb-2 d-block">اختر تاريخ اليومية</label>
        <input type="date" id="reportDate" class="form-control text-center bg-dark border-secondary text-white shadow-none" onchange="fetchDailyReport()">
    </div>

    <div class="row g-2 mb-4">
        <div class="col-6">
            <div class="day-card card-sales">
                <span class="label-sm">إجمالي المبيعات (+)</span>
                <span id="totalSales" class="val-large text-info">0</span>
            </div>
        </div>
        <div class="col-6">
            <div class="day-card card-purchases">
                <span class="label-sm">إجمالي المشتريات (-)</span>
                <span id="totalPurchases" class="val-large text-danger">0</span>
            </div>
        </div>
        <div class="col-12">
            <div class="day-card card-net">
                <span class="label-sm text-white">الصافي الفعلي في الدرج</span>
                <span id="netCash" class="val-large text-success">0</span>
                <small class="text-white-50" style="font-size: 0.65rem;">(مبيعات - مشتريات - مصاريف)</small>
            </div>
        </div>
    </div>

    <h6 class="fw-bold mb-3 px-2 text-info"><i class="fas fa-list me-2"></i> تفاصيل حركة اليوم</h6>
    
    <div class="glass-card p-0 overflow-hidden">
        <div class="table-responsive">
            <table class="table mb-0 text-center">
                <thead>
                    <tr>
                        <th>الوقت</th>
                        <th>النوع</th>
                        <th class="text-start">البيان</th>
                        <th>المبلغ</th>
                    </tr>
                </thead>
                <tbody id="dailyTableBody">
                    <tr><td colspan="4" class="py-5 opacity-50 text-center">جاري تحميل البيانات...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
  authDomain: "elzyady-da509.firebaseapp.com",
  projectId: "elzyady-da509",
  storageBucket: "elzyady-da509.firebasestorage.app",
  messagingSenderId: "242117738897",
  appId: "1:242117738897:web:d658d6ca335b316f7f9a30",
  measurementId: "G-JPRK3BT495"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('reportDate').value = new Date().toISOString().split('T')[0];

    window.fetchDailyReport = async function() {
        const selectedDate = document.getElementById('reportDate').value;
        const start = new Date(selectedDate); start.setHours(0, 0, 0, 0);
        const end = new Date(selectedDate); end.setHours(23, 59, 59, 999);

        const tbody = document.getElementById('dailyTableBody');
        tbody.innerHTML = '<tr><td colspan="4" class="py-5"><div class="spinner-border text-info border-sm"></div></td></tr>';

        let tSales = 0; let tPurchases = 0; let tExpenses = 0; let rows = [];

        try {
            // 1. جلب المشتريات (inventory)
            const pSnap = await getDocs(query(collection(db, "inventory")));
            pSnap.forEach(doc => {
                const data = doc.data();
                const uDate = data.lastUpdate?.toDate() || data.timestamp?.toDate();
                if (uDate >= start && uDate <= end) {
                    const cost = parseFloat(data.buy || data.pBuy || 0) * parseInt(data.qty || data.pQty || 0);
                    if (cost > 0) {
                        tPurchases += cost;
                        rows.push({ time: uDate, type: 'شراء', name: data.name || data.pName, amt: cost, cls: 'bg-out' });
                    }
                }
            });

            // 2. جلب المبيعات (invoices)
            const sSnap = await getDocs(query(collection(db, "invoices")));
            sSnap.forEach(doc => {
                const data = doc.data();
                const sDate = data.timestamp?.toDate();
                if (sDate >= start && sDate <= end) {
                    const val = parseFloat(data.total || data.grandTotal || 0);
                    tSales += val;
                    rows.push({ time: sDate, type: 'بيع', name: data.customerName || 'فاتورة مبيعات', amt: val, cls: 'bg-in' });
                }
            });

            // 3. جلب المصاريف (expenses) - لو موجودة
            try {
                const eSnap = await getDocs(query(collection(db, "expenses")));
                eSnap.forEach(doc => {
                    const data = doc.data();
                    const eDate = data.timestamp?.toDate();
                    if (eDate >= start && eDate <= end) {
                        const val = parseFloat(data.amount || 0);
                        tExpenses += val;
                        rows.push({ time: eDate, type: 'مصروف', name: data.note || 'مصاريف نثرية', amt: val, cls: 'bg-exp' });
                    }
                });
            } catch(e) {}

            // الترتيب حسب الوقت
            rows.sort((a, b) => b.time - a.time);

            let html = '';
            rows.forEach(r => {
                html += `
                    <tr>
                        <td class=" small">${r.time.toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'})}</td>
                        <td><span class="badge-type ${r.cls}">${r.type}</span></td>
                        <td class="text-start">${r.name}</td>
                        <td class="fw-bold ${r.type==='بيع'?'text-info':'text-danger'}">${r.amt.toLocaleString()}</td>
                    </tr>
                `;
            });

            tbody.innerHTML = html || '<tr><td colspan="4" class="py-5 text-secondary">لا توجد حركات اليوم</td></tr>';
            
            document.getElementById('totalSales').innerText = tSales.toLocaleString();
            document.getElementById('totalPurchases').innerText = tPurchases.toLocaleString();
            document.getElementById('netCash').innerText = (tSales - tPurchases - tExpenses).toLocaleString();

        } catch (e) { console.error(e); }
    }

    fetchDailyReport();
</script>
</body>
</html>
