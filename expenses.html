<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المصروفات - شركة الزيادي</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #0b5e3d; --bg: #f8fafc; --danger: #ef4444; --success: #22c55e; }
        body { background: var(--bg); font-family: 'Cairo', sans-serif; padding-bottom: 30px; }
        
        .header-nav { 
            background: var(--accent); color: white; padding: 15px; 
            display: flex; align-items: center; justify-content: space-between; 
            position: sticky; top: 0; z-index: 1000; 
        }

        /* Tabs Style */
        .nav-tabs { border: none; background: white; margin: 15px; border-radius: 15px; padding: 5px; display: flex; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .nav-link { 
            flex: 1; border: none !important; border-radius: 12px !important; 
            color: #64748b; font-weight: 700; transition: 0.3s; text-align: center;
        }
        .nav-link.active { background: var(--accent) !important; color: white !important; }

        .card-custom { background: white; border-radius: 25px; margin: 15px; padding: 20px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border: 1px solid #f1f5f9; }
        
        .input-group-custom { margin-bottom: 20px; }
        .label-custom { display: block; font-size: 0.85rem; color: #64748b; margin-bottom: 8px; font-weight: 700; }
        .input-field { 
            width: 100%; padding: 12px 15px; border-radius: 15px; border: 1px solid #e2e8f0; 
            background: #f8fafc; outline: none; font-weight: 600; transition: 0.3s;
        }
        .input-field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }

        .btn-save { 
            background: var(--accent); color: white; width: 100%; border: none; 
            padding: 15px; border-radius: 18px; font-weight: 800; 
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        /* Expense Item Style */
        .expense-item { 
            display: flex; align-items: center; justify-content: space-between; 
            background: white; padding: 15px; border-radius: 20px; margin-bottom: 12px;
            border: 1px solid #f1f5f9;
        }
        .expense-info h6 { margin: 0; font-weight: 800; color: #1e293b; font-size: 0.95rem; }
        .expense-info span { font-size: 0.75rem; color: #94a3b8; }
        .expense-amount { font-weight: 800; color: var(--danger); font-size: 1rem; }
        .btn-delete { color: #cbd5e1; border: none; background: none; font-size: 1.1rem; transition: 0.3s; }
        .btn-delete:hover { color: var(--danger); }
    </style>
</head>
<body>

<div class="header-nav">
    <div style="width: 20px;"></div>
    <h6 class="m-0 fw-bold">المصروفات</h6>
    <a href="index1.html" class="text-white"><i class="fas fa-chevron-left"></i></a>
</div>

<ul class="nav nav-tabs" id="expenseTabs" role="tablist">
    <li class="nav-item" role="presentation">
        <button class="nav-link active" id="add-tab" data-bs-toggle="tab" data-bs-target="#addContent" type="button">إضافة مصروف</button>
    </li>
    <li class="nav-item" role="presentation">
        <button class="nav-link" id="list-tab" data-bs-toggle="tab" data-bs-target="#listContent" type="button">المصروفات المسجلة</button>
    </li>
</ul>

<div class="tab-content">
    <div class="tab-pane fade show active" id="addContent">
        <div class="card-custom">
            <div class="text-center mb-4">
                <div style="background: #eef2ff; color: var(--accent); width: 60px; height: 60px; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-size: 1.5rem;">
                    <i class="fas fa-wallet"></i>
                </div>
                <p class="small text-muted">سجل مصروفاتك هنا ليتم خصمها من الصندوق تلقائياً</p>
            </div>

            <div class="input-group-custom">
                <label class="label-custom">نوع المصروف</label>
                <select id="expType" class="input-field">
                    <option value="إيجار">إيجار</option>
                    <option value="كهرباء/مياه">كهرباء / مياه</option>
                    <option value="رواتب">رواتب موظفين</option>
                    <option value="نثريات">نثريات / بوفيه</option>
                    <option value="أخرى">أخرى</option>
                </select>
            </div>

            <div class="row">
                <div class="col-6">
                    <div class="input-group-custom">
                        <label class="label-custom">القيمة</label>
                        <input type="number" id="expAmount" class="input-field" placeholder="0.00">
                    </div>
                </div>
                <div class="col-6">
                    <div class="input-group-custom">
                        <label class="label-custom">التاريخ</label>
                        <input type="date" id="expDate" class="input-field">
                    </div>
                </div>
            </div>

            <div class="input-group-custom">
                <label class="label-custom">ملاحظات</label>
                <textarea id="expNote" class="input-field" rows="3" placeholder="تفاصيل المصروف..."></textarea>
            </div>

            <button class="btn-save" id="btnSave" onclick="saveExpense()">تأكيد وحفظ</button>
        </div>
    </div>

    <div class="tab-pane fade" id="listContent">
        <div id="expensesList" class="px-3">
            </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI", authDomain: "elzyady-da509.firebaseapp.com", projectId: "elzyady-da509", storageBucket: "elzyady-da509.firebasestorage.app", messagingSenderId: "242117738897", appId: "1:242117738897:web:d658d6ca335b316f7f9a30" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ضبط تاريخ اليوم تلقائياً
    document.getElementById('expDate').valueAsDate = new Date();

    // دالة الحفظ
    window.saveExpense = async () => {
        const type = document.getElementById('expType').value;
        const amt = parseFloat(document.getElementById('expAmount').value);
        const note = document.getElementById('expNote').value;
        const date = document.getElementById('expDate').value;

        if(!amt || amt <= 0) return alert("برجاء إدخال مبلغ صحيح");

        const btn = document.getElementById('btnSave');
        btn.disabled = true; btn.innerText = "جاري الحفظ...";

        try {
            // 1. إضافة للمصروفات
            await addDoc(collection(db, "expenses"), {
                type, amount: amt, note, date, timestamp: serverTimestamp()
            });

            // 2. إضافة حركة سحب في الصندوق (cash_logs) لخصمها تلقائياً
            await addDoc(collection(db, "cash_logs"), {
                amount: amt,
                note: `مصروف: ${type} (${note})`,
                type: 'out',
                timestamp: serverTimestamp(),
                date: new Date().toLocaleString('ar-EG')
            });

            alert("تم الحفظ والخصم من الصندوق");
            location.reload();
        } catch (e) { alert("خطأ في الاتصال"); }
        btn.disabled = false;
    };

    // دالة تحميل القائمة
    async function loadExpenses() {
        const listDiv = document.getElementById('expensesList');
        try {
            const snap = await getDocs(query(collection(db, "expenses"), orderBy("timestamp", "desc")));
            if(snap.empty) {
                listDiv.innerHTML = '<div class="text-center py-5 text-muted">لا توجد مصروفات مسجلة</div>';
                return;
            }

            let html = "";
            snap.forEach(d => {
                const data = d.data();
                html += `
                    <div class="expense-item">
                        <div class="expense-info">
                            <h6>${data.type} ${data.note ? '- ' + data.note : ''}</h6>
                            <span><i class="far fa-calendar-alt me-1"></i> ${data.date}</span>
                        </div>
                        <div class="d-flex align-items-center gap-3">
                            <div class="expense-amount">${data.amount.toLocaleString()} ج.م</div>
                            <button class="btn-delete" onclick="deleteExpense('${d.id}')"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                `;
            });
            listDiv.innerHTML = html;
        } catch(e) { console.error(e); }
    }

    window.deleteExpense = async (id) => {
        if(confirm("هل تريد حذف هذا المصروف؟ (ملاحظة: لن يتم استرداد المبلغ للصندوق تلقائياً)")) {
            await deleteDoc(doc(db, "expenses", id));
            loadExpenses();
        }
    };

    // التحميل عند فتح تبويب القائمة
    document.getElementById('list-tab').addEventListener('click', loadExpenses);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
