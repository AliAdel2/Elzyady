<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ديون متأخرة - Masar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg-dark: #0d1117; 
            --glass: rgba(255,255,255,0.05); 
            --neon-red: #ff4757;
            --neon-orange: #ffa502;
            --text-gray: #c9d1d9;
        }
        
        body { background: var(--bg-dark); font-family: 'Cairo', sans-serif; color: var(--text-gray); }
        
        .header { 
            background: rgba(13, 17, 23, 0.9); padding: 20px; 
            backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* كارت إجمالي المديونيات الجديد */
        .total-debt-card {
            background: linear-gradient(135deg, rgba(255, 71, 87, 0.2) 0%, rgba(13, 17, 23, 0.1) 100%);
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 20px; padding: 25px; margin-top: 20px;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .total-amount { color: var(--neon-red); font-size: 2.2rem; font-weight: 800; margin-bottom: 5px; }

        .alert-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed rgba(255,255,255,0.1);
            border-radius: 15px; padding: 12px; margin-top: 15px;
            display: flex; align-items: center; gap: 12px;
        }

        .late-item {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px; padding: 15px; margin-bottom: 12px;
            position: relative; overflow: hidden;
        }
        .late-item::before {
            content: ''; position: absolute; right: 0; top: 0; bottom: 0;
            width: 4px; background: var(--neon-red);
        }

        .days-badge {
            background: rgba(255, 71, 87, 0.2); color: var(--neon-red);
            padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: bold;
        }

        .btn-remind {
            background: #25d366; color: white !important; border: none;
            padding: 8px 15px; border-radius: 10px; font-size: 0.85rem;
            display: flex; align-items: center; gap: 5px; text-decoration: none;
        }
    </style>
</head>
<body>

<div class="header d-flex justify-content-between align-items-center">
    <i class="fas fa-chevron-right text-white" style="cursor:pointer" onclick="history.back()"></i>
    <h5 class="m-0 fw-bold">التحصيل والديون</h5>
    <i class="fas fa-exclamation-triangle text-danger"></i>
</div>

<div class="container pb-4">
    <div class="total-debt-card">
        <small class="opacity-50 d-block mb-1 text-uppercase" style="letter-spacing: 1px;">إجمالي المتأخرات المطلوبة</small>
        <div class="total-amount" id="grandTotalDebt">0.00</div>
        <small class="text-white-50">جنيه مصري</small>
    </div>

    <div class="alert-card">
        <i class="fas fa-info-circle text-info"></i>
        <small class="opacity-70">يتم حساب المديونية بناءً على (الافتتاحي + الفواتير - المقبوضات).</small>
    </div>

    <div id="lateList" class="mt-4">
        <div class="text-center opacity-50 my-5">
            <div class="spinner-border spinner-border-sm text-danger"></div> جاري فحص الحسابات...
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
        authDomain: "elzyady-da509.firebaseapp.com",
        projectId: "elzyady-da509",
        storageBucket: "elzyady-da509.firebasestorage.app",
        messagingSenderId: "242117738897",
        appId: "1:242117738897:web:d658d6ca335b316f7f9a30"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function checkLateDebts() {
        const list = document.getElementById('lateList');
        const grandTotalDisplay = document.getElementById('grandTotalDebt');
        
        try {
            const [custSnap, invSnap, transSnap] = await Promise.all([
                getDocs(collection(db, "customers")),
                getDocs(query(collection(db, "invoices"), where("remaining", ">", 0))),
                getDocs(collection(db, "transactions"))
            ]);

            const transactions = transSnap.docs.map(d => d.data());
            const today = new Date();
            const lateReport = [];
            let totalOverall = 0; // متحيّر لحساب المجموع الكلي

            custSnap.forEach(cDoc => {
                const cId = cDoc.id;
                const cData = cDoc.data();
                
                let invSum = 0;
                let oldestInvDays = 0;
                
                const clientInvoices = invSnap.docs.filter(d => d.data().customerId === cId);
                clientInvoices.forEach(d => {
                    const inv = d.data();
                    invSum += (Number(inv.remaining) || 0);
                    const invDate = inv.date?.toDate ? inv.date.toDate() : new Date();
                    const diff = Math.ceil(Math.abs(today - invDate) / (1000 * 60 * 60 * 24));
                    if(diff > oldestInvDays) oldestInvDays = diff;
                });

                let transEffect = 0;
                transactions.filter(t => t.partyId === cId).forEach(t => {
                    if(t.type === 'قبض') transEffect -= (Number(t.amount) || 0);
                    else if(t.type === 'صرف') transEffect += (Number(t.amount) || 0);
                });

                const opening = Number(cData.initialBalance) || 0;
                const totalDebt = opening + invSum + transEffect;

                // فقط لو العميل عليه مديونية حقيقية
                if (totalDebt > 1) {
                    totalOverall += totalDebt; // إضافة لمجموع الكارت العلوي
                    
                    let debtAge = oldestInvDays;
                    if (opening > 0 && debtAge === 0) debtAge = 30;

                    lateReport.push({
                        id: cId,
                        name: cData.name,
                        phone: cData.phone || "",
                        totalDebt: totalDebt,
                        age: debtAge
                    });
                }
            });

            // تحديث رقم الكارت العلوي
            grandTotalDisplay.innerText = totalOverall.toLocaleString('en-US', { minimumFractionDigits: 2 });

            lateReport.sort((a, b) => b.age - a.age);

            list.innerHTML = '';
            lateReport.forEach(client => {
                list.innerHTML += `
                    <div class="late-item" onclick="window.location.href='customer-details.html?id=${client.id}'" style="cursor:pointer">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <div class="fw-bold text-white mb-1">${client.name}</div>
                                <span class="days-badge">منذ ${client.age >= 30 ? '30+' : client.age} يوم</span>
                            </div>
                            <div class="text-end">
                                <div class="text-danger fw-bold fs-5">${client.totalDebt.toLocaleString()}</div>
                                <small class="opacity-50">EGP</small>
                            </div>
                        </div>
                        <hr class="opacity-10 my-3">
                        <div class="d-flex justify-content-between align-items-center">
                            <small class="text-muted"><i class="fas fa-user-clock me-1"></i> مديونية شاملة</small>
                            <a href="https://wa.me/2${client.phone}?text=تحية طيبة أستاذ ${client.name}، نذكر سيادتكم بوجود مديونية مستحقة قدرها ${client.totalDebt} ج.م. نرجو التكرم بالسداد في أقرب وقت." 
                               class="btn-remind" target="_blank" onclick="event.stopPropagation()">
                                <i class="fab fa-whatsapp"></i> تذكير
                            </a>
                        </div>
                    </div>
                `;
            });

            if (lateReport.length === 0) {
                list.innerHTML = '<div class="text-center opacity-30 my-5">لا يوجد ديون متأخرة</div>';
            }

        } catch (e) {
            console.error(e);
            list.innerHTML = `<div class="text-danger text-center py-5">خطأ في التحميل</div>`;
        }
    }

    checkLateDebts();
</script>
</body>
</html>
