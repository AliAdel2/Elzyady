<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاتورة مبيعات - الزيادي Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0d1117; --glass: rgba(255,255,255,0.05); --neon-blue: #58a6ff; --neon-green: #3fb950; --neon-red: #f85149; }
        body { background: var(--bg); font-family: 'Cairo', sans-serif; color: #c9d1d9; padding-bottom: 50px; }
        .header-nav { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: var(--glass); border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .invoice-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-top: 20px; }
        
        /* تعديل حقول الإدخال لتوضيح الكتابة ومنع اللون الأبيض */
        .form-control, .form-select { 
            background: rgba(255,255,255,0.05) !important; 
            border: 1px solid rgba(255,255,255,0.1) !important; 
            border-radius: 12px; 
            color: #fff !important; 
            font-size: 0.9rem; 
        }
        .form-control:focus, .form-select:focus {
            background: rgba(255,255,255,0.1) !important;
            border-color: var(--neon-blue) !important;
            box-shadow: none;
            color: #58a6ff !important; /* لون الكتابة عند التركيز */
        }
        /* حل مشكلة اللون الأبيض في حقول الأرقام */
        input[type="number"] {
            font-weight: bold;
            color: #ffeb3b !important; /* لون أصفر مميز للأرقام عشان تبان */
        }

        .product-row { background: rgba(255,255,255,0.02); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px dashed rgba(255,255,255,0.1); position: relative; }
        .btn-remove { position: absolute; left: 10px; top: 10px; color: #f85149; cursor: pointer; z-index: 10; }
        .total-box { background: rgba(88, 166, 255, 0.1); border-radius: 15px; padding: 15px; text-align: center; margin-top: 20px; border: 1px solid var(--neon-blue); }
        .payment-box { background: rgba(255, 255, 255, 0.02); border-radius: 15px; padding: 15px; margin-top: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .btn-save { background: linear-gradient(45deg, #58a6ff, #00d4ff); border: none; border-radius: 15px; padding: 12px; width: 100%; font-weight: bold; color: white; transition: 0.3s; cursor: pointer; }
        .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
        .sub-lbl { font-size: 0.75rem; color: #58a6ff; margin-bottom: 4px; display: block; font-weight: 600; }
        .unit-info-area { font-size: 0.7rem; margin-top: 8px; color: var(--neon-green); opacity: 0.9; font-weight: bold; }
    </style>
</head>
<body>

<div class="header-nav">
    <a href="javascript:void(0)" onclick="confirmBack()" class="text-white"><i class="fas fa-arrow-right"></i></a>
    <h5 class="m-0 fw-bold">فاتورة مبيعات<span class="text-primary"></span></h5>
</div>

<div class="container">
    <div class="invoice-card">
        <div class="row g-3 mb-4">
            <div class="col-6">
                <label class="sub-lbl">العميل</label>
                <select id="customerSelect" class="form-select">
                    <option value="walk-in">عميل نقدي (طياري)</option>
                </select>
            </div>
            <div class="col-6">
                <label class="sub-lbl">التاريخ</label>
                <input type="text" id="invTime" class="form-control" readonly>
            </div>
        </div>

        <div id="itemsContainer"></div>

        <button class="btn btn-outline-primary w-100 rounded-pill mb-4" onclick="addNewRow()">
            <i class="fas fa-plus me-1"></i> إضافة صنف
        </button>

        <div class="payment-box">
            <div class="row g-3">
                <div class="col-6">
                    <label class="sub-lbl">طريقة الدفع</label>
                    <select id="payMethod" class="form-select" onchange="togglePayLogic()">
                        <option value="cash">نقدي (كاش)</option>
                        <option value="credit">آجل (على الحساب)</option>
                    </select>
                </div>
                <div class="col-6">
                    <label class="sub-lbl">المبلغ المدفوع</label>
                    <input type="number" id="paidAmount" class="form-control" value="0" oninput="calc()">
                </div>
            </div>
        </div>

        <div class="total-box">
            <div class="row">
                <div class="col-4 border-start border-secondary opacity-75">
                    <small class="d-block" style="font-size: 0.65rem;">الإجمالي</small>
                    <span id="displayTotal" class="fw-bold">0.00</span>
                </div>
                <div class="col-4 border-start border-secondary">
                    <small class="d-block text-success" style="font-size: 0.65rem;">المدفوع</small>
                    <span id="displayPaid" class="fw-bold text-success">0.00</span>
                </div>
                <div class="col-4">
                    <small class="d-block text-danger" style="font-size: 0.65rem;">المتبقي</small>
                    <span id="displayRemaining" class="fw-bold text-danger">0.00</span>
                </div>
            </div>
        </div>

        <button class="btn-save mt-4" onclick="saveInvoice()" id="saveBtn">حفظ وتحديث الحسابات</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, updateDoc, doc, getDoc, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
        authDomain: "elzyady-da509.firebaseapp.com",
        projectId: "elzyady-da509",
        storageBucket: "elzyady-da509.firebasestorage.app",
        messagingSenderId: "242117738897",
        appId: "1:242117738897:web:d658d6ca335b316f7f9a30"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let inventory = [];
    let editId = new URLSearchParams(window.location.search).get('edit');
    let isChanged = false; // متغير لمتابعة التغييرات

    // منع الخروج بالخطأ
    window.onbeforeunload = function() {
        if (isChanged) return "هل أنت متأكد من الخروج؟ هناك بيانات لم يتم حفظها.";
    };

    window.confirmBack = () => {
        if (isChanged) {
            if (confirm("لم يتم حفظ الفاتورة، هل تريد الرجوع فعلاً؟")) {
                window.location.href = "sales-history.html";
            }
        } else {
            window.location.href = "sales-history.html";
        }
    };

    async function init() {
        document.getElementById('invTime').value = new Date().toLocaleString('ar-EG');
        
        try {
            const [cSnap, iSnap] = await Promise.all([
                getDocs(collection(db, "customers")),
                getDocs(collection(db, "inventory"))
            ]);
            
            inventory = iSnap.docs.map(d => ({id: d.id, ...d.data()}));
            
            const cSelect = document.getElementById('customerSelect');
            cSnap.forEach(d => {
                cSelect.innerHTML += `<option value="${d.id}">${d.data().name}</option>`;
            });

            if(editId) {
                const invDoc = await getDoc(doc(db, "invoices", editId));
                if(invDoc.exists()) {
                    const data = invDoc.data();
                    document.getElementById('customerSelect').value = data.customerId || 'walk-in';
                    document.getElementById('invTime').value = data.time || '';
                    document.getElementById('payMethod').value = data.paymentMethod || 'cash';
                    document.getElementById('paidAmount').value = data.paid || 0;

                    let hasItems = false;
                    Object.keys(data).forEach(k => {
                        if(!isNaN(k)) {
                            addNewRow(data[k]);
                            hasItems = true;
                        }
                    });
                    if(!hasItems) addNewRow();
                }
            } else {
                addNewRow();
            }
            calc();
            isChanged = false; // تصفير التغييرات عند التحميل الأول
        } catch (e) {
            console.error("Error loading data: ", e);
        }
    }

    window.addNewRow = (oldData = null) => {
        if(!oldData) isChanged = true;
        const id = 'row_' + Math.random().toString(36).substr(2, 5);
        const html = `
            <div class="product-row" id="${id}">
                <i class="fas fa-times-circle btn-remove" onclick="document.getElementById('${id}').remove(); calc(); isChanged=true;"></i>
                <div class="row g-2 mb-2">
                    <div class="col-7">
                        <span class="sub-lbl">الصنف</span>
                        <select class="form-select p-select" onchange="updateRowUnit(this); isChanged=true;">
                            <option value="">اختر المنتج...</option>
                            ${inventory.map(p => `<option value="${p.id}" ${oldData && oldData.stockId == p.id ? 'selected' : ''}>${p.name}</option>`).join('')}
                        </select>
                    </div>
                    <div class="col-5">
                        <span class="sub-lbl">الوحدة</span>
                        <select class="form-select p-unit" onchange="updateRowPrice(this); isChanged=true;">
                            <option value="box" ${oldData && oldData.unit == 'box' ? 'selected' : ''}>كرتونة</option>
                            <option value="pcs" ${oldData && oldData.unit == 'pcs' ? 'selected' : ''}>قطعة</option>
                        </select>
                    </div>
                </div>
                <div class="row g-2">
                    <div class="col-4">
                        <span class="sub-lbl">الكمية</span>
                        <input type="number" class="form-control p-qty" value="${oldData ? oldData.qty : 1}" oninput="calc(); isChanged=true;">
                    </div>
                    <div class="col-4">
                        <span class="sub-lbl">السعر</span>
                        <input type="number" class="form-control p-price" value="${oldData ? oldData.price : ''}" oninput="calc(); isChanged=true;">
                    </div>
                    <div class="col-4">
                        <span class="sub-lbl">إجمالي</span>
                        <input type="text" class="form-control p-subtotal" readonly value="0.00">
                    </div>
                </div>
                <div class="unit-info-area"></div>
            </div>`;
        document.getElementById('itemsContainer').insertAdjacentHTML('beforeend', html);
        
        if(oldData) {
            const row = document.getElementById(id);
            const sel = row.querySelector('.p-select');
            sel.dataset.loaded = "true"; 
            updateRowUnit(sel);
        }
    };

    window.updateRowUnit = (sel) => {
        const row = sel.closest('.product-row');
        const p = inventory.find(i => i.id === sel.value);
        if(p) {
            row.querySelector('.unit-info-area').innerHTML = `المخزون: ${p.totalPcs || 0} قطعة`;
            if(!sel.dataset.loaded) {
                updateRowPrice(row.querySelector('.p-unit'));
            }
            delete sel.dataset.loaded; 
        }
        calc();
    };

    window.updateRowPrice = (sel) => {
        const row = sel.closest('.product-row');
        const p = inventory.find(i => i.id === row.querySelector('.p-select').value);
        if(p) {
            const price = (sel.value === 'box') ? (p.sell_box || p.sell) : ((p.sell_box || p.sell) / (p.unitFactor || 1));
            row.querySelector('.p-price').value = Number(price).toFixed(2);
            calc();
        }
    };

    window.togglePayLogic = () => {
        const method = document.getElementById('payMethod').value;
        const totalStr = document.getElementById('displayTotal').innerText.replace(/,/g, '');
        const total = parseFloat(totalStr) || 0;
        if(method === 'cash') {
            document.getElementById('paidAmount').value = total;
        } else {
            document.getElementById('paidAmount').value = 0;
        }
        isChanged = true;
        calc();
    };

    window.calc = () => {
        let total = 0;
        document.querySelectorAll('.product-row').forEach(r => {
            const sub = (Number(r.querySelector('.p-qty').value) || 0) * (Number(r.querySelector('.p-price').value) || 0);
            r.querySelector('.p-subtotal').value = sub.toFixed(2);
            total += sub;
        });

        const paid = parseFloat(document.getElementById('paidAmount').value) || 0;
        const remaining = total - paid;

        document.getElementById('displayTotal').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('displayPaid').innerText = paid.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('displayRemaining').innerText = remaining.toLocaleString(undefined, {minimumFractionDigits: 2});
        
        return { total, paid, remaining };
    };

    window.saveInvoice = async () => {
        const { total, paid, remaining } = calc();
        const items = {}; 
        let idx = 0;
        document.querySelectorAll('.product-row').forEach(r => {
            const pid = r.querySelector('.p-select').value;
            if(pid) {
                items[idx++] = { 
                    stockId: pid, 
                    name: r.querySelector('.p-select').options[r.querySelector('.p-select').selectedIndex].text, 
                    unit: r.querySelector('.p-unit').value, 
                    qty: Number(r.querySelector('.p-qty').value), 
                    price: Number(r.querySelector('.p-price').value) 
                };
            }
        });

        if(idx === 0) return alert("أضف صنفاً أولاً");
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.disabled = true;
        saveBtn.innerText = "جاري الحفظ...";

        try {
            const invoiceData = {
                customerId: document.getElementById('customerSelect').value,
                customerName: document.getElementById('customerSelect').options[document.getElementById('customerSelect').selectedIndex].text,
                total, paid, remaining,
                paymentMethod: document.getElementById('payMethod').value,
                time: document.getElementById('invTime').value,
                timestamp: serverTimestamp(),
                ...items
            };

            if(editId) {
                await updateDoc(doc(db, "invoices", editId), invoiceData);
                isChanged = false; // تصفير التغييرات بعد الحفظ
                alert("تم تحديث الفاتورة بنجاح");
            } else {
                for(let key in items) {
                    const item = items[key];
                    const p = inventory.find(i => i.id === item.stockId);
                    const factor = Number(p.unitFactor) || 1;
                    const qtyPcs = item.unit === 'box' ? (item.qty * factor) : item.qty;
                    await updateDoc(doc(db, "inventory", item.stockId), { totalPcs: increment(-qtyPcs) });
                }

                if(invoiceData.customerId !== 'walk-in' && remaining > 0) {
                    await updateDoc(doc(db, "customers", invoiceData.customerId), { currentBalance: increment(remaining) });
                }
                await addDoc(collection(db, "invoices"), invoiceData);
                isChanged = false; // تصفير التغييرات بعد الحفظ
                alert("تم حفظ الفاتورة بنجاح");
            }
            window.location.href = "sales-history.html";
        } catch(e) { 
            alert("خطأ: " + e.message); 
            saveBtn.disabled = false;
            saveBtn.innerText = "حفظ وتحديث الحسابات";
        }
    };

    init();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
