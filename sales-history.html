<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل المبيعات - شركة الزيادي</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --accent: #0b5e3d; 
            --header-bg: #0b5e3d;
            --bg-light: #f4f7f6;
            --text-primary: #1b2e26;
            --border: #dce3de;
            --white: #ffffff;
            --danger: #d90429;
            --info: #0d6efd;
            --success: #2d6a4f;
        }

        body { background: var(--bg-light); font-family: 'Cairo', sans-serif; color: var(--text-primary); padding-bottom: 50px; }

        /* Header */
        .header-nav { 
            background: var(--header-bg); padding: 12px 20px; color: white;
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* Stats Cards */
        .stats-container { 
            display: flex; gap: 8px; padding: 10px 15px; overflow-x: auto; scrollbar-width: none;
        }
        .stat-card { 
            background: var(--white); border: 1px solid var(--border); 
            border-radius: 12px; padding: 20px 8px; 
            min-width: 100px; flex: 1; text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .stat-title { font-size: 0.65rem; color: #6c757d; margin-bottom: 2px; font-weight: 700; }
        .stat-value { font-weight: 800; font-size: 0.85rem; line-height: 1; }

        /* Search Bar */
        .search-container { padding: 0 15px 12px 15px; position: relative; }
        .search-input { 
            width: 100%; background: var(--white); border: 1px solid var(--border); 
            padding: 10px 40px 10px 15px; border-radius: 12px; 
            color: var(--text-primary); outline: none; font-weight: 600; font-size: 0.9rem;
        }
        .search-icon { position: absolute; right: 28px; top: 50%; transform: translateY(-50%); color: var(--accent); font-size: 0.9rem; }

        /* Invoice Card */
        .inv-card { 
            background: var(--white); border: 1px solid var(--border); 
            border-radius: 18px; padding: 15px; margin: 0 15px 12px 15px; 
            transition: 0.3s; box-shadow: 0 3px 10px rgba(0,0,0,0.03);
        }
        .inv-card:hover { transform: translateY(-2px); }

        .rem-badge { font-size: 0.65rem; background: #fff5f5; color: var(--danger); padding: 3px 10px; border-radius: 8px; font-weight: 800; }
        .cash-badge { font-size: 0.65rem; background: #f0fff4; color: var(--success); padding: 3px 10px; border-radius: 8px; font-weight: 800; }

        /* Action Buttons */
        .action-icons { display: flex; justify-content: space-between; margin-top: 12px; padding-top: 12px; border-top: 1px solid #f1f1f1; }
        .action-btn { 
            background: #f8faf9; border: 1px solid var(--border); color: #4a5568; 
            width: 38px; height: 38px; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; font-size: 0.9rem;
        }

        .add-btn { background: rgba(255,255,255,0.2); width: 35px; height: 35px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; }
        #printFrame { display: none; }
    </style>
</head>
<body>

<div class="header-nav">
    <i class="fas fa-sync-alt" onclick="loadInvoices()" style="cursor:pointer; opacity: 0.8;"></i>
    <h6 class="m-0 fw-bold" style="font-size: 0.95rem;"><i class="fas fa-file-invoice-dollar me-1"></i> سجل المبيعات</h6>
    <a href="sales-invoice.html" class="add-btn"><i class="fas fa-plus"></i></a>
</div>

<div class="stats-container">
    <div class="stat-card">
        <div class="stat-title">إجمالي المبيعات</div>
        <div class="stat-value" style="color: var(--info)" id="totalAll">0</div>
    </div>
    <div class="stat-card">
        <div class="stat-title">المحصل</div>
        <div class="stat-value" style="color: var(--success)" id="paidAll">0</div>
    </div>
    <div class="stat-card">
        <div class="stat-title">الآجل</div>
        <div class="stat-value" style="color: var(--danger)" id="remAll">0</div>
    </div>
</div>

<div class="search-container">
    <i class="fas fa-search search-icon"></i>
    <input type="text" id="searchInput" class="search-input" placeholder="بحث باسم العميل...">
</div>

<div id="listContainer">
    <div class="text-center p-5"><div class="spinner-border spinner-border-sm" style="color: var(--accent);"></div></div>
</div>

<div class="modal fade" id="viewModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content" style="border-radius: 20px;">
            <div class="modal-body" id="modalBody"></div>
            <div class="p-3 pt-0"><button class="btn btn-light btn-sm w-100 rounded-pill fw-bold border" data-bs-dismiss="modal">إغلاق</button></div>
        </div>
    </div>
</div>

<iframe id="printFrame"></iframe>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, getDoc, query, orderBy, doc, deleteDoc, updateDoc, increment, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
        authDomain: "elzyady-da509.firebaseapp.com",
        projectId: "elzyady-da509",
        storageBucket: "elzyady-da509.firebasestorage.app",
        messagingSenderId: "242117738897",
        appId: "1:242117738897:web:d658d6ca335b316f7f9a30"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allInvoices = [];

    window.loadInvoices = async () => {
        try {
            const [invSnap, transSnap] = await Promise.all([
                getDocs(query(collection(db, "invoices"), orderBy("timestamp", "desc"))),
                getDocs(query(collection(db, "transactions"), where("type", "==", "قبض")))
            ]);

            allInvoices = invSnap.docs.map(d => ({id: d.id, ...d.data()}));
            
            let totalSales = 0;
            let totalPaidAtInvoiceTime = 0;

            allInvoices.forEach(inv => {
                const total = Number(inv.total || 0);
                const rem = Number(inv.remaining || 0);
                totalSales += total;
                totalPaidAtInvoiceTime += (total - rem);
            });

            let totalFromReceipts = 0;
            transSnap.forEach(t => {
                totalFromReceipts += Number(t.data().amount || 0);
            });

            const actualPaid = totalPaidAtInvoiceTime + totalFromReceipts;

            document.getElementById('totalAll').innerText = Math.round(totalSales).toLocaleString('ar-EG');
            document.getElementById('remAll').innerText = Math.round(totalSales - actualPaid).toLocaleString('ar-EG');
            document.getElementById('paidAll').innerText = Math.round(actualPaid).toLocaleString('ar-EG');
            
            render();
        } catch (e) { console.error(e); }
    };

    function render() {
        const container = document.getElementById('listContainer');
        if(allInvoices.length === 0) {
            container.innerHTML = '<div class="text-center opacity-50 mt-5 small">لا توجد فواتير</div>';
            return;
        }
        container.innerHTML = allInvoices.map(inv => `
            <div class="inv-card" data-name="${inv.customerName || ''}">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <b class="d-block mb-1" style="color: var(--accent); font-size: 1rem;">${inv.customerName || 'عميل نقدي'}</b>
                        <small class="text-muted fw-bold" style="font-size: 0.7rem;"><i class="far fa-clock me-1"></i> ${inv.time}</small>
                    </div>
                    <div class="text-end">
                        <div class="fw-bold m-0" style="color: var(--accent); font-size: 0.9rem;">${Math.round(inv.total).toLocaleString('ar-EG')}</div>
                        ${inv.remaining > 0 ? `<div class="rem-badge mt-1">آجل: ${Math.round(inv.remaining).toLocaleString('ar-EG')}</div>` : `<div class="cash-badge mt-1">خالص ✅</div>`}
                    </div>
                </div>
                <div class="action-icons">
                    <button class="action-btn" onclick="showInv('${inv.id}')"><i class="fas fa-eye" style="color: var(--info)"></i></button>
                    <button class="action-btn" onclick="editInv('${inv.id}')"><i class="fas fa-pen-nib" style="color: var(--success)"></i></button>
                    <button class="action-btn" onclick="printInv('${inv.id}')"><i class="fas fa-print" style="color: #6c757d"></i></button>
                    <button class="action-btn" onclick="deleteInv('${inv.id}')"><i class="fas fa-trash-alt" style="color: var(--danger)"></i></button>
                </div>
            </div>
        `).join('');
    }

    window.printInv = async (id) => {
        const inv = allInvoices.find(i => i.id === id);
        
        let customerBalance = 0;
        if(inv.customerId) {
            const cSnap = await getDoc(doc(db, "customers", inv.customerId));
            if(cSnap.exists()) customerBalance = cSnap.data().currentBalance || 0;
        }

        let rows = "";
        Object.keys(inv).forEach(k => {
            if(!isNaN(k)) {
                rows += `<tr>
                    <td style="text-align:right; padding:5px 0; border-bottom:1px dashed #eee;">${inv[k].name}</td>
                    <td style="text-align:center;">${inv[k].qty}</td>
                    <td style="text-align:center;">${Math.round(inv[k].price || 0).toLocaleString()}</td>
                    <td style="text-align:left;">${Math.round(inv[k].qty * (inv[k].price || 0)).toLocaleString()}</td>
                </tr>`;
            }
        });

        const total = Number(inv.total || 0);
        const remaining = Number(inv.remaining || 0);
        const paid = total - remaining;

        const content = `
            <html dir="rtl"><head><style>
                @page { size: 72mm auto; margin: 0; }
                body { font-family: 'Arial'; padding: 5px; width: 72mm; font-size: 13px; margin: 0 auto; color: #000; }
                .h { text-align: center; border-bottom: 2px solid #000; margin-bottom: 8px; padding-bottom: 5px; }
                table { width: 100%; border-collapse: collapse; margin-top: 5px; }
                th { border-bottom: 1px solid #000; padding: 5px 0; font-size: 11px; }
                .total-sec { border-top: 2px solid #000; margin-top: 10px; padding-top: 5px; }
                .row-val { display:flex; justify-content:space-between; margin-bottom: 4px; }
                .bold { font-weight: bold; font-size: 15px; }
                .footer { text-align:center; margin-top:15px; border-top:1px dashed #000; padding-top:5px; font-size:11px; }
            </style></head>
            <body>
                <div class="h">
                    <h3 style="margin:0">شركة الزيادي لقطع الغيار</h3>
                    <p style="margin:2px">زيوت - فلاتر السيارات</p>
                    <small>${inv.time}</small>
                </div>
                <p style="margin:5px 0;"><b>العميل:</b> ${inv.customerName || 'عميل نقدي'}</p>
                <table>
                    <thead><tr><th style="text-align:right;">الصنف</th><th>ك</th><th>سعر</th><th style="text-align:left;">إجمالي</th></tr></thead>
                    <tbody>${rows}</tbody>
                </table>
                <div class="total-sec">
                    <div class="row-val bold"><span>إجمالي الفاتورة:</span><span>${Math.round(total).toLocaleString()} ج.م</span></div>
                    <div class="row-val"><span>المسدد:</span><span>${Math.round(paid).toLocaleString()} ج.م</span></div>
                    ${remaining > 0 ? `<div class="row-val"><span>متبقي من الفاتورة:</span><span>${Math.round(remaining).toLocaleString()} ج.م</span></div>` : ''}
                    
                    <div class="row-val bold" style="margin-top:5px; border-top:1px solid #000; padding-top:5px;">
                        <span>إجمالي مديونية العميل:</span>
                        <span>${Math.round(customerBalance).toLocaleString()} ج.م</span>
                    </div>
                </div>
                <div class="footer">برجاء مراجعه الفاتوره بعد استلامها <br>تواصل معنا: 01027830834</div>
            </body></html>`;
        
        const printFrame = document.getElementById('printFrame');
        const pri = printFrame.contentWindow || printFrame.contentDocument;
        pri.document.open(); pri.document.write(content); pri.document.close();
        setTimeout(() => { pri.focus(); pri.print(); }, 600);
    };

    window.showInv = (id) => {
        const inv = allInvoices.find(i => i.id === id);
        let itemsHtml = "";
        Object.keys(inv).forEach(k => {
            if(!isNaN(k)) {
                itemsHtml += `<div class="d-flex justify-content-between border-bottom py-2 small fw-bold">
                    <span>${inv[k].name} <span class="text-muted">(x${inv[k].qty})</span></span>
                    <span>${Math.round(inv[k].qty * (inv[k].price || 0)).toLocaleString('ar-EG')}</span>
                </div>`;
            }
        });
        document.getElementById('modalBody').innerHTML = `
            <div class="text-center mb-2">
                <h6 class="fw-bold mt-2 small">تفاصيل الفاتورة</h6>
            </div>
            ${itemsHtml || '<p class="text-center small">لا توجد أصناف</p>'}
            <div class="mt-3 p-2 rounded bg-light border small">
                <div class="d-flex justify-content-between fw-bold mb-1"><span>الإجمالي:</span><span>${Math.round(inv.total).toLocaleString('ar-EG')}</span></div>
                <div class="d-flex justify-content-between fw-bold text-danger"><span>المتبقي:</span><span>${Math.round(inv.remaining || 0).toLocaleString('ar-EG')}</span></div>
            </div>`;
        new bootstrap.Modal(document.getElementById('viewModal')).show();
    };

    window.editInv = (id) => window.location.href = `sales-invoice.html?edit=${id}`;

    window.deleteInv = async (id) => {
        if(!confirm("⚠️ حذف الفاتورة؟ سيتم تعديل المديونية تلقائياً.")) return;
        const inv = allInvoices.find(i => i.id === id);
        try {
            await deleteDoc(doc(db, "invoices", id));
            if (inv.customerId && inv.remaining > 0) {
                await updateDoc(doc(db, "customers", inv.customerId), { currentBalance: increment(-inv.remaining) });
            }
            loadInvoices();
        } catch(e) { alert("خطأ: " + e.message); }
    };

    document.getElementById('searchInput').oninput = (e) => {
        const val = e.target.value.toLowerCase();
        document.querySelectorAll('.inv-card').forEach(card => {
            card.style.display = card.dataset.name.toLowerCase().includes(val) ? 'block' : 'none';
        });
    };

    loadInvoices();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
