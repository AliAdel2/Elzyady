<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل الفواتير - شركة الزيادى</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0d1117; --glass: rgba(255,255,255,0.05); --neon-blue: #58a6ff; }
        body { background: var(--bg); font-family: 'Cairo', sans-serif; color: #c9d1d9; }
        .header-nav { padding: 20px; background: var(--glass); border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .inv-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; margin-bottom: 12px; border-right: 4px solid var(--neon-blue); }
        .action-icons { display: flex; justify-content: space-around; margin-top: 12px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }
        .action-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #8b949e; }
        .modal-content { background: #161b22; color: #fff; border-radius: 20px; border: 1px solid var(--neon-blue); }
        .rem-box { font-size: 0.8rem; color: #f85149; background: rgba(248, 81, 73, 0.1); padding: 2px 8px; border-radius: 6px; font-weight: bold; }
        .total-val { color: var(--neon-blue); font-weight: bold; font-size: 1.1rem; }
        
        #printFrame { display: none; }
    </style>
</head>
<body>

<div class="header-nav d-flex justify-content-between align-items-center">
    <h5 class="m-0 fw-bold">سجل الفواتير</h5>
    <a href="sales-invoice.html" class="btn btn-primary btn-sm rounded-pill"><i class="fas fa-plus me-1"></i> فاتورة جديدة</a>
</div>

<div class="container mt-3" id="list">
    <div class="text-center p-5"><div class="spinner-border text-primary"></div></div>
</div>

<div class="modal fade" id="viewModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-body" id="modalBody"></div><div class="p-3 pt-0"><button class="btn btn-secondary w-100 rounded-pill" data-bs-dismiss="modal">إغلاق</button></div></div></div>
</div>

<iframe id="printFrame"></iframe>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy, doc, deleteDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
        authDomain: "elzyady-da509.firebaseapp.com",
        projectId: "elzyady-da509",
        storageBucket: "elzyady-da509.firebasestorage.app",
        messagingSenderId: "242117738897",
        appId: "1:242117738897:web:d658d6ca335b316f7f9a30"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allInvoices = [];

    // تحميل الفواتير
    window.loadInvoices = async () => {
        try {
            const snap = await getDocs(query(collection(db, "invoices"), orderBy("timestamp", "desc")));
            allInvoices = snap.docs.map(d => ({id: d.id, ...d.data()}));
            render();
        } catch (e) {
            console.error("خطأ في التحميل:", e);
        }
    };

    // عرض القائمة
    function render() {
        if (allInvoices.length === 0) {
            document.getElementById('list').innerHTML = '<div class="text-center p-5 opacity-50">لا توجد فواتير مسجلة</div>';
            return;
        }
        document.getElementById('list').innerHTML = allInvoices.map(inv => `
            <div class="inv-card">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <b class="d-block mb-1 text-white">${inv.customerName || 'عميل غير معروف'}</b>
                        <small class="opacity-50" style="font-size: 0.7rem;">${inv.time}</small>
                    </div>
                    <div class="text-end">
                        <div class="total-val">${Number(inv.total).toLocaleString()} ج.م</div>
                        <div class="rem-box mt-1">متبقي: ${Number(inv.remaining || 0).toLocaleString()}</div>
                    </div>
                </div>
                <div class="action-icons">
                    <button class="action-btn text-info" onclick="showInv('${inv.id}')" title="عرض"><i class="fas fa-eye"></i></button>
                    <button class="action-btn text-success" onclick="editInv('${inv.id}')" title="تعديل"><i class="fas fa-edit"></i></button>
                    <button class="action-btn text-warning" onclick="printInv('${inv.id}')" title="طباعة"><i class="fas fa-print"></i></button>
                    <button class="action-btn text-danger" onclick="deleteInv('${inv.id}')" title="حذف"><i class="fas fa-trash-alt"></i></button>
                </div>
            </div>
        `).join('');
    }

    // عرض تفاصيل الفاتورة
    window.showInv = (id) => {
        const inv = allInvoices.find(i => i.id === id);
        let itemsHtml = "";
        Object.keys(inv).forEach(k => {
            if(!isNaN(k)) {
                itemsHtml += `<div class="d-flex justify-content-between border-bottom border-secondary py-2 small">
                    <span>${inv[k].name} (x${inv[k].qty})</span>
                    <b>${(inv[k].qty * inv[k].price).toLocaleString()} ج.م</b>
                </div>`;
            }
        });
        document.getElementById('modalBody').innerHTML = `
            <h6 class="text-primary mb-3">تفاصيل الفاتورة - ${inv.customerName}</h6>
            ${itemsHtml}
            <div class="mt-3 p-2 rounded bg-primary bg-opacity-10 d-flex justify-content-between">
                <span>الإجمالي:</span><b class="text-primary">${Number(inv.total).toLocaleString()} ج.م</b>
            </div>`;
        new bootstrap.Modal(document.getElementById('viewModal')).show();
    };

    window.editInv = (id) => window.location.href = `sales-invoice.html?edit=${id}`;

    // طباعة الفاتورة
    window.printInv = (id) => {
        const inv = allInvoices.find(i => i.id === id);
        let rows = "";
        Object.keys(inv).forEach(k => {
            if(!isNaN(k)) {
                rows += `<tr>
                    <td style="padding:5px; border-bottom:1px dashed #ccc;">${inv[k].name}</td>
                    <td style="text-align:center;">${inv[k].qty}</td>
                    <td style="text-align:left;">${(inv[k].qty * inv[k].price)}</td>
                </tr>`;
            }
        });

        const printFrame = document.getElementById('printFrame');
        const pri = printFrame.contentWindow || printFrame.contentDocument;
        
        const printContent = `
            <html dir="rtl">
            <head>
                <style>
                    body { font-family: 'Arial'; padding: 10px; margin: 0; width: 72mm; }
                    .header { text-align: center; border-bottom: 1px double #000; padding-bottom: 5px; }
                    table { width: 100%; font-size: 13px; margin-top: 10px; }
                    .total-sec { border-top: 1px solid #000; margin-top: 10px; padding-top: 5px; }
                    .row-flex { display: flex; justify-content: space-between; font-weight: bold; }
                    .footer { text-align: center; font-size: 11px; margin-top: 20px; }
                </style>
            </head>
            <body>
                <div class="header">
                    <h3 style="margin:0;">شركة الزيادى</h3>
                    <p style="margin:2px 0; font-size:12px;">لقطع الغيار والكماليات</p>
                    <small>${inv.time}</small>
                </div>
                <p style="font-size:13px; margin:10px 0;"><b>العميل:</b> ${inv.customerName}</p>
                <table>
                    <thead><tr style="border-bottom:1px solid #000;"><th>الصنف</th><th>ك</th><th>ج.م</th></tr></thead>
                    <tbody>${rows}</tbody>
                </table>
                <div class="total-sec">
                    <div class="row-flex"><span>الإجمالي:</span><span>${inv.total} ج.م</span></div>
                    ${inv.remaining > 0 ? `<div class="row-flex" style="color:red;"><span>المتبقي:</span><span>${inv.remaining} ج.م</span></div>` : ''}
                </div>
                <div class="footer">شكراً لتعاملكم معنا</div>
            </body>
            </html>`;

        pri.document.open();
        pri.document.write(printContent);
        pri.document.close();

        setTimeout(() => { pri.focus(); pri.print(); }, 500);
    };

    // دالة الحذف المعدلة (الحل)
    window.deleteInv = async (id) => {
        if(!confirm("هل أنت متأكد من حذف الفاتورة؟ سيتم تعديل مديونية العميل تلقائياً.")) return;
        
        try {
            const inv = allInvoices.find(i => i.id === id);
            
            // 1. حذف مستند الفاتورة
            await deleteDoc(doc(db, "invoices", id));

            // 2. تحديث رصيد العميل (فقط لو ID العميل موجود وحقيقي وليس طياري)
            if (inv.customerId && inv.customerId !== "walk-in" && inv.customerId !== "undefined") {
                try {
                    await updateDoc(doc(db, "customers", inv.customerId), { 
                        currentBalance: increment(-inv.remaining) 
                    });
                } catch (err) {
                    console.log("تنبيه: العميل غير موجود في سجلات العملاء، تم حذف الفاتورة فقط.");
                }
            }

            // 3. تحديث الواجهة فوراً
            alert("تم حذف الفاتورة بنجاح ✅");
            await loadInvoices(); 
            
        } catch(e) { 
            alert("حدث خطأ أثناء الحذف: " + e.message); 
            console.error(e);
        }
    };

    loadInvoices();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
