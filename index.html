<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول النظام - الزيادى</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { 
            --bg: #0b120f; /* خلفية غامقة مائلة للأخضر المسود */
            --accent: #10b981; /* أخضر زمردي زاهي */
            --glass-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(16, 185, 129, 0.2);
        }
        
        body { 
            background: radial-gradient(circle at center, #111827 0%, var(--bg) 100%);
            font-family: 'Cairo', sans-serif; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            overflow: hidden;
            color: #fff;
        }

        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; align-items: center; justify-content: center;
            z-index: 9999;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            padding: 40px 30px;
            border-radius: 30px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6), inset 0 0 15px rgba(16, 185, 129, 0.05);
            text-align: center;
            opacity: 0; 
            transform: translateY(20px);
            transition: all 0.7s ease-out;
        }

        .login-card.active {
            opacity: 1;
            transform: translateY(0);
        }

        .form-control {
            background: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid var(--border-color) !important;
            color: #fff !important;
            border-radius: 15px;
            padding: 14px;
            margin-bottom: 20px;
            text-align: center;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: var(--accent) !important;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
        }

        .btn-login {
            background: linear-gradient(135deg, var(--accent), #059669);
            border: none;
            color: #fff;
            font-weight: 700;
            width: 100%;
            padding: 14px;
            border-radius: 15px;
            transition: 0.4s;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
        }

        .btn-login:hover { 
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(16, 185, 129, 0.3);
            filter: brightness(1.1);
        }

        .logo-icon { 
            width: 80px;
            height: 80px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            color: var(--accent);
            font-size: 2.5rem;
            border: 1px solid var(--border-color);
        }

        #errMsg { font-weight: 600; min-height: 24px; }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner-border" style="color: var(--accent)"></div>
</div>

<div class="login-card" id="loginContent">
    <div class="logo-icon">
        <i class="fas fa-fingerprint"></i>
    </div>
    <h4 class="fw-bold mb-1">الزيادى للتجارة</h4>
    <p class="text-white-50 small mb-4">بوابة الدخول الآمنة</p>
    
    <div class="position-relative">
        <input type="text" id="username" class="form-control" placeholder="اسم المستخدم" autocomplete="off">
    </div>
    <div class="position-relative">
        <input type="password" id="password" class="form-control" placeholder="كلمة المرور">
    </div>
    
    <button class="btn-login" id="btnLogin">
        <i class="fas fa-sign-in-alt me-2"></i> دخول النظام
    </button>
    <div id="errMsg" class="text-danger small mt-3"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
        authDomain: "elzyady-da509.firebaseapp.com",
        projectId: "elzyady-da509",
        storageBucket: "elzyady-da509.firebasestorage.app",
        messagingSenderId: "242117738897",
        appId: "1:242117738897:web:d658d6ca335b316f7f9a30"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const loader = document.getElementById('loader');
    const loginContent = document.getElementById('loginContent');

    window.onload = () => {
        const loggedUser = sessionStorage.getItem('isLoggedIn');
        if (loggedUser === 'true') {
            window.location.href = "index1.html";
        } else {
            setTimeout(() => {
                loader.style.opacity = "0";
                setTimeout(() => {
                    loader.style.display = "none";
                    loginContent.classList.add('active');
                }, 300);
            }, 500);
        }
    };

    document.getElementById('btnLogin').onclick = async function() {
        const userVal = document.getElementById('username').value.trim();
        const passVal = document.getElementById('password').value.trim();
        const err = document.getElementById('errMsg');
        const btn = this;

        if(!userVal || !passVal) {
            err.innerText = "برجاء ملء الحقول";
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> جاري التحقق...';

        try {
            const userRef = doc(db, "users", userVal);
            const userSnap = await getDoc(userRef);

            if (userSnap.exists()) {
                const userData = userSnap.data();
                if (userData.pass === passVal) {
                    sessionStorage.setItem('isLoggedIn', 'true');
                    sessionStorage.setItem('username', userVal);
                    sessionStorage.setItem('role', userData.role);
                    window.location.href = "index1.html";
                } else {
                    err.innerText = "كلمة المرور غير صحيحة";
                }
            } else {
                err.innerText = "اسم المستخدم غير موجود";
            }
        } catch (e) {
            err.innerText = "خطأ في الاتصال بالخادم";
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i> دخول النظام';
        }
    }
</script>
</body>
</html>
