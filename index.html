<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول النظام -الزيادى</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root { --bg: #0d1117; --neon-blue: #58a6ff; }
        body { 
            background: var(--bg); 
            font-family: 'Cairo', sans-serif; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            overflow: hidden;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 25px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }
        .form-control {
            background: rgba(0, 0, 0, 0.2) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #fff !important;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
        }
        .btn-login {
            background: var(--neon-blue);
            border: none;
            color: #fff;
            font-weight: 700;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            transition: 0.3s;
        }
        .btn-login:hover { opacity: 0.9; transform: scale(1.02); }
        .logo-icon { font-size: 3rem; color: var(--neon-blue); margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-icon"><i class="fas fa-shield-halved"></i></div>
    <h4 class="text-white fw-bold mb-4">الزيادى - تسجيل دخول</h4>
    
    <input type="email" id="email" class="form-control" placeholder="البريد الإلكتروني">
    <input type="password" id="password" class="form-control" placeholder="كلمة المرور">
    
    <button class="btn-login" onclick="handleLogin()">دخول النظام</button>
    <div id="errMsg" class="text-danger small mt-3"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
  authDomain: "elzyady-da509.firebaseapp.com",
  projectId: "elzyady-da509",
  storageBucket: "elzyady-da509.firebasestorage.app",
  messagingSenderId: "242117738897",
  appId: "1:242117738897:web:d658d6ca335b316f7f9a30",
  measurementId: "G-JPRK3BT495"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

    window.handleLogin = async function() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const err = document.getElementById('errMsg');

        try {
            await signInWithEmailAndPassword(auth, email, pass);
            window.location.href = "index1.html"; // حوله للصفحة الرئيسية بعد النجاح
        } catch (e) {
            err.innerText = "خطأ في البيانات.. تأكد من الإيميل والباسورد";
        }
    }
</script>
</body>
</html>
