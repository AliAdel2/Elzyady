<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة التصنيفات - Warchat Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0d1117; --glass: rgba(255,255,255,0.05); --neon-blue: #58a6ff; --neon-purple: #bc8cff; --text-gray: #c9d1d9; }
        body { background: var(--bg-dark); font-family: 'Cairo', sans-serif; color: var(--text-gray); }
        .header { background: rgba(13, 17, 23, 0.8); padding: 20px; display: flex; align-items: center; justify-content: space-between; backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .glass-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; margin-top: 20px; }
        .custom-input { background: rgba(0,0,0,0.3) !important; border: 1px solid rgba(88, 166, 255, 0.2) !important; color: white !important; border-radius: 12px; padding: 12px; }
        .btn-add { background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple)); border: none; color: white; padding: 12px; border-radius: 12px; font-weight: bold; width: 100%; transition: 0.3s; }
        .cat-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { color: #ff7b72; cursor: pointer; padding: 5px; }
    </style>
</head>
<body>

<div class="header">
    <i class="fas fa-arrow-right" style="cursor:pointer" onclick="history.back()"></i>
    <h5 class="m-0 fw-bold text-white">إضافة تصنيف جديد</h5>
    <div style="width:20px"></div>
</div>

<div class="container">
    <div class="glass-card text-center">
        <i class="fas fa-layer-group fa-3x mb-3" style="color: var(--neon-purple);"></i>
        <h6 class="mb-4">أدخل اسم التصنيف (زيوت، فلاتر، إلخ)</h6>
        <div class="mb-3">
            <input type="text" id="catName" class="form-control custom-input text-center" placeholder="اسم التصنيف...">
        </div>
        <button class="btn-add" onclick="addNewCategory()">
            <i class="fas fa-plus-circle me-2"></i> إضافة التصنيف للمخزن
        </button>
    </div>

    <div class="mt-4 px-2">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <small class="text-muted">التصنيفات الحالية</small>
            <span class="badge bg-secondary" id="catCount">0</span>
        </div>
        <div id="categoriesList">
            <div class="text-center opacity-50 my-5">جاري التحميل...</div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
        authDomain: "elzyady-da509.firebaseapp.com",
        projectId: "elzyady-da509",
        storageBucket: "elzyady-da509.firebasestorage.app",
        messagingSenderId: "242117738897",
        appId: "1:242117738897:web:d658d6ca335b316f7f9a30"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const categoriesRef = collection(db, "categories");

    // تحميل التصنيفات
    async function loadCategories() {
        try {
            // شلنا الـ orderBy مؤقتاً عشان لو في داتا قديمة مفيهاش timestamp متعملش error
            const snap = await getDocs(categoriesRef);
            const list = document.getElementById('categoriesList');
            const count = document.getElementById('catCount');
            
            list.innerHTML = '';
            let i = 0;
            
            snap.forEach((category) => {
                const data = category.data();
                list.innerHTML += `
                    <div class="cat-item">
                        <span><i class="fas fa-tag me-2 opacity-50"></i> ${data.name || data.category}</span>
                        <i class="fas fa-trash-alt delete-btn" onclick="deleteCategory('${category.id}', '${data.name || data.category}')"></i>
                    </div>
                `;
                i++;
            });
            
            count.innerText = i;
            if(i === 0) list.innerHTML = '<div class="text-center opacity-20 my-5">لا توجد تصنيفات</div>';
        } catch (e) {
            console.error(e);
        }
    }

    // إضافة تصنيف جديد وتصديرها للـ window
    window.addNewCategory = async function() {
        const name = document.getElementById('catName').value.trim();
        if(!name) return alert("يرجى كتابة اسم التصنيف");

        try {
            await addDoc(categoriesRef, {
                name: name,
                category: name, // عشان الصفحة التانية بتدور على category
                timestamp: serverTimestamp()
            });
            document.getElementById('catName').value = '';
            loadCategories();
        } catch (e) {
            alert("حدث خطأ أثناء الإضافة");
        }
    };

    // حذف تصنيف وتصديرها للـ window
    window.deleteCategory = async function(id, name) {
        if(!confirm(`حذف تصنيف "${name}"؟`)) return;
        try {
            await deleteDoc(doc(db, "categories", id));
            loadCategories();
        } catch (e) {
            alert("حدث خطأ أثناء الحذف");
        }
    };

    // تشغيل التحميل أول مرة
    loadCategories();

</script>
</body>
</html>
