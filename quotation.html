<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عرض سعر - شركة الزيادى</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0d1117; --glass: rgba(255,255,255,0.05); --neon-blue: #58a6ff; }
        body { background: var(--bg); font-family: 'Cairo', sans-serif; color: #c9d1d9; padding-bottom: 80px; }
        .header-nav { padding: 20px; background: var(--glass); border-bottom: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .input-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-top: 20px; }
        .form-control, .form-select { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); color: #fff !important; border-radius: 12px; }
        .item-row { background: rgba(88, 166, 255, 0.05); border-radius: 15px; padding: 15px; margin-bottom: 15px; position: relative; border: 1px solid rgba(88, 166, 255, 0.1); }
        .btn-remove { position: absolute; left: 10px; top: 10px; color: #f85149; cursor: pointer; }
        .footer-total { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; padding: 15px; border-top: 2px solid var(--neon-blue); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        #printFrame { display: none; }
    </style>
</head>
<body>

<div class="header-nav d-flex justify-content-between align-items-center">
    <h5 class="m-0 fw-bold">عرض سعر <span class="text-primary">شركة الزيادى</span></h5>
    <button class="btn btn-outline-primary btn-sm rounded-pill" onclick="window.location.reload()"><i class="fas fa-sync"></i></button>
</div>

<div class="container mt-3">
    <div class="input-card">
        <label class="small mb-1">اسم العميل (اختياري)</label>
        <input type="text" id="custName" class="form-control mb-3" placeholder="اكتب اسم العميل هنا...">
        
        <div id="itemsContainer"></div>

        <button class="btn btn-primary w-100 rounded-pill mt-3" onclick="addItem()">
            <i class="fas fa-plus me-1"></i> إضافة صنف للعرض
        </button>
    </div>
</div>

<div class="footer-total">
    <div>
        <small class="d-block opacity-50">إجمالي العرض</small>
        <h4 class="m-0 text-primary fw-bold" id="totalDisplay">0.00</h4>
    </div>
    <button class="btn btn-primary px-4 rounded-pill" onclick="saveAndPrintQuotation()" id="saveBtn">
        <i class="fas fa-print me-2"></i> حفظ وطباعة
    </button>
</div>

<iframe id="printFrame"></iframe>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
        authDomain: "elzyady-da509.firebaseapp.com",
        projectId: "elzyady-da509",
        storageBucket: "elzyady-da509.firebasestorage.app",
        messagingSenderId: "242117738897",
        appId: "1:242117738897:web:d658d6ca335b316f7f9a30"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let inventory = [];

    async function init() {
        const snap = await getDocs(collection(db, "inventory"));
        inventory = snap.docs.map(d => ({id: d.id, ...d.data()}));
        addItem();
    }

    window.addItem = () => {
        const id = 'item_' + Date.now();
        const html = `
            <div class="item-row" id="${id}">
                <i class="fas fa-trash-alt btn-remove" onclick="document.getElementById('${id}').remove(); calc();"></i>
                <select class="form-select mb-2 item-select" onchange="updatePrice(this)">
                    <option value="">اختر الصنف...</option>
                    ${inventory.map(p => `<option value="${p.id}">${p.name}</option>`).join('')}
                </select>
                <div class="row g-2">
                    <div class="col-6"><input type="number" class="form-control item-qty" placeholder="الكمية" value="1" oninput="calc()"></div>
                    <div class="col-6"><input type="number" class="form-control item-price" placeholder="السعر" oninput="calc()"></div>
                </div>
            </div>`;
        document.getElementById('itemsContainer').insertAdjacentHTML('beforeend', html);
    };

    window.updatePrice = (sel) => {
        const p = inventory.find(i => i.id === sel.value);
        if(p) {
            sel.closest('.item-row').querySelector('.item-price').value = p.sell || 0;
            calc();
        }
    };

    window.calc = () => {
        let total = 0;
        document.querySelectorAll('.item-row').forEach(row => {
            const q = Number(row.querySelector('.item-qty').value) || 0;
            const p = Number(row.querySelector('.item-price').value) || 0;
            total += (q * p);
        });
        document.getElementById('totalDisplay').innerText = total.toLocaleString() + " ج.م";
        return total;
    };

    // الوظيفة الجديدة: حفظ في الداتا ثم طباعة
    window.saveAndPrintQuotation = async () => {
        const custName = document.getElementById('custName').value || "عميل عام";
        const totalAmount = calc();
        const items = [];
        
        document.querySelectorAll('.item-row').forEach(row => {
            const selectEl = row.querySelector('.item-select');
            const name = selectEl.options[selectEl.selectedIndex].text;
            const qty = Number(row.querySelector('.item-qty').value);
            const price = Number(row.querySelector('.item-price').value);
            if(selectEl.value !== "") items.push({ name, qty, price });
        });

        if(items.length === 0) return alert("برجاء اختيار أصناف أولاً");

        document.getElementById('saveBtn').disabled = true;

        try {
            // حفظ في سجل عروض الأسعار
            await addDoc(collection(db, "quotations"), {
                customerName: custName,
                total: totalAmount,
                items: items,
                date: new Date().toLocaleString('ar-EG'),
                timestamp: serverTimestamp()
            });
            
            // استدعاء الطباعة
            printQuotation(custName, items, totalAmount);
            alert("تم حفظ العرض بنجاح");
            location.reload();
        } catch(e) { 
            alert("خطأ في الحفظ: " + e.message); 
            document.getElementById('saveBtn').disabled = false;
        }
    };

    function printQuotation(custName, items, totalAmount) {
        let rows = items.map(i => `
            <tr>
                <td style="padding:8px; border-bottom:1px solid #eee;">${i.name}</td>
                <td style="text-align:center;">${i.qty}</td>
                <td style="text-align:left;">${(i.qty * i.price).toLocaleString()}</td>
            </tr>
        `).join('');

        const pri = document.getElementById('printFrame').contentWindow;
        const printContent = `
            <html dir="rtl"><head><style>
                body { font-family: 'Arial'; padding: 10px; width: 72mm; margin: 0; }
                .header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 10px; }
                table { width: 100%; font-size: 13px; margin-top: 10px; border-collapse: collapse; }
                .total { margin-top: 10px; border-top: 2px solid #000; padding-top: 5px; font-weight: bold; display: flex; justify-content: space-between; font-size: 16px; }
                .footer { text-align: center; font-size: 11px; margin-top: 20px; border-top: 1px dashed #ccc; padding-top: 10px; }
            </style></head>
            <body>
                <div class="header">
                    <h2 style="margin:0;">عرض سعر</h2>
                    <p style="margin:5px 0;">شركة الزيادى لقطع الغيار</p>
                    <small>${new Date().toLocaleString('ar-EG')}</small>
                </div>
                <p><b>السيد/</b> ${custName}</p>
                <table>
                    <thead><tr style="border-bottom: 1px solid #000;"><th>الصنف</th><th>ك</th><th>ج.م</th></tr></thead>
                    <tbody>${rows}</tbody>
                </table>
                <div class="total"><span>الإجمالي التقريبي:</span><span>${totalAmount.toLocaleString()} ج.م</span></div>
                <div class="footer">هذا العرض ساري لمدة 3 أيام من تاريخه<br>شركة الزيادى لقطع الغيار</div>
            </body></html>`;

        pri.document.open();
        pri.document.write(printContent);
        pri.document.close();
        setTimeout(() => { pri.focus(); pri.print(); }, 500);
    }

    init();
</script>
</body>
</html>
