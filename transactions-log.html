<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل السندات</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { 
            --bg: #0d1117; 
            --glass: rgba(255,255,255,0.05); 
            --neon-blue: #58a6ff; 
            --neon-green: #3fb950; 
            --neon-red: #f85149; 
        }

        body { background: var(--bg); font-family: 'Cairo', sans-serif; color: #c9d1d9; padding-bottom: 30px; }

        .header-section { 
            padding: 20px 15px; background: rgba(20, 25, 35, 0.8); border-bottom: 1px solid rgba(255,255,255,0.1); 
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center;
        }

        /* كارت التجميع */
        .summary-card {
            background: linear-gradient(135deg, rgba(88, 166, 255, 0.1), rgba(188, 140, 255, 0.05));
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-bottom: 20px;
            text-align: center;
        }
        .summary-val { font-size: 2rem; font-weight: 800; color: #fff; display: block; }
        .summary-label { font-size: 0.9rem; opacity: 0.7; }

        /* أزرار الفلتر */
        .filter-group {
            display: flex; gap: 10px; margin-bottom: 20px;
        }
        .filter-btn {
            flex: 1; background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 10px; border-radius: 12px; font-weight: 600; transition: 0.3s;
        }
        .filter-btn.active { background: var(--neon-blue); border-color: var(--neon-blue); box-shadow: 0 4px 12px rgba(88, 166, 255, 0.3); }

        .receipt-card {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 18px;
            padding: 15px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between;
        }

        .icon-box {
            width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 1rem; margin-left: 15px;
        }
        .type-قبض { background: rgba(63, 185, 80, 0.15); color: var(--neon-green); }
        .type-صرف { background: rgba(248, 81, 73, 0.15); color: var(--neon-red); }

        .receipt-info h6 { margin: 0; font-weight: 700; font-size: 1rem; }
        .receipt-info small { color: #8b949e; font-size: 0.75rem; }
        .badge-type { padding: 2px 10px; border-radius: 6px; font-size: 0.65rem; font-weight: bold; margin-bottom: 4px; display: inline-block; }
        .bg-قبض { background: rgba(63, 185, 80, 0.2); color: var(--neon-green); border: 1px solid var(--neon-green); }
        .bg-صرف { background: rgba(248, 81, 73, 0.2); color: var(--neon-red); border: 1px solid var(--neon-red); }

        .amount-val { font-size: 1.1rem; font-weight: 800; }
        .back-btn { width: 40px; height: 40px; border-radius: 10px; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: #fff; display: flex; align-items: center; justify-content: center; text-decoration: none; }
    </style>
</head>
<body>

<div class="header-section">
    <a href="javascript:history.back()" class="back-btn"><i class="fas fa-arrow-right"></i></a>
    <h6 class="m-0 fw-bold" id="pageTitle">سجل السندات</h6>
    <div style="width: 40px;"></div>
</div>

<div class="container mt-4">
    <div class="summary-card">
        <span class="summary-label" id="summaryLabel">إجمالي السندات (الكل)</span>
        <span class="summary-val" id="totalSummary">0.00</span>
        <small class="opacity-50">جنية مصري</small>
    </div>

    <div class="filter-group">
        <button class="filter-btn active" onclick="filterData('all', this)">الكل</button>
        <button class="filter-btn" onclick="filterData('قبض', this)">قبض</button>
        <button class="filter-btn" onclick="filterData('صرف', this)">صرف</button>
    </div>

    <div id="receiptsContainer">
        <div class="text-center mt-5"><div class="spinner-border text-primary"></div></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
        authDomain: "elzyady-da509.firebaseapp.com",
        projectId: "elzyady-da509",
        storageBucket: "elzyady-da509.firebasestorage.app",
        messagingSenderId: "242117738897",
        appId: "1:242117738897:web:d658d6ca335b316f7f9a30"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const urlParams = new URLSearchParams(window.location.search);
    const partyId = urlParams.get('id');

    let allTransactions = [];

    async function loadReceipts() {
        const container = document.getElementById('receiptsContainer');
        if (!partyId) return container.innerHTML = '<div class="text-center">خطأ في التعريف</div>';

        try {
            const partySnap = await getDoc(doc(db, "suppliers", partyId));
            if(partySnap.exists()) document.getElementById('pageTitle').innerText = partySnap.data().name;

            const q = query(collection(db, "transactions"), where("partyId", "==", partyId));
            const querySnapshot = await getDocs(q);
            
            allTransactions = [];
            querySnapshot.forEach(doc => allTransactions.push({ id: doc.id, ...doc.data() }));
            allTransactions.sort((a, b) => new Date(b.date) - new Date(a.date));

            renderUI('all');

        } catch (error) {
            container.innerHTML = '<div class="text-danger text-center">حدث خطأ في الاتصال</div>';
        }
    }

    window.filterData = (type, btn) => {
        // تحديث شكل الأزرار
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderUI(type);
    };

    function renderUI(filterType) {
        const container = document.getElementById('receiptsContainer');
        const summaryVal = document.getElementById('totalSummary');
        const summaryLabel = document.getElementById('summaryLabel');
        
        const filtered = filterType === 'all' 
            ? allTransactions 
            : allTransactions.filter(t => t.type === filterType);

        // حساب الإجمالي للفلتر الحالي
        const total = filtered.reduce((sum, t) => sum + Number(t.amount), 0);
        summaryVal.innerText = total.toLocaleString('en-US', {minimumFractionDigits: 2});
        summaryLabel.innerText = filterType === 'all' ? "إجمالي السندات (الكل)" : `إجمالي سندات ${filterType}`;

        if (filtered.length === 0) {
            container.innerHTML = '<div class="text-center opacity-50 mt-5"><p>لا توجد بيانات لهذا الفلتر</p></div>';
            return;
        }

        container.innerHTML = filtered.map(data => `
            <div class="receipt-card">
                <div class="d-flex align-items-center">
                    <div class="icon-box type-${data.type}">
                        <i class="fas ${data.type === 'قبض' ? 'fa-arrow-down' : 'fa-arrow-up'}"></i>
                    </div>
                    <div class="receipt-info">
                        <span class="badge-type bg-${data.type}">سند ${data.type}</span>
                        <h6>${data.notes || 'بدون ملاحظات'}</h6>
                        <small>${data.date}</small>
                    </div>
                </div>
                <div class="amount-area">
                    <span class="amount-val" style="color: ${data.type === 'قبض' ? 'var(--neon-green)' : 'var(--neon-red)'}">
                        ${Number(data.amount).toLocaleString()}
                    </span>
                </div>
            </div>
        `).join('');
    }

    loadReceipts();
</script>
</body>
</html>
