<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرتجع المشتريات - شركة الزيادى</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { 
            --bg: #0d1117; 
            --glass: rgba(255,255,255,0.05); 
            --neon-red: #f85149; 
            --neon-blue: #58a6ff;
        }

        body { background: var(--bg); font-family: 'Cairo', sans-serif; color: #c9d1d9; padding-bottom: 50px; }

        .header-section { 
            padding: 20px 15px; background: rgba(20, 25, 35, 0.8); border-bottom: 1px solid rgba(255,255,255,0.1); 
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center;
        }

        .input-group-custom {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; padding: 15px; margin-bottom: 20px;
        }

        label { font-size: 0.85rem; color: var(--neon-blue); margin-bottom: 8px; display: block; font-weight: 600; }

        .form-control, .form-select {
            background: rgba(0,0,0,0.2) !important; border: 1px solid rgba(255,255,255,0.1) !important;
            color: #fff !important; border-radius: 10px; padding: 10px;
        }

        .return-item-card {
            background: rgba(248, 81, 73, 0.05); border: 1px dashed var(--neon-red);
            border-radius: 15px; padding: 15px; margin-bottom: 15px;
        }

        .btn-return {
            background: var(--neon-red); color: white; border: none; border-radius: 12px;
            padding: 12px; width: 100%; font-weight: 700; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(248, 81, 73, 0.3);
        }
        .btn-return:active { transform: scale(0.95); }

        .back-btn { width: 40px; height: 40px; border-radius: 10px; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: #fff; display: flex; align-items: center; justify-content: center; text-decoration: none; }
    </style>
</head>
<body>

<div class="header-section">
    <a href="purchase-mgmt.html" class="back-btn"><i class="fas fa-arrow-right"></i></a>
    <h6 class="m-0 fw-bold">عملية مرتجع شراء</h6>
    <div style="width: 40px;"></div>
</div>

<div class="container mt-4">
    <div class="input-group-custom">
        <label>المورد</label>
        <select id="supplierSelect" class="form-select mb-3" onchange="loadSupplierInvoices()">
            <option value="">اختر المورد...</option>
        </select>

        <label>رقم الفاتورة الأصلية (اختياري)</label>
        <select id="invoiceSelect" class="form-select" onchange="loadInvoiceItems()">
            <option value="">اختر الفاتورة للارتجاع منها...</option>
        </select>
    </div>

    <div id="returnItemsContainer">
        <div class="text-center opacity-50 p-4">حدد المورد أو الفاتورة لبدء الارتجاع</div>
    </div>

    <div class="input-group-custom mt-4">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <span>إجمالي قيمة المرتجع:</span>
            <h5 class="m-0 text-white" id="returnTotalDisplay">0.00 ج.م</h5>
        </div>
        <button class="btn-return mt-3" id="saveReturnBtn" onclick="saveReturn()">تأكيد حفظ المرتجع <i class="fas fa-undo-alt ms-2"></i></button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where, addDoc, updateDoc, doc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
        authDomain: "elzyady-da509.firebaseapp.com",
        projectId: "elzyady-da509",
        storageBucket: "elzyady-da509.firebasestorage.app",
        messagingSenderId: "242117738897",
        appId: "1:242117738897:web:d658d6ca335b316f7f9a30"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentInvoices = [];

    async function loadSuppliers() {
        const snap = await getDocs(collection(db, "suppliers"));
        const select = document.getElementById('supplierSelect');
        snap.forEach(d => {
            select.innerHTML += `<option value="${d.id}">${d.data().name}</option>`;
        });
    }

    window.loadSupplierInvoices = async () => {
        const supId = document.getElementById('supplierSelect').value;
        const invSelect = document.getElementById('invoiceSelect');
        const container = document.getElementById('returnItemsContainer');
        
        invSelect.innerHTML = '<option value="">جاري التحميل...</option>';
        container.innerHTML = '<div class="text-center opacity-50 p-4">حدد الفاتورة لبدء الارتجاع</div>';
        
        if(!supId) return;

        // التعديل هنا: البحث عن نوع "شراء" و "فاتورة شراء" معاً لضمان الظهور
        const q = query(collection(db, "supplier_transactions"), where("supplierId", "==", supId));
        const snap = await getDocs(q);
        
        invSelect.innerHTML = '<option value="">اختر الفاتورة للارتجاع منها...</option>';
        currentInvoices = [];
        
        snap.forEach(d => {
            const data = d.data();
            // فلترة الأنواع برمجياً لدعم المسميين
            if(data.type === "شراء" || data.type === "فاتورة شراء") {
                const amount = data.total || data.amount || 0;
                currentInvoices.push({id: d.id, ...data});
                invSelect.innerHTML += `<option value="${d.id}">فاتورة بتاريخ ${data.date} - بقيمة ${amount}</option>`;
            }
        });
    };

    window.loadInvoiceItems = () => {
        const invId = document.getElementById('invoiceSelect').value;
        const container = document.getElementById('returnItemsContainer');
        const invoice = currentInvoices.find(i => i.id === invId);

        if(!invoice || !invoice.items) {
            container.innerHTML = '<div class="text-center opacity-50 p-4">لا توجد أصناف في هذه الفاتورة</div>';
            return;
        }

        container.innerHTML = invoice.items.map((item, index) => {
            const price = item.buy || item.buyPrice || 0;
            return `
                <div class="return-item-card">
                    <div class="d-flex justify-content-between mb-2">
                        <h6 class="m-0 text-white item-name-text">${item.name}</h6>
                        <small>السعر: ${price}</small>
                    </div>
                    <div class="row g-2">
                        <div class="col-6">
                            <label>الكمية المرتجعة</label>
                            <input type="number" class="form-control qty-input" 
                                   data-index="${index}" 
                                   data-price="${price}" 
                                   value="0" min="0" 
                                   oninput="calculateTotal()">
                        </div>
                        <div class="col-6">
                            <label>الكمية بالفاتورة</label>
                            <input type="text" class="form-control opacity-50" value="${item.qty}" disabled>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    };

    window.calculateTotal = () => {
        let total = 0;
        document.querySelectorAll('.qty-input').forEach(input => {
            total += (Number(input.value) * Number(input.getAttribute('data-price')));
        });
        document.getElementById('returnTotalDisplay').innerText = total.toFixed(2) + " ج.م";
    };

    window.saveReturn = async () => {
        const supSelect = document.getElementById('supplierSelect');
        const supId = supSelect.value;
        const totalAmount = parseFloat(document.getElementById('returnTotalDisplay').innerText);
        const btn = document.getElementById('saveReturnBtn');

        if(!supId || totalAmount <= 0) return alert("برجاء اختيار مورد وتحديد كميات المرتجع");

        btn.disabled = true;
        btn.innerHTML = 'جاري الحفظ... <i class="fas fa-spinner fa-spin ms-2"></i>';

        const returnedItems = [];
        document.querySelectorAll('.qty-input').forEach(input => {
            const qty = Number(input.value);
            if (qty > 0) {
                const card = input.closest('.return-item-card');
                const name = card.querySelector('.item-name-text').innerText;
                returnedItems.push({
                    name: name,
                    qty: qty,
                    price: Number(input.getAttribute('data-price'))
                });
            }
        });

        try {
            // 1. تسجيل حركة المرتجع
            await addDoc(collection(db, "supplier_transactions"), {
                supplierId: supId,
                type: "مرتجع شراء",
                total: totalAmount, // توحيد الحقل ليكون total
                items: returnedItems,
                date: new Date().toISOString().split('T')[0],
                timestamp: serverTimestamp()
            });

            // 2. تحديث مديونية المورد (خصم المرتجع من المديونية)
            const supRef = doc(db, "suppliers", supId);
            await updateDoc(supRef, {
                currentBalance: increment(-totalAmount) // استخدام currentBalance الموحد
            });

            // 3. تحديث كميات المخزن (خصم المرتجع من المخزن)
            for (const item of returnedItems) {
                const q = query(collection(db, "inventory"), where("name", "==", item.name));
                const qSnap = await getDocs(q);
                if(!qSnap.empty) {
                    await updateDoc(doc(db, "inventory", qSnap.docs[0].id), {
                        qty: increment(-item.qty)
                    });
                }
            }

            alert("تم حفظ المرتجع وتحديث المخزن والمديونية بنجاح ✅");
            location.reload();
        } catch (e) {
            console.error(e);
            alert("حدث خطأ أثناء الحفظ");
            btn.disabled = false;
            btn.innerText = 'تأكيد حفظ المرتجع';
        }
    };

    loadSuppliers();
</script>

</body>
</html>
