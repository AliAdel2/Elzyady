<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ادارة المبيعات</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg: #0d1117; 
            --glass: rgba(255,255,255,0.05); 
            --neon-blue: #58a6ff; 
            --neon-green: #3fb950;
            --neon-purple: #bc8cff;
            --neon-orange: #f2994a;
            --neon-red: #f85149;
            --neon-pink: #ff7b72;
        }

        body { 
            background: var(--bg); 
            font-family: 'Cairo', sans-serif; 
            color: #c9d1d9; 
            padding-bottom: 50px;
        }
        
        .header-nav { 
            background: var(--glass); 
            padding: 20px; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            backdrop-filter: blur(10px);
            margin-bottom: 25px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 10px;
        }

        .menu-card {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 15px 20px; /* تقليل الطول */
            text-align: center;
            text-decoration: none;
            color: inherit;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .menu-card:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.1);
        }

        .icon-wrapper {
            width: 55px; /* تصغير حجم الأيقونة */
            height: 55px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            font-size: 1.5rem;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* توزيع ألوان النيون على الأيقونات */
        .icon-blue   { color: var(--neon-blue);   text-shadow: 0 0 10px rgba(88,166,255,0.3); }
        .icon-purple { color: var(--neon-purple); text-shadow: 0 0 10px rgba(188,140,255,0.3); }
        .icon-yellow { color: var(--neon-orange); text-shadow: 0 0 10px rgba(242,153,74,0.3); }
        .icon-green  { color: var(--neon-green);  text-shadow: 0 0 10px rgba(63,185,80,0.3); }
        .icon-red    { color: var(--neon-red);    text-shadow: 0 0 10px rgba(248,81,73,0.3); }
        .icon-pink   { color: var(--neon-pink);   text-shadow: 0 0 10px rgba(255,123,114,0.3); }

        .card-title {
            font-weight: 700;
            font-size: 0.95rem;
            color: #fff;
            margin-bottom: 2px;
        }

        .card-desc {
            font-size: 0.7rem;
            color: #8b949e;
        }
    </style>
</head>
<body>

<div class="header-nav">
    <i class="fas fa-sync-alt" onclick="location.reload()" style="cursor:pointer"></i>
    <h5 class="m-0 fw-bold">إدارة المبيعات <span style="color: var(--neon-blue);"></span></h5>
    <a href="javascript:history.back()" class="text-white"><i class="fas fa-arrow-left"></i></a>
</div>

<div class="container">
    <div class="menu-grid">
        
        <a href="sales-invoice.html" class="menu-card">
            <div class="icon-wrapper">
                <i class="fas fa-cash-register icon-purple"></i>
            </div>
            <span class="card-title">فاتورة بيع جديدة</span>
            <span class="card-desc">بدء عملية بيع سريعة</span>
        </a>
              <a href="sales-history.html" class="menu-card">
            <div class="icon-wrapper">
                <i class="fas fa-file-invoice icon-blue"></i>
            </div>
            <span class="card-title">فواتير البيع</span>
            <span class="card-desc">عرض وإدارة المبيعات</span>
        </a>

        <a href="quotation.html" class="menu-card">
            <div class="icon-wrapper">
                <i class="fas fa-file-signature icon-green"></i>
            </div>
            <span class="card-title">عرض سعر جديد</span>
            <span class="card-desc">إنشاء عرض سعر لعميل</span>
        </a>

        <a href="quotation-history.html" class="menu-card">
            <div class="icon-wrapper">
                <i class="fas fa-clipboard-list icon-yellow"></i>
            </div>
            <span class="card-title">عروض الأسعار</span>
            <span class="card-desc">متابعة العروض السابقة</span>
        </a>

        <a href="sales-return.html" class="menu-card">
            <div class="icon-wrapper">
                <i class="fas fa-file-import icon-red"></i>
            </div>
            <span class="card-title">فاتورة مرتجع بيع</span>
            <span class="card-desc">إرجاع منتجات مباعة</span>
        </a>

        <a href="sales-returns-history.html" class="menu-card">
            <div class="icon-wrapper">
                <i class="fas fa-history icon-pink"></i>
            </div>
            <span class="card-title">سجل المرتجعات</span>
            <span class="card-desc">عرض فواتير المرتجع</span>
        </a>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
