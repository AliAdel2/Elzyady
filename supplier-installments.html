<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أقساط المورد - شركة الزيادي</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --accent: #0b5e3d; 
            --header-bg: #0b5e3d;
            --bg-light: #f4f7f6;
            --text-primary: #1b2e26;
            --border: #dce3de;
            --white: #ffffff;
            --danger: #d90429;
            --success: #2d6a4f;
        }

        body { background: var(--bg-light); font-family: 'Cairo', sans-serif; color: var(--text-primary); padding-bottom: 40px; }
        
        /* Header */
        .header-nav { 
            padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; 
            background: var(--header-bg); color: white; position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .section-card {
            background: var(--white); border: 1px solid var(--border);
            border-radius: 18px; padding: 20px; margin: 15px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.02);
        }

        .btn-add { 
            background: var(--accent); color: #fff; border: none; border-radius: 12px; 
            padding: 12px; font-weight: 700; width: 100%; transition: 0.3s; 
        }
        .btn-add:hover { background: #084a30; transform: translateY(-2px); }
        
        /* Installment Item */
        .installment-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5px; border-bottom: 1px solid var(--bg-light);
        }
        .installment-item:last-child { border-bottom: none; }
        .inst-date { font-size: 0.75rem; font-weight: 700; color: #6c757d; }
        .inst-amount { font-weight: 800; color: var(--accent); font-size: 1.1rem; }
        .status-paid { color: var(--success); font-size: 0.8rem; font-weight: 800; }

        /* Inputs */
        .form-control { 
            background: var(--bg-light); border: 1px solid var(--border); 
            border-radius: 10px; font-weight: 600; padding: 10px;
        }
        .form-control:focus { border-color: var(--accent); box-shadow: none; background: #fff; }

        .c-red { color: var(--danger) !important; }
        .c-green { color: var(--success) !important; }
        .sup-title { color: #6c757d; font-size: 0.85rem; font-weight: 700; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="header-nav">
    <a href="#" id="backBtn" class="text-white"><i class="fas fa-arrow-right"></i></a>
    <h6 class="m-0 fw-bold">جدولة أقساط المورد</h6>
    <i class="fas fa-calendar-check" style="opacity: 0.8;"></i>
</div>

<div class="container-fluid p-0">
    <div class="section-card text-center">
        <div class="sup-title" id="supName">جاري التحميل...</div>
        <div class="display-6 fw-bold" id="supBalance" style="font-size: 2rem;">0</div>
        <div id="debtStatusLabel" style="font-size: 0.75rem; font-weight: 700; opacity: 0.7; margin-top: 5px;">رصيد المديونية الحالي</div>
    </div>

    <div class="section-card">
        <h6 class="mb-3 fw-bold" style="font-size: 0.9rem; color: var(--accent);">
            <i class="fas fa-plus-circle me-1"></i> إضافة قسط جديد
        </h6>
        <div class="row g-2">
            <div class="col-6">
                <label class="small fw-bold mb-1 opacity-75">المبلغ</label>
                <input type="number" id="instAmount" class="form-control" placeholder="0.00">
            </div>
            <div class="col-6">
                <label class="small fw-bold mb-1 opacity-75">تاريخ الاستحقاق</label>
                <input type="date" id="instDate" class="form-control">
            </div>
            <div class="col-12 mt-3">
                <button class="btn-add" onclick="addInstallment()">حفظ القسط في الجدول</button>
            </div>
        </div>
    </div>

    <div class="section-card">
        <h6 class="mb-3 fw-bold" style="font-size: 0.9rem; color: var(--accent);">
            <i class="fas fa-list-ul me-1"></i> الأقساط المجدولة
        </h6>
        <div id="installmentsList">
             <div class="text-center py-3">
                 <div class="spinner-border spinner-border-sm text-success"></div>
             </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, getDocs, query, where, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
        authDomain: "elzyady-da509.firebaseapp.com",
        projectId: "elzyady-da509",
        storageBucket: "elzyady-da509.firebasestorage.app",
        messagingSenderId: "242117738897",
        appId: "1:242117738897:web:d658d6ca335b316f7f9a30"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const supId = urlParams.get('id');

    async function getRealBalance(supId, openingBal) {
        const [snapTrans, snapItems] = await Promise.all([
            getDocs(query(collection(db, "transactions"), where("partyId", "==", supId))),
            getDocs(query(collection(db, "supplier_transactions"), where("supplierId", "==", supId)))
        ]);

        let debt = 0;   
        let credit = 0; 

        snapTrans.forEach(doc => {
            const d = doc.data();
            const amt = Number(d.amount) || 0;
            if (d.type === "صرف") credit += amt;
            else if (d.type === "قبض") debt += amt;
        });

        snapItems.forEach(doc => {
            const d = doc.data();
            const amt = Number(d.total) || Number(d.amount) || 0;
            if (d.type === "شراء" || d.type === "فاتورة شراء") debt += amt;
            else if (d.type === "مرتجع شراء") credit += amt;
        });

        return (Number(openingBal || 0) + debt) - credit;
    }

    async function loadData() {
        if(!supId) return;
        document.getElementById('backBtn').href = `supplier-details.html?id=${supId}`;

        try {
            const supDoc = await getDoc(doc(db, "suppliers", supId));
            
            if(supDoc.exists()) {
                const data = supDoc.data();
                document.getElementById('supName').innerText = data.name;
                const realBalance = await getRealBalance(supId, data.openingBalance);
                
                const balanceEl = document.getElementById('supBalance');
                balanceEl.innerText = Math.abs(realBalance).toLocaleString('ar-EG') + " ج.م";
                balanceEl.className = `display-6 fw-bold ${realBalance >= 0 ? 'c-red' : 'c-green'}`;
                document.getElementById('debtStatusLabel').innerText = realBalance >= 0 ? "صافي مديونية علينا" : "صافي رصيد لنا";
            }

            const q = query(collection(db, "installments"), where("partyId", "==", supId));
            const querySnapshot = await getDocs(q);
            const listDiv = document.getElementById('installmentsList');
            
            if (querySnapshot.empty) {
                listDiv.innerHTML = '<p class="text-center opacity-50 py-3 small fw-bold">لا يوجد أقساط مسجلة حالياً</p>';
                return;
            }

            let installments = [];
            querySnapshot.forEach(docSnap => {
                installments.push({ id: docSnap.id, ...docSnap.data() });
            });
            installments.sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));

            listDiv.innerHTML = "";
            installments.forEach((inst) => {
                const isPaid = inst.status === 'paid';
                const html = `
                    <div class="installment-item">
                        <div>
                            <div class="inst-amount">${Number(inst.amount).toLocaleString('ar-EG')}</div>
                            <div class="inst-date"><i class="far fa-clock me-1"></i> استحقاق: ${inst.dueDate}</div>
                        </div>
                        <div>
                            ${isPaid 
                                ? '<span class="status-paid"><i class="fas fa-check-circle"></i> سُدد</span>' 
                                : `<button class="btn btn-sm btn-outline-success fw-bold px-3" style="border-radius:8px; font-size:0.7rem" onclick="payInstallment('${inst.id}', ${inst.amount})">تسديد</button>`}
                        </div>
                    </div>
                `;
                listDiv.innerHTML += html;
            });
        } catch (e) {
            document.getElementById('installmentsList').innerHTML = '<p class="text-center text-danger py-3">خطأ في التحميل</p>';
        }
    }

    window.addInstallment = async () => {
        const amount = document.getElementById('instAmount').value;
        const dueDate = document.getElementById('instDate').value;
        if(!amount || !dueDate) return alert("أكمل البيانات أولاً");

        try {
            await addDoc(collection(db, "installments"), {
                partyId: supId,
                amount: Number(amount),
                dueDate: dueDate,
                status: 'pending',
                createdAt: serverTimestamp()
            });
            location.reload();
        } catch (e) { alert("فشل الحفظ"); }
    };

    window.payInstallment = async (instId, amount) => {
        if(confirm(`تأكيد دفع القسط (${amount} ج.م) وتسجيله في الحساب؟`)) {
            try {
                await updateDoc(doc(db, "installments", instId), { status: 'paid' });
                await addDoc(collection(db, "transactions"), {
                    partyId: supId,
                    amount: Number(amount),
                    type: "صرف",
                    note: "سداد قسط مجدول",
                    date: new Date().toISOString().split('T')[0],
                    createdAt: serverTimestamp()
                });
                location.reload();
            } catch (e) { alert("حدث خطأ"); }
        }
    };

    loadData();
</script>
</body>
</html>
