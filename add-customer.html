<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة عميل - Masar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg-dark: #0d1117; 
            --glass: rgba(255,255,255,0.05); 
            --neon-blue: #00a8ff; 
            --neon-red: #ff4757;
            --text-gray: #c9d1d9;
        }
        
        body { background: var(--bg-dark); font-family: 'Cairo', sans-serif; color: var(--text-gray); padding-bottom: 100px; }
        
        .header { 
            background: rgba(13, 17, 23, 0.9); padding: 15px; 
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px);
        }

        .section-header { font-size: 0.9rem; font-weight: 700; color: var(--neon-blue); margin-top: 25px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }

        .glass-card { 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 25px; padding: 20px; margin-bottom: 15px; 
        }

        .input-group-custom { margin-bottom: 15px; }
        .input-group-custom label { display: block; margin-bottom: 8px; font-size: 0.85rem; font-weight: bold; opacity: 0.8; }
        
        /* تعديل حقول الإدخال للوضوح التام */
        .custom-input {
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important; 
            border-radius: 15px; 
            padding: 12px;
            width: 100%; 
            transition: 0.3s;
        }
        .custom-input:focus { 
            border-color: var(--neon-blue) !important; 
            background: rgba(255, 255, 255, 0.08) !important;
            color: #00a8ff !important; 
            outline: none; 
        }
        /* تمييز حقول الأرقام باللون الأصفر للرؤية الواضحة */
        input[type="number"].custom-input {
            color: #ffeb3b !important;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .balance-toggle { display: flex; gap: 10px; margin-top: 15px; }
        .toggle-btn { 
            flex: 1; padding: 12px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.03); color: white; font-weight: bold; transition: 0.3s;
        }
        .toggle-btn.active-red { background: var(--neon-red); border-color: var(--neon-red); box-shadow: 0 0 15px rgba(255, 71, 87, 0.3); }
        .toggle-btn.active-blue { background: var(--neon-blue); border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 168, 255, 0.3); }

        .form-switch .form-check-input { width: 45px; height: 22px; cursor: pointer; }

        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0; padding: 20px;
            background: rgba(13, 17, 23, 0.9); backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .btn-submit {
            background: var(--neon-blue); color: white; border: none;
            width: 100%; padding: 15px; border-radius: 18px; font-weight: bold;
            font-size: 1.1rem; box-shadow: 0 4px 15px rgba(0, 168, 255, 0.3);
        }
    </style>
</head>
<body>

<div class="header">
    <i class="fas fa-chevron-right" onclick="confirmBack()" style="cursor: pointer;"></i>
    <h5 class="m-0 fw-bold">إضافة عميل جديد</h5>
    <div style="width:20px"></div>
</div>

<div class="container">
    
    <div class="section-header">
        <i class="fas fa-user-circle"></i> البيانات الأساسية
    </div>
    <div class="glass-card">
        <div class="input-group-custom">
            <label>الإسم بالكامل</label>
            <input type="text" id="custName" class="custom-input" placeholder="أدخل الإسم هنا..." oninput="isChanged=true">
        </div>
        <div class="input-group-custom">
            <label>رقم الهاتف</label>
            <input type="tel" id="custPhone" class="custom-input" placeholder="01xxxxxxxxx" oninput="isChanged=true">
        </div>
        <div class="input-group-custom">
            <label>العنوان</label>
            <input type="text" id="custAddress" class="custom-input" placeholder="أدخل العنوان هنا..." oninput="isChanged=true">
        </div>
    </div>

    <div class="section-header">
        <i class="fas fa-wallet"></i> الحساب المالي
    </div>
    <div class="glass-card">
        <div class="input-group-custom">
            <label>الرصيد الإفتتاحي</label>
            <input type="number" id="custInitialBalance" class="custom-input text-center" value="0.00" step="0.01" oninput="isChanged=true">
        </div>
        
        <div class="balance-toggle">
            <button class="toggle-btn active-red" id="btnDebit" onclick="setBalanceType('debit'); isChanged=true">مدين (عليه)</button>
            <button class="toggle-btn" id="btnCredit" onclick="setBalanceType('credit'); isChanged=true">دائن (له)</button>
        </div>

        <div class="input-group-custom mt-4">
            <label>الحد الائتماني</label>
            <input type="number" id="creditLimit" class="custom-input text-center" value="0.00" step="0.01" oninput="isChanged=true">
        </div>
    </div>

    <div class="section-header">
        <i class="fas fa-cog"></i> إعدادات الطرف
    </div>
    <div class="glass-card">
        <div class="form-check form-switch d-flex justify-content-between align-items-center flex-row-reverse p-0">
            <input class="form-check-input" type="checkbox" id="isSupplier" onchange="isChanged=true">
            <label class="form-check-label text-white fw-bold" for="isSupplier">
                معاملته كمورد أيضاً
                <br><small style="color: var(--neon-blue); font-size: 0.7rem;">ميزة PRO - تتطلب تفعيل النسخة</small>
            </label>
        </div>
    </div>

</div>

<div class="bottom-bar">
    <button class="btn-submit" onclick="saveCustomerData()">حفظ بيانات العميل</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
        authDomain: "elzyady-da509.firebaseapp.com",
        projectId: "elzyady-da509",
        storageBucket: "elzyady-da509.firebasestorage.app",
        messagingSenderId: "242117738897",
        appId: "1:242117738897:web:d658d6ca335b316f7f9a30"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let balanceType = 'debit'; 
    window.isChanged = false; // تتبع التغييرات

    // تنبيه قبل إغلاق المتصفح
    window.onbeforeunload = function() {
        if (window.isChanged) return "هل أنت متأكد؟ لديك بيانات غير محفوظة.";
    };

    // دالة الرجوع الذكية
    window.confirmBack = () => {
        if (window.isChanged) {
            if (confirm("لم يتم حفظ البيانات، هل تريد الرجوع فعلاً؟")) {
                window.location.href = "customer-list.html";
            }
        } else {
            window.location.href = "customer-list.html";
        }
    };

    window.setBalanceType = (type) => {
        balanceType = type;
        const btnDebit = document.getElementById('btnDebit');
        const btnCredit = document.getElementById('btnCredit');
        
        if(type === 'debit') {
            btnDebit.className = 'toggle-btn active-red';
            btnCredit.className = 'toggle-btn';
        } else {
            btnDebit.className = 'toggle-btn';
            btnCredit.className = 'toggle-btn active-blue';
        }
    }

    window.saveCustomerData = async function() {
        const name = document.getElementById('custName').value.trim();
        const phone = document.getElementById('custPhone').value.trim();
        const address = document.getElementById('custAddress').value.trim();
        const initialBalanceRaw = Number(document.getElementById('custInitialBalance').value) || 0;
        const limit = Number(document.getElementById('creditLimit').value) || 0;

        if(!name || !phone) {
            alert("يا هندسة، الإسم ورقم التليفون بيانات أساسية!");
            return;
        }

        const calculatedBalance = (balanceType === 'debit') ? Math.abs(initialBalanceRaw) : -Math.abs(initialBalanceRaw);

        try {
            const docRef = await addDoc(collection(db, "customers"), {
                name: name,
                phone: phone,
                address: address,
                initialBalance: calculatedBalance,
                balanceType: balanceType,
                creditLimit: limit,
                isSupplier: document.getElementById('isSupplier').checked,
                currentBalance: calculatedBalance,
                createdAt: serverTimestamp()
            });

            window.isChanged = false; // تصفير التغييرات بعد الحفظ
            alert("تم حفظ بيانات العميل بنجاح!");
            window.location.href = "customer-list.html"; 
        } catch (e) {
            console.error("Error adding document: ", e);
            alert("حدث خطأ أثناء الحفظ، جرب تاني يا هندسة.");
        }
    }
</script>
</body>
</html>
