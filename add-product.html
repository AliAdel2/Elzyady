<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة/تعديل صنف - شركة الزيادى</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0d1117; --glass: rgba(255,255,255,0.05); --neon: #58a6ff; }
        body { background: var(--bg-dark); font-family: 'Cairo', sans-serif; color: #c9d1d9; padding: 10px; }
        .glass-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-bottom: 20px; backdrop-filter: blur(10px); }
        .section-title { font-size: 0.9rem; font-weight: 700; color: var(--neon); margin-bottom: 10px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(88, 166, 255, 0.2); padding-bottom: 10px; }
        
        /* تعديل الحقول للوضوح التام أثناء الكتابة */
        .form-control, .form-select { 
            background: rgba(0,0,0,0.3) !important; 
            border: 1px solid rgba(255,255,255,0.1) !important; 
            color: #fff !important; 
            border-radius: 12px; 
            padding: 10px; 
            transition: 0.3s;
        }
        .form-control:focus {
            border-color: var(--neon) !important;
            background: rgba(88, 166, 255, 0.05) !important;
            box-shadow: none;
        }
        /* تمييز حقول الأرقام والأسعار */
        input[type="number"].form-control {
            color: #ffeb3b !important; /* لون أصفر للرؤية الواضحة */
            font-weight: bold;
        }

        label { margin-bottom: 8px; font-size: 0.85rem; opacity: 0.8; }
        .price-tag { font-size: 0.75rem; color: var(--neon); display: block; margin-bottom: 8px; }
        .btn-save { background: linear-gradient(45deg, #58a6ff, #bc8cff) !important; border: none !important; color: white !important; padding: 15px; border-radius: 15px; font-weight: 700; }
        
        .header-nav {
            position: sticky; top: 0; z-index: 1000; background: var(--bg-dark); padding: 5px 0; margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container py-3">
    <div class="header-nav d-flex justify-content-between align-items-center mb-4">
        <h5 class="fw-bold m-0" id="formTitle"><i class="fas fa-plus-circle text-info me-2"></i> إضافة صنف جديد</h5>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-warning btn-sm" onclick="resetForm()" id="cancelEdit" style="display:none;">إلغاء التعديل</button>
            <a href="javascript:void(0)" onclick="confirmBack()" class="btn btn-outline-light btn-sm"><i class="fas fa-arrow-right"></i></a>
        </div>
    </div>

    <input type="hidden" id="editId">

    <div class="glass-card">
        <div class="section-title"><i class="fas fa-info-circle"></i> المعلومات الأساسية</div>
        <div class="row g-3">
            <div class="col-md-6">
                <label>اسم الصنف</label>
                <input type="text" id="pName" class="form-control" placeholder="مثال: زيت توتال 5W30" oninput="isChanged=true">
            </div>
            <div class="col-md-6">
                <label>الباركود</label>
                <div class="input-group">
                    <input type="text" id="pBarcode" class="form-control" placeholder="734722..." oninput="isChanged=true">
                    <button class="btn btn-outline-info" type="button" onclick="generateBarcode()">توليد</button>
                </div>
            </div>
        </div>
    </div>

    <div class="glass-card">
        <div class="section-title"><i class="fas fa-hand-holding-usd"></i> التسعير والمخزون</div>
        <div class="row g-3">
            <div class="col-md-3">
                <label>الكمية (كرتونة)</label>
                <input type="number" id="pQty" class="form-control" step="0.01" value="0" oninput="isChanged=true">
            </div>
            <div class="col-md-3">
                <label>حد الطلب (تنبيه)</label>
                <input type="number" id="pMin" class="form-control" value="3" oninput="isChanged=true">
            </div>
            <div class="col-md-6">
                <label>سعر الشراء (للكرتونة)</label>
                <input type="number" id="pBuy" class="form-control" placeholder="0.00" oninput="isChanged=true">
            </div>
            <div class="col-md-4">
                <label class="price-tag">سعر بيع الكرتونة (قطاعي)</label>
                <input type="number" id="pSell" class="form-control border-info" placeholder="0.00" oninput="isChanged=true">
            </div>
            <div class="col-md-4">
                <label class="price-tag" style="color:#f2ca30">سعر بيع الكرتونة (جملة)</label>
                <input type="number" id="pSell2" class="form-control" placeholder="0.00" oninput="isChanged=true">
            </div>
            <div class="col-md-4">
                <label class="price-tag" style="color:#ff7b72">سعر بيع الكرتونة (خاص)</label>
                <input type="number" id="pSell3" class="form-control" placeholder="0.00" oninput="isChanged=true">
            </div>
        </div>
    </div>

    <div class="glass-card">
        <div class="section-title"><i class="fas fa-layer-group"></i> التصنيف والوحدات</div>
        <div class="row g-3">
            <div class="col-md-4">
                <label>الفئة</label>
                <select id="pCategoryList" class="form-select mb-2" onchange="document.getElementById('pCategoryNew').value = this.value; isChanged=true">
                    <option value="">-- اختر فئة --</option>
                </select>
                <input type="text" id="pCategoryNew" class="form-control" placeholder="أو اكتب فئة جديدة" oninput="isChanged=true">
            </div>
            <div class="col-md-4">
                <label>وحدة البيع (الأصغر)</label>
                <input type="text" id="pUnitName" class="form-control" placeholder="جركن / علبة / قطعة" oninput="isChanged=true">
            </div>
            <div class="col-md-4">
                <label>المعامل (كم قطعة بالكرتونة؟)</label>
                <input type="number" id="pFactor" class="form-control" value="1" oninput="isChanged=true">
            </div>
        </div>
    </div>

    <div class="mb-5">
        <button class="btn btn-save w-100 fw-bold" id="saveBtn" onclick="saveToInventory()">
            <i class="fas fa-save me-2"></i> حفظ الصنف في المستودع
        </button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDoc, getDocs, updateDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
        authDomain: "elzyady-da509.firebaseapp.com",
        projectId: "elzyady-da509",
        storageBucket: "elzyady-da509.firebasestorage.app",
        messagingSenderId: "242117738897",
        appId: "1:242117738897:web:d658d6ca335b316f7f9a30"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let originalTotalPcs = 0; 
    let originalQtyInCrates = 0; 
    window.isChanged = false; // تتبع التغييرات

    // تنبيه قبل الخروج
    window.onbeforeunload = function() {
        if (window.isChanged) return "هل أنت متأكد من الخروج؟ هناك بيانات لم تحفظ.";
    };

    window.confirmBack = () => {
        if (window.isChanged) {
            if (confirm("لم يتم حفظ بيانات الصنف، هل تريد الرجوع؟")) {
                window.location.href = "inventory-menu.html";
            }
        } else {
            window.location.href = "inventory-menu.html";
        }
    };

    async function loadCategories() {
        try {
            const snap = await getDocs(collection(db, "categories"));
            const catSelect = document.getElementById('pCategoryList');
            catSelect.innerHTML = '<option value="">-- اختر فئة --</option>';
            snap.forEach(doc => {
                const data = doc.data();
                const catName = data.name || data.category;
                if(catName) {
                    const option = document.createElement('option');
                    option.value = catName;
                    option.text = catName;
                    catSelect.appendChild(option);
                }
            });
        } catch (e) { console.error("خطأ في التحميل:", e); }
    }

    async function checkEdit() {
        const urlParams = new URLSearchParams(window.location.search);
        const editId = urlParams.get('edit');

        if (editId) {
            document.getElementById('editId').value = editId;
            document.getElementById('formTitle').innerHTML = '<i class="fas fa-edit text-warning me-2"></i> تعديل صنف حالي';
            document.getElementById('saveBtn').innerHTML = '<i class="fas fa-sync me-2"></i> تحديث بيانات الصنف';
            document.getElementById('cancelEdit').style.display = 'block';

            const docRef = doc(db, "inventory", editId);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                const factor = data.unitFactor || 1;
                originalTotalPcs = data.totalPcs || 0;
                originalQtyInCrates = originalTotalPcs / factor;

                document.getElementById('pName').value = data.name || '';
                document.getElementById('pBarcode').value = data.barcode || '';
                document.getElementById('pQty').value = originalQtyInCrates; 
                document.getElementById('pMin').value = data.min || 0;
                document.getElementById('pBuy').value = data.buy || 0;
                document.getElementById('pSell').value = data.sell || 0;
                document.getElementById('pSell2').value = data.sell2 || 0;
                document.getElementById('pSell3').value = data.sell3 || 0;
                document.getElementById('pCategoryNew').value = data.category || '';
                document.getElementById('pUnitName').value = data.unitName || '';
                document.getElementById('pFactor').value = factor;
                window.isChanged = false; // تصفير التغيير بعد التحميل في وضع التعديل
            }
        }
    }

    window.saveToInventory = async function() {
        const id = document.getElementById('editId').value;
        const name = document.getElementById('pName').value;
        const cat = document.getElementById('pCategoryNew').value;
        const newQtyInput = parseFloat(document.getElementById('pQty').value) || 0;
        const factor = parseInt(document.getElementById('pFactor').value) || 1;

        if(!name || !cat) { alert("برجاء إدخال الاسم والفئة"); return; }

        let finalTotalPcs = (id && newQtyInput === originalQtyInCrates) ? originalTotalPcs : Math.round(newQtyInput * factor);

        const itemData = { 
            name, category: cat, qty: newQtyInput, unitFactor: factor, totalPcs: finalTotalPcs, 
            min: parseInt(document.getElementById('pMin').value) || 0, 
            buy: parseFloat(document.getElementById('pBuy').value) || 0, 
            sell: parseFloat(document.getElementById('pSell').value) || 0, 
            sell2: parseFloat(document.getElementById('pSell2').value) || 0,
            sell3: parseFloat(document.getElementById('pSell3').value) || 0,
            barcode: document.getElementById('pBarcode').value,
            unitName: document.getElementById('pUnitName').value || 'قطعة',
            lastUpdate: serverTimestamp() 
        };

        try {
            if(id) {
                await updateDoc(doc(db, "inventory", id), itemData);
                alert("تم التحديث بنجاح ✅");
            } else {
                await addDoc(collection(db, "inventory"), { ...itemData, timestamp: serverTimestamp() });
                alert("تم الحفظ بنجاح ✅");
            }
            window.isChanged = false;
            window.location.href = "inventory-list.html";
        } catch(e) { alert("خطأ في الحفظ"); }
    }

    window.generateBarcode = () => {
        document.getElementById('pBarcode').value = Math.floor(100000000000 + Math.random() * 900000000000);
        window.isChanged = true;
    };

    window.resetForm = () => {
        if (window.isChanged && !confirm("سيتم فقدان التغييرات، متأكد؟")) return;
        window.location.href = "add-product.html";
    };
    
    loadCategories();
    checkEdit();
</script>
</body>
</html>
