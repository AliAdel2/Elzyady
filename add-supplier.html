<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة مورد جديد</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0d1117; --glass: rgba(255,255,255,0.05); --neon-blue: #58a6ff; --neon-green: #3fb950; --neon-red: #f85149; }
        body { background: var(--bg); font-family: 'Cairo', sans-serif; color: #c9d1d9; padding-bottom: 100px; }
        
        .header-section { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); background: var(--glass); }
        
        .section-title { font-size: 0.9rem; font-weight: 700; color: var(--neon-blue); margin: 20px 10px 10px; display: flex; align-items: center; }
        .section-title i { margin-left: 8px; }

        .glass-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-bottom: 15px; backdrop-filter: blur(10px); }

        .form-label { font-size: 0.85rem; margin-bottom: 8px; opacity: 0.8; }
        .form-control { 
            background: rgba(0,0,0,0.2) !important; 
            border: 1px solid rgba(255,255,255,0.1) !important; 
            color: #fff !important; 
            border-radius: 12px; 
            padding: 12px;
            margin-bottom: 15px;
        }
        .form-control:focus { border-color: var(--neon-blue) !important; box-shadow: 0 0 10px rgba(88, 166, 255, 0.2); }

        .type-toggle { display: flex; gap: 10px; margin-top: 10px; }
        .type-btn { 
            flex: 1; border: 1px solid rgba(255,255,255,0.1); background: transparent; 
            color: #fff; padding: 10px; border-radius: 12px; transition: 0.3s; 
        }
        .type-btn.active-green { background: var(--neon-green) !important; border-color: var(--neon-green); font-weight: bold; }
        .type-btn.active-red { background: var(--neon-red) !important; border-color: var(--neon-red); font-weight: bold; }

        .form-check-input { background-color: var(--glass); border-color: rgba(255,255,255,0.2); cursor: pointer; width: 3em; height: 1.5em; }
        .form-check-input:checked { background-color: var(--neon-blue); border-color: var(--neon-blue); }

        .fixed-footer { 
            position: fixed; bottom: 0; left: 0; right: 0; padding: 20px; 
            background: rgba(13, 17, 23, 0.9); backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.05); 
        }
        .btn-save { 
            background: linear-gradient(90deg, #f0883e, #ffab70); border: none; 
            color: #000; font-weight: 800; width: 100%; padding: 15px; border-radius: 15px; 
        }
    </style>
</head>
<body>

<div class="header-section d-flex justify-content-between align-items-center">
    <a href="supplier-management.html" class="text-white text-decoration-none"><i class="fas fa-chevron-right"></i></a>
    <h5 class="m-0 fw-bold">إضافة مورد جديد</h5>
    <div style="width: 20px;"></div>
</div>

<div class="container">
    <form id="addSupplierForm">
        <div class="section-title"><i class="fas fa-user"></i> البيانات الأساسية</div>
        <div class="glass-card">
            <label class="form-label">الإسم بالكامل</label>
            <input type="text" id="supName" class="form-control" placeholder="أدخل الإسم هنا..." required>
            
            <label class="form-label">رقم الهاتف</label>
            <input type="tel" id="supPhone" class="form-control" placeholder="01xxxxxxxxx">
            
            <label class="form-label">العنوان</label>
            <input type="text" id="supAddress" class="form-control" placeholder="القاهرة، مصر">
        </div>

        <div class="section-title"><i class="fas fa-wallet"></i> الحساب المالي</div>
        <div class="glass-card">
            <label class="form-label">الرصيد الإفتتاحي</label>
            <input type="number" id="openingBalance" class="form-control" value="0.00">
            
            <div class="type-toggle">
                <button type="button" id="btnCredit" class="type-btn active-green" onclick="setType('credit')">دائن (له)</button>
                <button type="button" id="btnDebit" class="type-btn" onclick="setType('debit')">مدين (عليه)</button>
            </div>

            <label class="form-label mt-3">الحد الائتماني</label>
            <input type="number" id="creditLimit" class="form-control" value="0.00">
        </div>

        <div class="section-title"><i class="fas fa-cog"></i> إعدادات الطرف</div>
        <div class="glass-card d-flex justify-content-between align-items-center">
            <div>
                <h6 class="m-0" style="font-size: 0.9rem;">معاملته كعميل أيضاً</h6>
                <small class="text-warning" style="font-size: 0.7rem;">ميزة PRO - تتطلب تفعيل النسخة</small>
            </div>
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="asCustomer">
            </div>
        </div>
    </form>
</div>

<div class="fixed-footer">
    <button type="button" class="btn-save" onclick="saveSupplier()">حفظ بيانات المورد</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3jpSs_LiIZwoaPIgRAiALVX5F1OkBYOI",
        authDomain: "elzyady-da509.firebaseapp.com",
        projectId: "elzyady-da509",
        storageBucket: "elzyady-da509.firebasestorage.app",
        messagingSenderId: "242117738897",
        appId: "1:242117738897:web:d658d6ca335b316f7f9a30",
        measurementId: "G-JPRK3BT495"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let supplierType = 'credit'; 

    window.setType = (type) => {
        supplierType = type;
        const btnCredit = document.getElementById('btnCredit');
        const btnDebit = document.getElementById('btnDebit');

        if (type === 'credit') {
            btnCredit.classList.add('active-green');
            btnDebit.classList.remove('active-red');
        } else {
            btnDebit.classList.add('active-red');
            btnCredit.classList.remove('active-green');
        }
    };

    window.saveSupplier = async () => {
        const name = document.getElementById('supName').value;
        const openingBalRaw = parseFloat(document.getElementById('openingBalance').value || 0);

        if(!name) return alert("يرجى إدخال اسم المورد");

        // تعديل منطق الحساب: الدائن (له) يبقى موجب، المدين (عليه) يتحول لسالب
        const calculatedBalance = (supplierType === 'debit') ? -Math.abs(openingBalRaw) : Math.abs(openingBalRaw);

        const supplierData = {
            name: name,
            phone: document.getElementById('supPhone').value,
            address: document.getElementById('supAddress').value,
            openingBalance: calculatedBalance,
            currentBalance: calculatedBalance,
            type: supplierType,
            creditLimit: parseFloat(document.getElementById('creditLimit').value || 0),
            isCustomerToo: document.getElementById('asCustomer').checked,
            createdAt: serverTimestamp()
        };

        try {
            await addDoc(collection(db, "suppliers"), supplierData);
            alert("تم حفظ المورد بنجاح!");
            window.location.href = "supplier-management.html";
        } catch (e) {
            console.error(e);
            alert("حدث خطأ أثناء الحفظ");
        }
    };
</script>
</body>
</html>
